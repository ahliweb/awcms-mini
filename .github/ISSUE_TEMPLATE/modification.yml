name: Modification Task
description: Buat task implementasi atomic sesuai alur kerja repository (AGENTS.md + doc 06).
title: "[AWM] "
labels:
  - type:task
body:
  - type: markdown
    attributes:
      value: |
        Gunakan form ini untuk semua pekerjaan modifikasi repository.

        Aturan alur kerja:
        - Mulai dari issue sebelum mengubah kode/dokumen; satu issue = satu PR atomic.
        - Rujuk `AGENTS.md` dan `docs/awcms-mini/06_github_issues_detail.md`.
        - Schema berubah → migration; API berubah → OpenAPI; event berubah → AsyncAPI.
        - Mutation high-risk → idempotency; high-risk action → audit; data sensitif → mask.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Nyatakan perubahan persis yang akan dibuat.
      placeholder: Implementasikan perubahan terkecil yang benar.
    validations:
      required: true
  - type: textarea
    id: rationale
    attributes:
      label: Rationale
      description: Alasan pekerjaan ini dan dokumen/issue asalnya.
      placeholder: Diturunkan dari docs/awcms-mini/06_github_issues_detail.md Issue X.Y.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Daftar yang in-scope dan eksplisit yang out-of-scope.
      placeholder: |
        In scope:
        - ...

        Out of scope:
        - ...
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Issue pemblokir/terkait atau prasyarat.
      placeholder: |
        Depends on:
        - #123
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      description: Kondisi selesai yang konkret.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Cara verifikasi perubahan.
      placeholder: |
        - bun test / bun run api:spec:check / bun run db:migrate / bun run build
        - Catatan security (tenant/ABAC/RLS/audit/idempotency/masking)
    validations:
      required: true
