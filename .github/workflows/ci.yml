# CI AWCMS-Mini — base modular monolith (Bun + Astro + PostgreSQL).
# Gate mengikuti pre-deploy checklist doc 09: spec check, readiness,
# test, typecheck, build, dan migration terhadap PostgreSQL service.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: awcms
          POSTGRES_PASSWORD: awcms_password
          POSTGRES_DB: awcms_mini
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awcms -d awcms_mini"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://awcms:awcms_password@localhost:5432/awcms_mini
      AUTH_JWT_SECRET: ci-only-secret
    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint (prettier)
        run: bun run lint

      - name: API spec check (OpenAPI/AsyncAPI - registry modul)
        run: bun run api:spec:check

      - name: Security readiness
        run: bun run security:readiness

      - name: Unit tests
        run: bun test tests/

      - name: Typecheck (astro check)
        run: bun run typecheck

      - name: Database migration (apply + rerun idempotent)
        run: |
          bun run db:migrate
          bun run db:migrate
          bun run db:migrate:status

      - name: Build
        run: bun run build

      - name: Contract test (server hasil build)
        run: |
          bun ./dist/server/entry.mjs &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:4321/api/v1/health > /dev/null && break
            sleep 1
          done
          bun scripts/api-contract-test.ts
          kill $SERVER_PID
