# CI AWCMS-Mini — kualitas dokumentasi, unit test, & hygiene (Bun-only).
# Repo saat ini foundation skeleton + tooling; gate build aktif sejak Issue 0.1.
#
# Issue #685 (epic #679, platform-hardening): this file previously ran only
# a SUBSET of `bun run check`'s own steps (lint/docs/typecheck/test/build),
# silently missing `api:spec:check` and `modules:dag:check` — a contract or
# module-graph regression could merge to `main` with CI green. Every step
# below is now named after, and kept in the same order as, the `check`
# script in package.json — that script stays the single source of truth;
# this file's `quality` job steps are its CI-orchestrated mirror, not an
# independent list that can drift from it again.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (lint + docs + contracts + typecheck + test)
    runs-on: ubuntu-latest
    # Least-required permissions (Issue #685): this job only ever reads the
    # checkout and writes nothing back to the repo/API — no broader default
    # inherited beyond the top-level `contents: read`.
    permissions:
      contents: read

    # PostgreSQL service so the integration suite (tests/integration/**) runs
    # against a real database on every PR. The pure-unit suite skips these
    # tests when DATABASE_URL is unset (see tests/integration/harness.ts), so
    # local `bun test` without a database stays green; here DATABASE_URL points
    # at this service and the migration runner provisions the schema before the
    # suite runs.
    # POSTGRES_* are the non-secret local/CI development defaults (the same
    # values documented in .env.example). They are assigned as discrete env
    # vars — never composed into a literal `postgres://user:pass@host` URL in
    # this file — so secret scanners don't flag a throwaway CI credential as a
    # leaked connection string; DATABASE_URL is assembled at runtime below.
    env:
      POSTGRES_USER: awcms-mini
      POSTGRES_PASSWORD: awcms_mini_password
      POSTGRES_DB: awcms-mini

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: awcms-mini
          POSTGRES_PASSWORD: awcms_mini_password
          POSTGRES_DB: awcms-mini
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awcms-mini -d awcms-mini"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      # Issue #685: dependency caching WITHOUT weakening `--frozen-lockfile`
      # (below) — this only caches Bun's own download cache
      # (~/.bun/install/cache, keyed on bun.lock's hash), so a cache hit
      # just skips re-downloading packages already fetched for the exact
      # same lockfile; `bun install --frozen-lockfile` still runs in full
      # every time and still fails hard on any lockfile/package.json
      # mismatch, same as an uncached run.
      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Assemble DATABASE_URL for the integration DB
        run: echo "DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run lint

      - name: Docs checks (mermaid, internal links, naming)
        run: bun run check:docs

      - name: API spec + route + AsyncAPI contract check
        run: bun run api:spec:check

      - name: Module dependency graph check
        run: bun run modules:dag:check

      # Issue #740 (epic #738): added alongside `modules:dag:check` in
      # `package.json`'s `check` script — PR #769 security-auditor review
      # found these two were missing here, reproducing exactly the "CI
      # silently runs a subset of `bun run check`" gap Issue #685 (this
      # file's own header comment) was written to prevent.
      - name: Module composition validation check
        run: bun run modules:compose:check

      - name: Module composition inventory freshness check
        run: bun run modules:composition:inventory:check

      # Issue #741 (epic #738): added alongside `modules:compose:check` in
      # `package.json`'s `check` script, for the exact same reason the
      # comment above documents for that step (Issue #685/#740's own
      # history of this gap) — a derived-application compatibility
      # manifest check that only ran in `bun run check` and never here
      # would silently never gate a real PR.
      - name: Extension compatibility manifest check
        run: bun run extension:check

      - name: i18n EN/ID/POT key parity check
        run: bun run i18n:parity:check

      - name: Database work-class registry drift check
        run: bun run db:work-class:check

      # Issue #745 (epic #738): added alongside the other registry checks
      # above — security-auditor review of PR #773 found this was missing
      # here, reproducing the same "CI silently runs a subset of `bun run
      # check`" gap Issue #685/#740 already fixed once for the other
      # checks in this file.
      - name: Data lifecycle high-volume table registry validation check
        run: bun run data-lifecycle:registry:check

      # Issue #746 (epic #738): added alongside the other registry checks
      # above, for the exact same "CI silently runs a subset of `bun run
      # check`" reason Issue #685/#740/#745 already documented for the
      # other checks in this file — do not rely on `bun run check` alone.
      - name: Business-scope SoD rule registry validation check
        run: bun run identity-access:sod-registry:check

      # Issue #750 (epic #738): added alongside the other registry checks
      # above, for the exact same "CI silently runs a subset of `bun run
      # check`" reason Issue #685/#740/#745/#746 already documented for
      # the other checks in this file — do not rely on `bun run check`
      # alone.
      - name: Reference-data module contribution registry validation check
        run: bun run reference-data:contributions:check

      # Issue #753 (epic #738): added alongside the other registry checks
      # above, for the exact same "CI silently runs a subset of `bun run
      # check`" reason Issue #685/#740/#745/#746 already documented for the
      # other checks in this file — do not rely on `bun run check` alone.
      - name: Reporting projection registry validation check
        run: bun run reporting:projections:registry:check

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Apply migrations (integration DB)
        run: bun run db:migrate

      - name: Unit + integration tests (bun test)
        run: bun test

      # Issue #699 (epic #679): the "safe" tier only (fast, deterministic,
      # no real network calls, no version-sensitive pg_dump/pg_restore
      # requirement) — the "full" tier (adds a real backup/restore/rollback
      # round trip via deploy/backup/restore-drill.sh) is intentionally NOT
      # run here; see docs/awcms-mini/resilience-dr-verification.md §CI
      # safe subset vs. full drill cadence for the scheduled/on-demand full
      # run. APP_ENV=test (never production) + --confirm-non-production=test
      # satisfy the drill's own non-overridable safety interlock
      # (src/lib/resilience/target-guard.ts) — this step can never touch
      # anything that looks like production, by construction.
      - name: DR/resilience drill (safe subset)
        env:
          APP_ENV: test
        run: bun run resilience:dr-drill -- --confirm-non-production=test

      # Issue #744 (epic #738): the performance suite's scenarios run real
      # RLS-enforced queries through `withTenant` (never a privileged/
      # superuser bypass — see src/lib/performance/fixture-seeder.ts's own
      # header comment on why), so — like the e2e-smoke job further below —
      # they must run as the least-privilege `awcms_mini_app` role, never
      # the migration-owner/superuser role this job's `DATABASE_URL`
      # otherwise points at. Mirrors e2e-smoke's own "Activate the
      # least-privilege app role's login" step exactly, with its own
      # dedicated non-secret CI-only password literal rather than depending
      # on `bun test`'s own `provisionAppRole()` (tests/integration/
      # harness.ts) having already run first in this same job — that would
      # make this step's correctness depend on step ORDER.
      - name: Activate the least-privilege app role's login (performance suite)
        run: |
          bun -e '
            const sql = new Bun.SQL(process.env.DATABASE_URL);
            await sql.unsafe(
              `ALTER ROLE awcms_mini_app WITH LOGIN PASSWORD ${"\x27"}${process.env.APP_ROLE_PASSWORD}${"\x27"}`
            );
            await sql.end();
          '
        env:
          APP_ROLE_PASSWORD: ci-performance-app-role-password

      # Issue #744: the "safe" tier only — small deterministic synthetic
      # fixtures (5 tenants, ~1.5k-9k rows/table, one noisy-neighbor
      # tenant), five fast scenarios covering every work class (interactive/
      # critical-transaction/reporting/background-sync/saturation-and-
      # recovery). The heavier `--full` lane (large fixture scale + the
      # soak-stability scenario) is intentionally NOT run here — see
      # docs/awcms-mini/performance-suite.md §Safe subset vs. full lane for
      # the scheduled/on-demand full run. Reuses the SAME non-overridable
      # target guard as the DR drill above (src/lib/resilience/
      # target-guard.ts) — this step can never touch anything that looks
      # like production, by construction.
      - name: Performance suite (safe tier)
        env:
          APP_ENV: test
          DATABASE_URL: "postgres://awcms_mini_app:ci-performance-app-role-password@localhost:5432/awcms-mini"
        run: bun run performance:suite -- --confirm-non-production=test

      # Issue #744: query-plan regression budgets (RLS-scoped pagination,
      # full-text search, outbox claim, retention-purge batch, and a
      # reporting aggregate) — fails the build if any registered query's
      # plan shape or cost/time regresses at the `safe` fixture scale. The
      # adversarial proof that this gate genuinely fires on a deliberately
      # bad plan lives in a dedicated integration test (never run as part
      # of this CI step, which only ever evaluates the real, currently-
      # registered budgets).
      - name: Performance query-plan budget check
        env:
          APP_ENV: test
          DATABASE_URL: "postgres://awcms_mini_app:ci-performance-app-role-password@localhost:5432/awcms-mini"
        run: bun run performance:query-plan:check -- --confirm-non-production=test

      - name: Build Astro foundation
        run: bun run build

      # Issue #685: concise failure artifact, uploaded only when something
      # above actually failed. Deliberately narrow (not the whole
      # workspace/node_modules) and log-only — no .env/DATABASE_URL/secret
      # material is written to any of these paths by the steps above (the
      # app's own structured logger never prints DATABASE_URL/secrets, see
      # src/lib/logging; the throwaway CI Postgres credential is a fixed
      # non-secret dev default already visible in .env.example, not
      # rotated/reused anywhere real).
      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: quality-failure-diagnostics
          path: |
            dist/
            !dist/**/*.map
          retention-days: 5
          if-no-files-found: ignore

  e2e-smoke:
    name: E2E smoke (Playwright)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      POSTGRES_USER: awcms-mini
      POSTGRES_PASSWORD: awcms_mini_password
      POSTGRES_DB: awcms-mini

    # Issue #685 acceptance criterion: "E2E provisions an isolated database
    # and cleans it safely." A fresh `services.postgres` container is
    # created and torn down by the runner for THIS job only — never shared
    # with the `quality` job's own Postgres service, and destroyed
    # unconditionally when the job ends (GitHub Actions service containers
    # are ephemeral per-job, not a persistent resource this workflow has to
    # clean up itself).
    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: awcms-mini
          POSTGRES_PASSWORD: awcms_mini_password
          POSTGRES_DB: awcms-mini
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awcms-mini -d awcms-mini"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Assemble ADMIN_DATABASE_URL for this job's isolated Postgres
        run: echo "ADMIN_DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply migrations (privileged role)
        run: bun run db:migrate
        env:
          DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}

      # Migration 013 creates `awcms_mini_app` NOLOGIN — mirrors
      # tests/integration/harness.ts's own provisionAppRole() (same
      # activate-with-a-throwaway-password pattern) so the running app
      # connects as the least-privilege role, exactly like production,
      # instead of the migration superuser.
      - name: Activate the least-privilege app role's login
        run: |
          bun -e '
            const sql = new Bun.SQL(process.env.ADMIN_DATABASE_URL);
            await sql.unsafe(
              `ALTER ROLE awcms_mini_app WITH LOGIN PASSWORD ${"\x27"}${process.env.APP_ROLE_PASSWORD}${"\x27"}`
            );
            await sql.end();
          '
        env:
          APP_ROLE_PASSWORD: ci-e2e-app-role-password

      - name: Build Astro foundation
        run: bun run build

      - name: Install Playwright Chromium (with OS deps)
        run: bun run test:e2e:install

      - name: Prepare .env for the app server
        run: cp .env.example .env

      # Two phases, two separate server lifecycles — NOT one server running
      # both sets of specs. `admin-security-disabled.e2e.ts` and
      # `admin-security-enabled.e2e.ts` assert opposite renders of the SAME
      # page gated on `AUTH_ONLINE_SECURITY_ENABLED`/`_PROFILE` (Issue #587),
      # a boot-time env var this app cannot toggle at runtime — discovered
      # empirically while wiring this job: running the full suite against
      # one server instance either way makes exactly one of those two specs
      # fail, not a bug in the specs themselves. Phase 1 covers every spec
      # that works against the default (gate-off) config; phase 2 restarts
      # the server with the gate on for the one spec that needs it.
      - name: "Phase 1 — start app server (default config, gate off)"
        run: |
          nohup bun run start > app-server-phase1.log 2>&1 &
          echo "APP_SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          DATABASE_URL: "postgres://awcms_mini_app:ci-e2e-app-role-password@localhost:5432/awcms-mini"
          HOST: "0.0.0.0"
          PORT: "4321"
          APP_ENV: production
          APP_URL: "http://localhost:4321"
          APP_TIMEZONE: "Asia/Jakarta"
          AUTH_JWT_SECRET: "ci-e2e-jwt-secret-not-a-real-secret"
          AUTH_COOKIE_SECURE: "false"
          # VISITOR_ANALYTICS_ENABLED now defaults to false (Issue #624 audit
          # addendum, privacy-first for new installs) — admin-analytics-
          # dashboard.e2e.ts exercises the dashboard itself and needs at
          # least one real collected session (its own page visit), so this
          # E2E run explicitly opts in rather than relying on the new
          # default, same as any deployment that wants the feature on.
          VISITOR_ANALYTICS_ENABLED: "true"

      - name: "Phase 1 — wait for app health check"
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4321/api/v1/health > /dev/null 2>&1; then
              echo "App is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "::error::App did not become healthy in time."
          cat app-server-phase1.log || true
          exit 1

      - name: "Phase 1 — run E2E specs (default config)"
        run: bun run test:e2e --grep-invert "@full-online-gate"
        env:
          E2E_BASE_URL: "http://localhost:4321"
          E2E_SEED_DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}

      - name: "Phase 1 — stop app server"
        if: always()
        run: kill "$APP_SERVER_PID" 2>/dev/null || true

      - name: "Phase 2 — start app server (full-online security gate on)"
        run: |
          nohup bun run start > app-server-phase2.log 2>&1 &
          echo "APP_SERVER_PID=$!" >> "$GITHUB_ENV"
        env:
          DATABASE_URL: "postgres://awcms_mini_app:ci-e2e-app-role-password@localhost:5432/awcms-mini"
          HOST: "0.0.0.0"
          PORT: "4321"
          APP_ENV: production
          APP_URL: "http://localhost:4321"
          APP_TIMEZONE: "Asia/Jakarta"
          AUTH_JWT_SECRET: "ci-e2e-jwt-secret-not-a-real-secret"
          AUTH_COOKIE_SECURE: "false"
          AUTH_ONLINE_SECURITY_ENABLED: "true"
          AUTH_ONLINE_SECURITY_PROFILE: "full_online"

      - name: "Phase 2 — wait for app health check"
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4321/api/v1/health > /dev/null 2>&1; then
              echo "App is healthy."
              exit 0
            fi
            sleep 2
          done
          echo "::error::App did not become healthy in time."
          cat app-server-phase2.log || true
          exit 1

      - name: "Phase 2 — run E2E specs (full-online gate enabled)"
        run: bun run test:e2e --grep "@full-online-gate"
        env:
          E2E_BASE_URL: "http://localhost:4321"
          E2E_SEED_DATABASE_URL: ${{ env.ADMIN_DATABASE_URL }}

      - name: "Phase 2 — stop app server"
        if: always()
        run: kill "$APP_SERVER_PID" 2>/dev/null || true

      # Playwright's own trace/screenshot/video artifacts (retain-on-failure
      # per playwright.config.ts) plus the app server's own stdout/stderr —
      # narrow, no .env/secret files included. The one non-placeholder
      # secret used in this job (AUTH_JWT_SECRET above) is a fixed
      # CI-only literal, never printed by the app's structured logger, and
      # not reused anywhere outside this ephemeral job run.
      - name: Upload E2E failure diagnostics
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: e2e-failure-diagnostics
          path: |
            playwright-report/
            test-results/
            app-server-phase1.log
            app-server-phase2.log
          retention-days: 5
          if-no-files-found: ignore

  hygiene:
    name: Repo hygiene (Bun-only + no secrets)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: No Node.js tooling in package scripts (Bun-only)
        run: |
          if grep -REn '"[^"]*":\s*"(npm|npx|pnpm|yarn|node) ' package.json; then
            echo "::error::package.json scripts harus Bun-only (lihat AGENTS.md aturan 14)."
            exit 1
          fi
          echo "OK: tidak ada tooling Node.js di package scripts."

      - name: No committed .env / secret files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.env\.example$'; then
            echo "::error::Berkas .env tidak boleh di-commit."
            exit 1
          fi
          echo "OK: tidak ada berkas .env yang ter-track."

      # Issue #682 (epic #679): catches syntax errors and dangling env var
      # references in either compose file before they reach a deploy — both
      # services reference `.env` via `env_file:`, so a throwaway copy of
      # .env.example (never real secrets) is enough for `config` to resolve.
      - name: Validate docker-compose.yml + docker-compose.prod.yml syntax
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config -q
          docker compose -f docker-compose.yml --profile pgbouncer config -q
          docker compose -f docker-compose.prod.yml config -q
          rm .env
          echo "OK: kedua compose file valid."
