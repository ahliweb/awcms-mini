# CI AWCMS-Mini — kualitas dokumentasi, unit test, & hygiene (Bun-only).
# Repo saat ini foundation skeleton + tooling; gate build aktif sejak Issue 0.1.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality (lint + docs + typecheck + test)
    runs-on: ubuntu-latest

    # PostgreSQL service so the integration suite (tests/integration/**) runs
    # against a real database on every PR. The pure-unit suite skips these
    # tests when DATABASE_URL is unset (see tests/integration/harness.ts), so
    # local `bun test` without a database stays green; here DATABASE_URL points
    # at this service and the migration runner provisions the schema before the
    # suite runs.
    # POSTGRES_* are the non-secret local/CI development defaults (the same
    # values documented in .env.example). They are assigned as discrete env
    # vars — never composed into a literal `postgres://user:pass@host` URL in
    # this file — so secret scanners don't flag a throwaway CI credential as a
    # leaked connection string; DATABASE_URL is assembled at runtime below.
    env:
      POSTGRES_USER: awcms-mini
      POSTGRES_PASSWORD: awcms_mini_password
      POSTGRES_DB: awcms-mini

    services:
      postgres:
        image: postgres:18.4
        env:
          POSTGRES_USER: awcms-mini
          POSTGRES_PASSWORD: awcms_mini_password
          POSTGRES_DB: awcms-mini
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U awcms-mini -d awcms-mini"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Assemble DATABASE_URL for the integration DB
        run: echo "DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@localhost:5432/${POSTGRES_DB}" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Prettier check
        run: bun run lint

      - name: Docs checks (mermaid, internal links, naming)
        run: bun run check:docs

      - name: Typecheck (tsc --noEmit)
        run: bun run typecheck

      - name: Apply migrations (integration DB)
        run: bun run db:migrate

      - name: Unit + integration tests (bun test)
        run: bun test

      - name: Build Astro foundation
        run: bun run build

  hygiene:
    name: Repo hygiene (Bun-only + no secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: No Node.js tooling in package scripts (Bun-only)
        run: |
          if grep -REn '"[^"]*":\s*"(npm|npx|pnpm|yarn|node) ' package.json; then
            echo "::error::package.json scripts harus Bun-only (lihat AGENTS.md aturan 14)."
            exit 1
          fi
          echo "OK: tidak ada tooling Node.js di package scripts."

      - name: No committed .env / secret files
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '\.env\.example$'; then
            echo "::error::Berkas .env tidak boleh di-commit."
            exit 1
          fi
          echo "OK: tidak ada berkas .env yang ter-track."
