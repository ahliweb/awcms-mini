name: Redis format diagnostic

on:
  pull_request:
    paths:
      - ".changeset/redis-readiness-890.md"
      - "config/redis.env.example"
      - "docker-compose.redis.yml"
      - "docs/awcms-mini/redis-readiness.md"
      - "docs/awcms-mini/repo-inventory.md"
      - "package.json"
      - "scripts/redis-health.ts"
      - "src/lib/redis/**"
      - "tests/unit/redis-foundation.test.ts"
      - ".github/workflows/redis-format-diagnostic.yml"

permissions:
  contents: read

jobs:
  format:
    name: Focused Prettier diagnostic
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: List differently formatted files
        run: |
          bunx prettier --list-different \
            .changeset/redis-readiness-890.md \
            docker-compose.redis.yml \
            docs/awcms-mini/redis-readiness.md \
            docs/awcms-mini/repo-inventory.md \
            package.json \
            scripts/redis-health.ts \
            src/lib/redis/cache.ts \
            src/lib/redis/client.ts \
            src/lib/redis/config.ts \
            tests/unit/redis-foundation.test.ts
