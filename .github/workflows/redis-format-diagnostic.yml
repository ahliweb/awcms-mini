name: Redis format diagnostic

on:
  pull_request:
    paths:
      - ".changeset/redis-readiness-890.md"
      - "config/redis.env.example"
      - "docker-compose.redis.yml"
      - "docs/awcms-mini/redis-readiness.md"
      - "docs/awcms-mini/repo-inventory.md"
      - "package.json"
      - "scripts/redis-health.ts"
      - "src/lib/redis/**"
      - "tests/unit/redis-foundation.test.ts"
      - ".github/workflows/redis-format-diagnostic.yml"

permissions:
  contents: read

jobs:
  format:
    name: Focused Prettier diagnostic
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Fetch pull-request merge commit
        run: |
          git init . >/dev/null
          git remote add origin https://github.com/${GITHUB_REPOSITORY}.git
          git fetch --depth=1 origin "${GITHUB_SHA}" >/dev/null 2>&1
          git checkout --detach FETCH_HEAD >/dev/null 2>&1

      - name: Install focused formatter
        run: npm install --silent --no-save prettier@3.9.5 prettier-plugin-astro@0.14.1

      - name: List differently formatted files
        run: |
          npx prettier --list-different \
            .changeset/redis-readiness-890.md \
            docker-compose.redis.yml \
            docs/awcms-mini/redis-readiness.md \
            docs/awcms-mini/repo-inventory.md \
            package.json \
            scripts/redis-health.ts \
            src/lib/redis/cache.ts \
            src/lib/redis/client.ts \
            src/lib/redis/config.ts \
            tests/unit/redis-foundation.test.ts
