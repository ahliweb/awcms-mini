# Changesets policy gate — Issue #692 (epic #679, platform-hardening)
# acceptance criterion: "Pull requests verify required Changesets according
# to policy." Separate from `ci.yml`'s `quality` job on purpose: this check
# is inherently PR-diff-shaped (it compares the PR's changed files against
# `main`), unlike every step in `bun run check`, which is self-contained
# and safe to run on any single checkout — folding this into `check` would
# make local `bun run check` depend on having `origin/main` fetched, which
# isn't guaranteed outside CI. See `scripts/changeset-policy-check.ts` for
# the policy itself (which paths are exempt) and why.
name: Changesets policy

on:
  pull_request:
    branches: [main]

concurrency:
  group: changesets-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  policy-check:
    name: Changeset required for behavior changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history, not a shallow checkout (reviewer Critical finding
          # on PR #715, confirmed live via this PR's own first CI run): the
          # policy check below diffs `origin/main...HEAD` (triple-dot,
          # requires a computable merge-base). A depth-1 checkout plus a
          # depth-1 fetch of main's tip gives git no shared history to find
          # a merge-base from, so the diff fails with "no merge base" (exit
          # 128) for any branch that isn't a trivial fast-forward of main's
          # exact tip — i.e. effectively every real feature branch. See the
          # matching fix/comment on release.yml's ancestor guard.
          fetch-depth: 0

      - name: Fetch base branch tip for diffing
        run: git fetch origin main

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: "1.3.14"

      - name: Cache Bun install cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify required changeset(s) for this PR's changes
        run: bun run changesets:policy:check
        env:
          CHANGESET_POLICY_BASE_REF: origin/main
