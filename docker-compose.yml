services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: awcms_mini
      POSTGRES_USER: awcms
      POSTGRES_PASSWORD: awcms_password
    ports:
      - "5432:5432"
    volumes:
      - awcms_mini_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U awcms -d awcms_mini"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  awcms_mini_postgres:
