# docker-compose.yml — LAN-first single-server stack (Issue 12.2, doc 18
# §Topologi deployment LAN-first, doc 07 §Profil per-environment).
#
# Default stack: `app` + `db` on one server, matching doc 18's offline/LAN
# topology (one machine runs the application and PostgreSQL together;
# clients on the LAN hit the app directly, no internet dependency). See
# `docs/awcms-mini/deployment-profiles.md` for how this maps to each
# environment profile, and `deploy/` for the systemd/nginx/pgbouncer/backup
# assets this compose file complements rather than replaces (systemd is the
# bare-metal alternative to `app`; this file is the containerized one).
#
# Usage:
#   cp .env.example .env      # then edit secrets/config as needed
#   export APP_UID=$(id -u) APP_GID=$(id -g)   # see `app.user` note below
#   docker compose up --build
#   curl http://localhost:4321/api/v1/health
#
# `app` image choice: no separate Dockerfile. This mounts the repository
# into `oven/bun:1` (never `node` — AGENTS.md rule 14, doc 18 §Runtime &
# tooling) and runs `bun install && bun run build && bun ./dist/server/entry.mjs`
# as the container command. This is the simplest option for a LAN-first,
# single-server, offline-capable deployment where operators are expected to
# `git pull`/rebuild in place; it trades a slightly slower container start
# (install + build happen every `up`) for zero extra Dockerfile/image-layer
# maintenance. A multi-stage Dockerfile producing a slim pre-built image
# would start faster and be preferable for a registry-based/CI-pushed
# deployment — revisit if this project grows a container registry
# workflow; not needed for the LAN-first base case this issue targets.
services:
  db:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      # Matches the default DATABASE_URL documented in .env.example — a
      # fresh `docker compose up` works out of the box against that file.
      # Override via `.env`/shell env for a real deployment; never hardcode
      # real credentials here (doc 10/18 "secrets only from environment").
      POSTGRES_USER: ${POSTGRES_USER:-awcms-mini}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-awcms_mini_password}
      POSTGRES_DB: ${POSTGRES_DB:-awcms-mini}
      # Consumed once, at first-cluster-init, by the mounted
      # deploy/postgres/10-create-app-role.sh hook to create the
      # least-privilege `awcms_mini_app` login the `app` service connects as
      # (so FORCE'd RLS is enforced — the `db` superuser would bypass it). The
      # dev default keeps a fresh `docker compose up` working out of the box;
      # override it (and app's DATABASE_URL below) for any real deployment.
      AWCMS_MINI_APP_DB_PASSWORD: ${AWCMS_MINI_APP_DB_PASSWORD:-awcms_mini_app_password}
      # Issue #683 (epic #679): consumed once, at first-cluster-init, by
      # deploy/postgres/11-create-worker-setup-roles.sh to grant LOGIN to the
      # `awcms_mini_worker`/`awcms_mini_setup` roles migration 045 creates
      # (NOLOGIN by default). Unlike AWCMS_MINI_APP_DB_PASSWORD, these are
      # genuinely optional — leaving either unset keeps that role NOLOGIN,
      # and WORKER_DATABASE_URL/SETUP_DATABASE_URL below fall back to
      # DATABASE_URL (the app role) when unset, so a default `docker compose
      # up` still works with zero role-separation config.
      AWCMS_MINI_WORKER_DB_PASSWORD: ${AWCMS_MINI_WORKER_DB_PASSWORD:-}
      AWCMS_MINI_SETUP_DB_PASSWORD: ${AWCMS_MINI_SETUP_DB_PASSWORD:-}
    volumes:
      # Mount at /var/lib/postgresql (NOT /var/lib/postgresql/data): the
      # postgres:18+ images store data in a major-version subdirectory
      # (…/18/docker) and refuse to start if a volume is mounted at the old
      # /data path (they detect it as a stale pre-18 layout). See
      # docker-library/postgres#1259. An operator upgrading a pre-18 cluster
      # must pg_dump/pg_restore into a fresh volume, not swap the image tag.
      - awcms-mini-db-data:/var/lib/postgresql
      # First-init hooks (run once, as the superuser, on an empty data volume):
      # creates the least-privilege app role. The table GRANTs + FORCE RLS come
      # from migration 013 via the `migrate` service. Re-running against an
      # existing volume does NOT re-run these — migration 013 is idempotent
      # about the role already existing, so both orders converge.
      - ./deploy/postgres:/docker-entrypoint-initdb.d:ro
    ports:
      # Host-facing port for local development convenience (psql from the
      # host, GUI clients, etc.). Not required by `app`, which talks to
      # `db` over the internal compose network. Remove/firewall this
      # mapping for a hardened production/offline-LAN deployment where the
      # database should not be reachable outside the compose network at all
      # (doc 07 §Production readiness checklist "PostgreSQL tidak public").
      - "5432:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-awcms-mini} -d ${POSTGRES_DB:-awcms-mini}"
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot migration runner. Runs `bun run db:migrate` as the PRIVILEGED
  # (owner/superuser) role and exits — the app must NOT run migrations, since
  # it connects as the least-privilege role that lacks DDL/GRANT rights. `app`
  # gates on this completing successfully (`service_completed_successfully`),
  # so a plain `docker compose up` orders it correctly: db init creates the
  # role -> migrate applies schema + FORCE RLS + grants -> app starts.
  migrate:
    image: oven/bun:1
    working_dir: /app
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    volumes:
      - .:/app
    command: sh -c "bun install --frozen-lockfile && bun run db:migrate"
    environment:
      # Privileged URL — migrations create the app role, FORCE RLS, and GRANT
      # (owner-only operations). Never the least-privilege app credentials.
      DATABASE_URL: postgres://${POSTGRES_USER:-awcms-mini}:${POSTGRES_PASSWORD:-awcms_mini_password}@db:5432/${POSTGRES_DB:-awcms-mini}
      HOME: /tmp
    restart: "no"
    depends_on:
      db:
        condition: service_healthy

  app:
    image: oven/bun:1
    restart: unless-stopped
    working_dir: /app
    # Runs as the host user instead of the image's default root — otherwise
    # `bun install`/`bun run build` write root-owned files
    # (node_modules/.vite, dist/) into the bind-mounted repo, which then
    # blocks the *host* user from running `bun run build`/`bun install` on
    # the same checkout afterwards (a real gotcha hit and fixed during this
    # issue's live verification: on a host directory with a restrictive
    # mode, e.g. `700`, a *wrong* uid/gid guess — such as a hardcoded
    # default of 1000:1000 that doesn't match the real host user — fails
    # even harder, with `EACCES` on every file, since only the exact owning
    # uid can traverse into such a directory). Always export APP_UID/APP_GID
    # to your real host user before `docker compose up` (see the usage
    # comment above); the `1000:1000` fallback below only exists so
    # `docker compose config` has something to substitute when the
    # variables are unset (e.g. a syntax check in CI), not as a safe
    # standalone default.
    user: "${APP_UID:-1000}:${APP_GID:-1000}"
    volumes:
      - .:/app
    # `bun install` runs on every `up` so the container always matches the
    # mounted source tree/lockfile; acceptable for the LAN-first target.
    # HOME is set explicitly because the container's non-root uid has no
    # passwd entry (bind-mounted repo, not a real image user) — without it
    # Bun/Vite cache lookups can fail trying to resolve a home directory.
    command: sh -c "bun install && bun run build && bun ./dist/server/entry.mjs"
    env_file:
      # Copy .env.example to .env before running `docker compose up` — this
      # file is git-ignored and never committed (doc 18 §Prinsip
      # konfigurasi). Run `bun run config:validate` to check it before
      # boot.
      - .env
    environment:
      # This intentionally overrides whatever `.env` contains, for two reasons:
      # (1) inside the compose network PostgreSQL is reachable at the `db`
      # service name, not `localhost` (each container has its own network
      # namespace); (2) the app connects as the LEAST-PRIVILEGE `awcms_mini_app`
      # role — NOT the `db` superuser — so FORCE'd RLS is actually enforced (a
      # superuser/owner bypasses RLS). `.env.example`'s default DATABASE_URL
      # uses `localhost` + the app role for the non-container/systemd case.
      DATABASE_URL: postgres://awcms_mini_app:${AWCMS_MINI_APP_DB_PASSWORD:-awcms_mini_app_password}@db:5432/${POSTGRES_DB:-awcms-mini}
      # Issue #683 (epic #679): only meaningful when AWCMS_MINI_WORKER_DB_PASSWORD/
      # AWCMS_MINI_SETUP_DB_PASSWORD above are also set (that role must have
      # LOGIN or these URLs simply won't authenticate). Left as the literal
      # empty string otherwise, which src/lib/database/client.ts's
      # getWorkerDatabaseClient()/getSetupDatabaseClient() treat the same as
      # "unset" and fall back to DATABASE_URL. The 7 unattended worker
      # scripts run via `docker compose exec app bun run <script>` in this
      # repo's deployment model (no separate worker service), so they need
      # this on the `app` service's environment, not a new service.
      WORKER_DATABASE_URL: ${AWCMS_MINI_WORKER_DB_PASSWORD:+postgres://awcms_mini_worker:${AWCMS_MINI_WORKER_DB_PASSWORD}@db:5432/${POSTGRES_DB:-awcms-mini}}
      SETUP_DATABASE_URL: ${AWCMS_MINI_SETUP_DB_PASSWORD:+postgres://awcms_mini_setup:${AWCMS_MINI_SETUP_DB_PASSWORD}@db:5432/${POSTGRES_DB:-awcms-mini}}
      HOST: "0.0.0.0"
      PORT: "4321"
      HOME: /tmp
    ports:
      - "4321:4321"
    depends_on:
      db:
        condition: service_healthy
      # Schema + FORCE RLS + grants must be in place (as the superuser) before
      # the least-privilege app starts — it cannot create them itself.
      migrate:
        condition: service_completed_successfully

  # Optional PgBouncer front-end for the `db` service — gated behind the
  # "pgbouncer" Compose profile so it never starts by default (doc 18's
  # LAN-first topology does not need it; see
  # deploy/pgbouncer/pgbouncer.ini.example and
  # docs/awcms-mini/database-pooling.md §7). Enable explicitly with:
  #   docker compose --profile pgbouncer up
  # This illustrates the shape of the service only: `auth_type = md5` in
  # the mounted example .ini requires a real `userlist.txt` with hashed
  # credentials, which this compose file does not generate (a secret file,
  # never committed) — provide your own via an additional volume mount
  # before relying on this profile.
  pgbouncer:
    image: edoburu/pgbouncer:latest
    profiles: ["pgbouncer"]
    restart: unless-stopped
    volumes:
      - ./deploy/pgbouncer/pgbouncer.ini.example:/etc/pgbouncer/pgbouncer.ini:ro
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy

volumes:
  awcms-mini-db-data:
