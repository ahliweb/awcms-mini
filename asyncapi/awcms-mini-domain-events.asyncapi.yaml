asyncapi: 3.0.0
info:
  title: AWCMS-Mini Domain Events
  version: 1.0.0
  description: >-
    Stable AsyncAPI contract for AWCMS-Mini domain events and sync
    envelopes (ADR-0008 — contract version is independent of the package
    release version; bumped only when the contract shape itself changes).
defaultContentType: application/json
servers:
  local:
    host: localhost:4321
    protocol: http
    description: Local AWCMS-Mini runtime.
channels:
  awcms-mini.sync.push.requested:
    address: awcms-mini.sync.push.requested
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: Baseline sync push event envelope for future sync-storage implementation.
  awcms-mini.database.pool.saturated:
    address: awcms-mini.database.pool.saturated
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      Emitted when a work-class concurrency gate times out a queued caller
      (Issue 10.2, doc 16 §Connection pooling dan backpressure, doc 05 "DB
      Connectivity" category). Documented contract only — this repo has no
      live pub/sub dispatcher for any domain event yet; the concrete producer
      is the structured JSON logger (`src/lib/logging/logger.ts`) invoked
      from `withTenant` (`src/lib/database/tenant-context.ts`), consistent
      with how AsyncAPI events have been documented since Issue 0.3 without
      requiring a live producer.
  awcms-mini.email.message.queued:
    address: awcms-mini.email.message.queued
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      An email message was enqueued into `awcms_mini_email_messages` (Issue
      #494/#497). Documented contract only, same convention as
      `database.pool.saturated` above — the concrete producer is the
      structured JSON logger, invoked from
      `email/application/announcement-directory.ts`'s `enqueueAnnouncement`
      (`email.message.queued` log line).
  awcms-mini.email.message.sent:
    address: awcms-mini.email.message.sent
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher (Issue #495, `bun run email:dispatch`)
      successfully delivered a message through the configured provider.
      Documented contract only; producer is the structured JSON logger
      (`email/application/email-dispatch.ts`'s `email.dispatch.sent` log
      line).
  awcms-mini.email.message.failed:
    address: awcms-mini.email.message.failed
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher exhausted retries (or hit a non-retryable
      failure) for a queued message. Documented contract only; producer is
      the structured JSON logger (`email/application/email-dispatch.ts`'s
      `email.dispatch.failed` log line).
operations:
  publishSyncPushRequested:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.sync.push.requested"
    messages:
      - $ref: "#/channels/awcms-mini.sync.push.requested/messages/DomainEvent"
  publishDatabasePoolSaturated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.database.pool.saturated"
    messages:
      - $ref: "#/channels/awcms-mini.database.pool.saturated/messages/DomainEvent"
  publishEmailMessageQueued:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.queued"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.queued/messages/DomainEvent"
  publishEmailMessageSent:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.sent"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.sent/messages/DomainEvent"
  publishEmailMessageFailed:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.failed"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.failed/messages/DomainEvent"
components:
  securitySchemes:
    syncHmac:
      type: httpApiKey
      in: header
      name: X-AWCMS-Mini-Signature
      description: HMAC signature paired with X-AWCMS-Mini-Node-ID and X-AWCMS-Mini-Timestamp.
  messages:
    DomainEvent:
      name: DomainEvent
      title: AWCMS-Mini domain event envelope
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
      headers:
        type: object
        required:
          - X-AWCMS-Mini-Node-ID
          - X-AWCMS-Mini-Timestamp
          - X-AWCMS-Mini-Signature
        properties:
          X-AWCMS-Mini-Node-ID:
            type: string
          X-AWCMS-Mini-Timestamp:
            type: string
            format: date-time
          X-AWCMS-Mini-Signature:
            type: string
  schemas:
    DomainEventEnvelope:
      type: object
      required:
        - event_id
        - event_type
        - occurred_at
        - producer
        - payload
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          pattern: "^[a-z0-9]+(\\.[a-z0-9_]+)+$"
        occurred_at:
          type: string
          format: date-time
        producer:
          type: object
          required:
            - service
            - module
          additionalProperties: false
          properties:
            service:
              type: string
              const: awcms-mini
            module:
              type: string
        tenant_id:
          type:
            - string
            - "null"
          format: uuid
        correlation_id:
          type:
            - string
            - "null"
        payload:
          type: object
          additionalProperties: true
