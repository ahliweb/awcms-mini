asyncapi: 3.0.0
info:
  title: AWCMS-Mini Domain Events
  version: 0.1.0
  description: >
    Kontrak domain event base AWCMS-Mini (doc 05). Semua event baru/berubah
    WAJIB diperbarui di file ini. Semua event memakai envelope standard
    DomainEventEnvelope dan tidak boleh membawa raw sensitive data.
channels:
  tenant.created:
    address: tenant.created
    messages:
      tenantCreated:
        $ref: "#/components/messages/TenantCreated"
  tenant.office.updated:
    address: tenant.office.updated
    messages:
      tenantOfficeUpdated:
        $ref: "#/components/messages/TenantOfficeUpdated"
  identity.login.succeeded:
    address: identity.login.succeeded
    messages:
      identityLoginSucceeded:
        $ref: "#/components/messages/IdentityLoginSucceeded"
  identity.login.failed:
    address: identity.login.failed
    messages:
      identityLoginFailed:
        $ref: "#/components/messages/IdentityLoginFailed"
  profile.created:
    address: profile.created
    messages:
      profileCreated:
        $ref: "#/components/messages/ProfileCreated"
  profile.merged:
    address: profile.merged
    messages:
      profileMerged:
        $ref: "#/components/messages/ProfileMerged"
  security.event.recorded:
    address: security.event.recorded
    messages:
      securityEventRecorded:
        $ref: "#/components/messages/SecurityEventRecorded"
  workflow.task.approved:
    address: workflow.task.approved
    messages:
      workflowTaskApproved:
        $ref: "#/components/messages/WorkflowTaskApproved"
  workflow.task.rejected:
    address: workflow.task.rejected
    messages:
      workflowTaskRejected:
        $ref: "#/components/messages/WorkflowTaskRejected"
  sync.conflict.detected:
    address: sync.conflict.detected
    messages:
      syncConflictDetected:
        $ref: "#/components/messages/SyncConflictDetected"
  access.assignment.changed:
    address: access.assignment.changed
    messages:
      accessAssignmentChanged:
        $ref: "#/components/messages/AccessAssignmentChanged"
  database.pool.saturated:
    address: database.pool.saturated
    messages:
      databasePoolSaturated:
        $ref: "#/components/messages/DatabasePoolSaturated"
  security.golive.blocked:
    address: security.golive.blocked
    messages:
      securityGoliveBlocked:
        $ref: "#/components/messages/SecurityGoliveBlocked"
operations:
  publishTenantCreated:
    action: send
    channel:
      $ref: "#/channels/tenant.created"
  publishIdentityLoginSucceeded:
    action: send
    channel:
      $ref: "#/channels/identity.login.succeeded"
  publishIdentityLoginFailed:
    action: send
    channel:
      $ref: "#/channels/identity.login.failed"
  publishProfileCreated:
    action: send
    channel:
      $ref: "#/channels/profile.created"
  publishAccessAssignmentChanged:
    action: send
    channel:
      $ref: "#/channels/access.assignment.changed"
  publishDatabasePoolSaturated:
    action: send
    channel:
      $ref: "#/channels/database.pool.saturated"
  publishSecurityGoliveBlocked:
    action: send
    channel:
      $ref: "#/channels/security.golive.blocked"
components:
  messages:
    TenantCreated:
      name: tenant.created
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    TenantOfficeUpdated:
      name: tenant.office.updated
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    ProfileMerged:
      name: profile.merged
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    SecurityEventRecorded:
      name: security.event.recorded
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    WorkflowTaskApproved:
      name: workflow.task.approved
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    WorkflowTaskRejected:
      name: workflow.task.rejected
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    SyncConflictDetected:
      name: sync.conflict.detected
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    IdentityLoginSucceeded:
      name: identity.login.succeeded
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    IdentityLoginFailed:
      name: identity.login.failed
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    ProfileCreated:
      name: profile.created
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    AccessAssignmentChanged:
      name: access.assignment.changed
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    DatabasePoolSaturated:
      name: database.pool.saturated
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
    SecurityGoliveBlocked:
      name: security.golive.blocked
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
  schemas:
    DomainEventEnvelope:
      type: object
      required:
        - eventId
        - eventType
        - eventVersion
        - tenantId
        - aggregateType
        - aggregateId
        - occurredAt
        - payload
        - metadata
      properties:
        eventId:
          type: string
          format: uuid
        eventType:
          type: string
        eventVersion:
          type: string
        tenantId:
          type: string
          format: uuid
        nodeId:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
        occurredAt:
          type: string
          format: date-time
        actor:
          type: object
          properties:
            tenantUserId:
              type: string
              format: uuid
            profileId:
              type: string
              format: uuid
        correlationId:
          type: string
        causationId:
          type: string
        payload:
          type: object
        metadata:
          type: object
          required: [sourceModule, schemaVersion]
          properties:
            sourceModule:
              type: string
            schemaVersion:
              type: string
