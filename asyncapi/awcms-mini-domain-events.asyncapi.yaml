asyncapi: 3.0.0
info:
  title: AWCMS-Mini Domain Events
  version: 1.0.0
  description: >-
    Stable AsyncAPI contract for AWCMS-Mini domain events and sync
    envelopes (ADR-0008 — contract version is independent of the package
    release version; bumped only when the contract shape itself changes).
defaultContentType: application/json
servers:
  local:
    host: localhost:4321
    protocol: http
    description: Local AWCMS-Mini runtime.
channels:
  awcms-mini.sync.push.requested:
    address: awcms-mini.sync.push.requested
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: Baseline sync push event envelope for future sync-storage implementation.
  awcms-mini.database.pool.saturated:
    address: awcms-mini.database.pool.saturated
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      Emitted when a work-class concurrency gate times out a queued caller
      (Issue 10.2, doc 16 §Connection pooling dan backpressure, doc 05 "DB
      Connectivity" category). Documented contract only — this repo has no
      live pub/sub dispatcher for any domain event yet; the concrete producer
      is the structured JSON logger (`src/lib/logging/logger.ts`) invoked
      from `withTenant` (`src/lib/database/tenant-context.ts`), consistent
      with how AsyncAPI events have been documented since Issue 0.3 without
      requiring a live producer.
  awcms-mini.email.message.queued:
    address: awcms-mini.email.message.queued
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      An email message was enqueued into `awcms_mini_email_messages` (Issue
      #494/#497). Documented contract only, same convention as
      `database.pool.saturated` above — the concrete producer is the
      structured JSON logger, invoked from
      `email/application/announcement-directory.ts`'s `enqueueAnnouncement`
      (`email.message.queued` log line).
  awcms-mini.email.message.sent:
    address: awcms-mini.email.message.sent
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher (Issue #495, `bun run email:dispatch`)
      successfully delivered a message through the configured provider.
      Documented contract only; producer is the structured JSON logger
      (`email/application/email-dispatch.ts`'s `email.dispatch.sent` log
      line).
  awcms-mini.email.message.failed:
    address: awcms-mini.email.message.failed
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher exhausted retries (or hit a non-retryable
      failure) for a queued message. Documented contract only; producer is
      the structured JSON logger (`email/application/email-dispatch.ts`'s
      `email.dispatch.failed` log line).
  awcms-mini.email.message.suppressed:
    address: awcms-mini.email.message.suppressed
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      The email dispatcher (Issue #499) found a claimed message's recipient
      newly present on `awcms_mini_email_suppression_list` (added after
      enqueue, before dispatch) and skipped the provider call entirely.
      Documented contract only; producer is the structured JSON logger
      (`email/application/email-dispatch.ts`'s `email.dispatch.suppressed`
      log line).
  awcms-mini.email.message.cancelled:
    address: awcms-mini.email.message.cancelled
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      An operator cancelled a still-queued message (Issue #499,
      `POST /api/v1/email/messages/{id}/cancel`) — the technical mitigation
      for the "accidental bulk send" incident scenario. Documented contract
      only; producer is the structured JSON logger, invoked from
      `pages/api/v1/email/messages/[id]/cancel.ts` (`email.message.cancelled`
      log line).
  awcms-mini.blog-content.post.created:
    address: awcms-mini.blog-content.post.created
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post draft was created (Issue #538/#541). Documented contract
      only, same convention as the email channels above — producer is the
      structured JSON logger, invoked from
      `pages/api/v1/blog/posts/index.ts`'s `POST` handler
      (`blog-content.post.created` log line).
  awcms-mini.blog-content.post.updated:
    address: awcms-mini.blog-content.post.updated
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post was updated (Issue #538/#541). Documented contract only;
      producer is the structured JSON logger, invoked from
      `pages/api/v1/blog/posts/[id].ts`'s `PATCH` handler
      (`blog-content.post.updated` log line).
  awcms-mini.blog-content.post.submitted-for-review:
    address: awcms-mini.blog-content.post.submitted-for-review
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post moved from `draft`/`review` into `review` (Issue
      #538/#541). Documented contract only; producer is the structured JSON
      logger, invoked from
      `pages/api/v1/blog/posts/[id]/submit-review.ts`
      (`blog-content.post.submitted-for-review` log line).
  awcms-mini.blog-content.post.published:
    address: awcms-mini.blog-content.post.published
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post transitioned to `published` (Issue #538/#541), either via
      the admin `POST /api/v1/blog/posts/{id}/publish` action or the
      `bun run blog:publish:scheduled` job publishing a due `scheduled`
      post. Documented contract only; producer is the structured JSON
      logger, invoked from `pages/api/v1/blog/posts/[id]/publish.ts` and
      `blog-content/application/blog-scheduled-publish.ts`
      (`blog-content.post.published` log line, `trigger` attribute
      distinguishes the two callers).
  awcms-mini.blog-content.post.scheduled:
    address: awcms-mini.blog-content.post.scheduled
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post was scheduled for future publication (Issue #538/#541).
      Documented contract only; producer is the structured JSON logger,
      invoked from `pages/api/v1/blog/posts/[id]/schedule.ts`
      (`blog-content.post.scheduled` log line).
  awcms-mini.blog-content.post.archived:
    address: awcms-mini.blog-content.post.archived
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post was archived (Issue #538/#541). Documented contract only;
      producer is the structured JSON logger, invoked from
      `pages/api/v1/blog/posts/[id]/archive.ts`
      (`blog-content.post.archived` log line).
  awcms-mini.blog-content.post.deleted:
    address: awcms-mini.blog-content.post.deleted
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post was soft-deleted (Issue #538/#541). Documented contract
      only; producer is the structured JSON logger, invoked from
      `pages/api/v1/blog/posts/[id].ts`'s `DELETE` handler
      (`blog-content.post.deleted` log line).
  awcms-mini.blog-content.post.restored:
    address: awcms-mini.blog-content.post.restored
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A soft-deleted blog post was restored (Issue #538/#541 — not to be
      confused with `revision.created`, which fires when a *revision* is
      restored onto the live post). Documented contract only; producer is
      the structured JSON logger, invoked from
      `pages/api/v1/blog/posts/[id]/restore.ts`
      (`blog-content.post.restored` log line).
  awcms-mini.blog-content.post.purged:
    address: awcms-mini.blog-content.post.purged
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A blog post was hard-deleted (Issue #538/#541). Documented contract
      only; producer is the structured JSON logger, invoked from
      `pages/api/v1/blog/posts/[id]/purge.ts`
      (`blog-content.post.purged` log line).
  awcms-mini.blog-content.revision.created:
    address: awcms-mini.blog-content.revision.created
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A new row was appended to `awcms_mini_blog_revisions` (Issue #541) —
      either a significant title/contentJson/contentText change on
      `PATCH /api/v1/blog/{posts,pages}/{id}`, or a revision restore
      (`POST /api/v1/blog/posts/{id}/revisions/{revisionId}/restore`)
      appending the restored snapshot. `awcms_mini_blog_revisions` is
      append-only — this event never corresponds to an `UPDATE`/`DELETE` of
      an existing revision row. Documented contract only; producer is the
      structured JSON logger, invoked from
      `blog-content/application/blog-revision-directory.ts`'s
      `createBlogRevision` (`blog-content.revision.created` log line).
  awcms-mini.blog-content.term.created:
    address: awcms-mini.blog-content.term.created
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A taxonomy term (category/tag) was created (Issue #539/#541).
      Documented contract only; producer is the structured JSON logger,
      invoked from `pages/api/v1/blog/terms/index.ts`'s `POST` handler
      (`blog-content.term.created` log line).
  awcms-mini.blog-content.term.updated:
    address: awcms-mini.blog-content.term.updated
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      A taxonomy term (category/tag) was updated (Issue #539/#541).
      Documented contract only; producer is the structured JSON logger,
      invoked from `pages/api/v1/blog/terms/[id].ts`'s `PATCH` handler
      (`blog-content.term.updated` log line).
  awcms-mini.blog-content.settings.updated:
    address: awcms-mini.blog-content.settings.updated
    messages:
      DomainEvent:
        $ref: "#/components/messages/DomainEvent"
    description: >-
      Reserved for when `awcms_mini_blog_settings` (migration 026) gets a
      write route — the `blog_content.settings.configure` permission was
      seeded in Issue #537 but no endpoint consumes it yet. Documented
      contract only, no current producer (unlike every other channel in
      this module) — listed now per doc issue #541's required AsyncAPI
      event set so the contract is complete ahead of the route landing in a
      later issue.
operations:
  publishSyncPushRequested:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.sync.push.requested"
    messages:
      - $ref: "#/channels/awcms-mini.sync.push.requested/messages/DomainEvent"
  publishDatabasePoolSaturated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.database.pool.saturated"
    messages:
      - $ref: "#/channels/awcms-mini.database.pool.saturated/messages/DomainEvent"
  publishEmailMessageQueued:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.queued"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.queued/messages/DomainEvent"
  publishEmailMessageSent:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.sent"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.sent/messages/DomainEvent"
  publishEmailMessageFailed:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.failed"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.failed/messages/DomainEvent"
  publishEmailMessageSuppressed:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.suppressed"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.suppressed/messages/DomainEvent"
  publishEmailMessageCancelled:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.email.message.cancelled"
    messages:
      - $ref: "#/channels/awcms-mini.email.message.cancelled/messages/DomainEvent"
  publishBlogContentPostCreated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.created"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.created/messages/DomainEvent"
  publishBlogContentPostUpdated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.updated"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.updated/messages/DomainEvent"
  publishBlogContentPostSubmittedForReview:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.submitted-for-review"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.submitted-for-review/messages/DomainEvent"
  publishBlogContentPostPublished:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.published"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.published/messages/DomainEvent"
  publishBlogContentPostScheduled:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.scheduled"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.scheduled/messages/DomainEvent"
  publishBlogContentPostArchived:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.archived"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.archived/messages/DomainEvent"
  publishBlogContentPostDeleted:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.deleted"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.deleted/messages/DomainEvent"
  publishBlogContentPostRestored:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.restored"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.restored/messages/DomainEvent"
  publishBlogContentPostPurged:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.post.purged"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.post.purged/messages/DomainEvent"
  publishBlogContentRevisionCreated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.revision.created"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.revision.created/messages/DomainEvent"
  publishBlogContentTermCreated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.term.created"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.term.created/messages/DomainEvent"
  publishBlogContentTermUpdated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.term.updated"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.term.updated/messages/DomainEvent"
  publishBlogContentSettingsUpdated:
    action: send
    channel:
      $ref: "#/channels/awcms-mini.blog-content.settings.updated"
    messages:
      - $ref: "#/channels/awcms-mini.blog-content.settings.updated/messages/DomainEvent"
components:
  securitySchemes:
    syncHmac:
      type: httpApiKey
      in: header
      name: X-AWCMS-Mini-Signature
      description: HMAC signature paired with X-AWCMS-Mini-Node-ID and X-AWCMS-Mini-Timestamp.
  messages:
    DomainEvent:
      name: DomainEvent
      title: AWCMS-Mini domain event envelope
      payload:
        $ref: "#/components/schemas/DomainEventEnvelope"
      headers:
        type: object
        required:
          - X-AWCMS-Mini-Node-ID
          - X-AWCMS-Mini-Timestamp
          - X-AWCMS-Mini-Signature
        properties:
          X-AWCMS-Mini-Node-ID:
            type: string
          X-AWCMS-Mini-Timestamp:
            type: string
            format: date-time
          X-AWCMS-Mini-Signature:
            type: string
  schemas:
    DomainEventEnvelope:
      type: object
      required:
        - event_id
        - event_type
        - occurred_at
        - producer
        - payload
      additionalProperties: false
      properties:
        event_id:
          type: string
          format: uuid
        event_type:
          type: string
          pattern: "^[a-z0-9]+(\\.[a-z0-9_]+)+$"
        occurred_at:
          type: string
          format: date-time
        producer:
          type: object
          required:
            - service
            - module
          additionalProperties: false
          properties:
            service:
              type: string
              const: awcms-mini
            module:
              type: string
        tenant_id:
          type:
            - string
            - "null"
          format: uuid
        correlation_id:
          type:
            - string
            - "null"
        payload:
          type: object
          additionalProperties: true
