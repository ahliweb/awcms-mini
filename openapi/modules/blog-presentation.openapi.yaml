# Source fragment for the "Blog Presentation" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "Blog Presentation" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/blog/ads:
    get:
      tags:
        - Blog Presentation
      summary: List this tenant's advertisements
      operationId: blogAdsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Ads.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - ads
                        properties:
                          ads:
                            type: array
                            items:
                              $ref: "#/components/schemas/BlogAdItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Blog Presentation
      summary: Create an advertisement, optionally with its initial placements
      operationId: blogAdsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - imageUrl
              properties:
                name:
                  type: string
                imageUrl:
                  type: string
                linkUrl:
                  type: string
                  nullable: true
                isActive:
                  type: boolean
                startsAt:
                  type: string
                  format: date-time
                  nullable: true
                endsAt:
                  type: string
                  format: date-time
                  nullable: true
                placements:
                  type: array
                  items:
                    $ref: "#/components/schemas/BlogAdPlacementEntryInput"
      responses:
        "200":
          description: Ad created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/BlogAdItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
