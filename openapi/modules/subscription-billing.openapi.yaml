components:
  schemas:
    SubscriptionBillingCreateSubscriptionRequest:
      type: object
      required:
        - offerPlanKey
        - offerVersion
        - reason
      properties:
        offerPlanKey:
          type: string
          description: The published offer plan key to bind (immutable).
        offerVersion:
          type: integer
          minimum: 1
        billingInterval:
          type: string
          enum: [day, week, month, quarter, year]
          default: month
        billingAnchorDay:
          type: integer
          nullable: true
          minimum: 1
          maximum: 31
        prorationPolicy:
          type: string
          enum: [none, daily, full_period]
          default: daily
        roundingMode:
          type: string
          enum: [half_up, half_even, floor, ceil]
          default: half_up
        collectionMode:
          type: string
          enum: [manual, automatic]
          default: manual
        trialEndsAt:
          type: string
          format: date-time
          nullable: true
        billingContactRef:
          type: string
          nullable: true
          description: Minimized/masked billing contact reference (never a raw email).
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        source:
          type: string
          enum: [operator, system, scheduler, provisioning, lifecycle]
          default: operator
    SubscriptionBillingTransitionRequest:
      type: object
      required:
        - toState
        - reason
      properties:
        toState:
          type: string
          enum: [pending, trialing, active, past_due, canceled, expired]
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        source:
          type: string
          enum: [operator, system, scheduler, provisioning, lifecycle]
          default: operator
        expectedVersion:
          type: integer
          nullable: true
          minimum: 1
    SubscriptionBillingGenerateInvoiceRequest:
      type: object
      required:
        - reason
      properties:
        includeUsage:
          type: boolean
          default: true
        dueInDays:
          type: integer
          nullable: true
          minimum: 0
          maximum: 3650
        reason:
          type: string
          minLength: 1
          maxLength: 2000
    SubscriptionBillingIssueInvoiceRequest:
      type: object
      required:
        - reason
      properties:
        invoiceNumber:
          type: string
          nullable: true
          minLength: 1
          maxLength: 100
        dueAt:
          type: string
          format: date-time
          nullable: true
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        expectedVersion:
          type: integer
          nullable: true
          minimum: 1
    SubscriptionBillingVoidInvoiceRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        expectedVersion:
          type: integer
          nullable: true
          minimum: 1
    SubscriptionBillingCreditNoteRequest:
      type: object
      required:
        - amountMinor
        - reason
      properties:
        invoiceLineId:
          type: string
          format: uuid
          nullable: true
        amountMinor:
          type: integer
          minimum: 1
          maximum: 9007199254740991
          description: EXACT minor units (integer, never a float).
        reason:
          type: string
          minLength: 1
          maxLength: 2000
    SubscriptionBillingPaymentRequest:
      type: object
      required:
        - amountMinor
      properties:
        allocationSource:
          type: string
          enum: [manual, provider]
          default: manual
        providerKey:
          type: string
          nullable: true
          maxLength: 100
        providerReference:
          type: string
          nullable: true
          maxLength: 200
          description: Opaque provider reference (no secret); idempotency key for a provider outcome.
        amountMinor:
          type: integer
          minimum: -9007199254740991
          maximum: 9007199254740991
          description: EXACT minor units (signed for a reversal; never a float).
        outcome:
          type: string
          enum: [settled, partial, reversed]
          default: settled
        markPaid:
          type: boolean
          default: false
        reason:
          type: string
          nullable: true
          maxLength: 2000
    SubscriptionBillingChangeRequest:
      type: object
      required:
        - changeType
        - effectiveAt
        - reason
      properties:
        changeType:
          type: string
          enum: [upgrade, downgrade, cancel]
        toOfferPlanKey:
          type: string
          nullable: true
          description: Required for upgrade/downgrade; must be null for cancel.
        toOfferVersion:
          type: integer
          nullable: true
          minimum: 1
        prorationPolicy:
          type: string
          enum: [none, daily, full_period]
          default: daily
        effectiveAt:
          type: string
          format: date-time
        reason:
          type: string
          minLength: 1
          maxLength: 2000
    SubscriptionBillingDunningRequest:
      type: object
      required:
        - reason
      properties:
        requestedLifecycleState:
          type: string
          enum: [past_due, grace, suspended]
          default: past_due
        reason:
          type: string
          minLength: 1
          maxLength: 2000
