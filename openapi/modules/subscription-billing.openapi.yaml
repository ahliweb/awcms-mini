      summary: "Generate an idempotent invoice draft"
      description: "Generate a draft invoice for the subscription's current period from catalog prices and usage aggregates. Idempotent per (subscription, period): a concurrent worker never double-creates. Platform-operator only. Requires Idempotency-Key."
      operationId: subscriptionBillingGenerateInvoice
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: subscriptionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionBillingGenerateInvoiceRequest"
      responses:
        "200":
          description: "Existing draft returned (idempotent no-op)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "201":
          description: "Invoice draft generated."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
