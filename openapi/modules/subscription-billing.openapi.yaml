# Subscription Billing module OpenAPI fragment (Issue #876, epic #868, ADR-0022).
# Merged into openapi/awcms-mini-public-api.openapi.yaml by `bun run openapi:bundle`.
# Edit THIS file, never the generated bundle. The "Subscription Billing" tag lives
# in the root fragment (openapi/awcms-mini-public-api.src.yaml).
paths:
  /api/v1/subscription-billing/tenants/{tenantId}/subscriptions:
    get:
      tags:
        - Subscription Billing
      summary: "List subscriptions"
      description: "List a tenant's subscriptions. Platform operator or the tenant's own user (self-read). Read-only."
      operationId: subscriptionBillingListSubscriptions
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: "Subscriptions listed."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Conflict."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Subscription Billing
      summary: "Create a subscription bound to an immutable published offer"
      description: "Bind a subscription to a published offer version (immutable). Platform-operator only. Mandatory reason. Requires Idempotency-Key."
      operationId: subscriptionBillingCreateSubscription
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: tenantId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionBillingCreateSubscriptionRequest"
      responses:
        "201":
          description: "Subscription created."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "A live subscription for the plan already exists, or a same-key replay differs."
