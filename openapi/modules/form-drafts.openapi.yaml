# Source fragment for the "Form Drafts" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "Form Drafts" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/form-drafts:
    get:
      tags:
        - Form Drafts
      summary: List the caller's tenant's non-deleted form drafts
      operationId: formDraftsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: moduleKey
          in: query
          schema:
            type: string
        - name: wizardKey
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum:
              - draft
              - submitted
              - abandoned
              - expired
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Form drafts for the caller's tenant (limit 100, newest first).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/FormDraftListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Form Drafts
      summary: Create a new form draft
      operationId: formDraftsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormDraftRequest"
      responses:
        "200":
          description: Form draft created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/FormDraftItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/form-drafts/{id}:
    get:
      tags:
        - Form Drafts
      summary: Read one form draft (resume-on-load)
      operationId: formDraftsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The requested form draft.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/FormDraftItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Form Drafts
      summary: Update a form draft's step/payload/expiry
      operationId: formDraftsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFormDraftRequest"
      responses:
        "200":
          description: Form draft updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/FormDraftItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Form draft not found, deleted, or no longer editable (already submitted/abandoned/expired).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Form Drafts
      summary: Soft-delete (abandon) a form draft
      operationId: formDraftsDelete
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Form draft deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - id
                          - deleted
                        properties:
                          id:
                            type: string
                            format: uuid
                          deleted:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/form-drafts/{id}/submit:
    post:
      tags:
        - Form Drafts
      summary: Submit a form draft (transitions draft -> submitted)
      operationId: formDraftsSubmit
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Form draft submitted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/FormDraftItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Form draft not found, already submitted, or no longer editable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    CreateFormDraftRequest:
      type: object
      required:
        - moduleKey
        - wizardKey
        - resourceType
        - currentStep
        - payload
      additionalProperties: false
      properties:
        moduleKey:
          type: string
          pattern: ^[a-z][a-z0-9_]{1,63}$
        wizardKey:
          type: string
          pattern: ^[a-z][a-z0-9_]{1,63}$
        resourceType:
          type: string
          pattern: ^[a-z][a-z0-9_]{1,63}$
        resourceId:
          type: string
          maxLength: 128
        currentStep:
          type: string
          maxLength: 64
        payload:
          type: object
          description: Arbitrary JSON scratch state up to 32KB serialized. Must never contain a field resembling a secret (password, token, credential, apiKey, privateKey) — rejected with 400 VALIDATION_ERROR if found.
        expiresAt:
          type: string
          format: date-time
    FormDraftItem:
      type: object
      required:
        - id
        - tenantId
        - moduleKey
        - wizardKey
        - resourceType
        - resourceId
        - currentStep
        - payload
        - status
        - createdBy
        - updatedBy
        - submittedBy
        - expiresAt
        - createdAt
        - updatedAt
        - submittedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        moduleKey:
          type: string
        wizardKey:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
          nullable: true
        currentStep:
          type: string
        payload:
          type: object
        status:
          type: string
          enum:
            - draft
            - submitted
            - abandoned
            - expired
        createdBy:
          type: string
          format: uuid
        updatedBy:
          type: string
          format: uuid
        submittedBy:
          type: string
          format: uuid
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        submittedAt:
          type: string
          format: date-time
          nullable: true
    FormDraftListResponse:
      type: object
      required:
        - drafts
      additionalProperties: false
      properties:
        drafts:
          type: array
          items:
            $ref: "#/components/schemas/FormDraftItem"
    UpdateFormDraftRequest:
      type: object
      additionalProperties: false
      properties:
        currentStep:
          type: string
          maxLength: 64
        payload:
          type: object
          description: Same constraints as CreateFormDraftRequest.payload.
        expiresAt:
          type: string
          format: date-time
          nullable: true
