# Source fragment for the "Logging & Audit" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "Logging & Audit" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/logs/audit:
    get:
      tags:
        - Logging & Audit
      summary: List audit trail events for the tenant (limit 100, newest first)
      operationId: logsGetAuditTrail
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: resourceType
          in: query
          required: false
          schema:
            type: string
        - name: action
          in: query
          required: false
          schema:
            type: string
        - name: severity
          in: query
          required: false
          schema:
            type: string
            enum:
              - info
              - warning
              - critical
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Audit events for the caller's tenant (limit 100, newest first).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AuditEventListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    AuditEventEntry:
      type: object
      required:
        - id
        - moduleKey
        - action
        - resourceType
        - severity
        - message
        - createdAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        actorTenantUserId:
          type: string
          format: uuid
        moduleKey:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        severity:
          type: string
          enum:
            - info
            - warning
            - critical
        message:
          type: string
        attributes:
          type: object
          description: Already redacted at write time — never raw PII/secrets.
        correlationId:
          type: string
        createdAt:
          type: string
          format: date-time
    AuditEventListResponse:
      type: object
      required:
        - events
        - nextCursor
      additionalProperties: false
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEventEntry"
        nextCursor:
          type: string
          nullable: true
          description: Opaque keyset pagination cursor; pass back as the `cursor` query parameter to fetch the next page. `null` when this is the last page.
