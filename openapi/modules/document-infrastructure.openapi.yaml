components:
  schemas:
    DocumentInfrastructureClassification:
      type: object
      description: Issue #751 -- a tenant-scoped document classification catalog entry.
      additionalProperties: false
      required:
        - id
        - tenantId
        - code
        - name
        - description
        - confidentialityLevel
        - retentionReference
        - status
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        description: { type: string, nullable: true }
        confidentialityLevel:
          { type: string, enum: [public, internal, confidential, restricted] }
        retentionReference: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
    DocumentInfrastructureCreateClassificationRequest:
      type: object
      required: [code, name, confidentialityLevel]
      additionalProperties: false
      properties:
        code: { type: string, pattern: "^[a-z][a-z0-9_]*$" }
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, nullable: true, maxLength: 2000 }
        confidentialityLevel:
          { type: string, enum: [public, internal, confidential, restricted] }
        retentionReference: { type: string, nullable: true, maxLength: 200 }
    DocumentInfrastructureUpdateClassificationRequest:
      type: object
      required: [name, confidentialityLevel]
      additionalProperties: false
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, nullable: true, maxLength: 2000 }
        confidentialityLevel:
          { type: string, enum: [public, internal, confidential, restricted] }
        retentionReference: { type: string, nullable: true, maxLength: 200 }
    DocumentInfrastructureDocument:
      type: object
      description: Issue #751 -- generic document registry entry (metadata only). ownerModuleKey/resourceType/resourceId are opaque strings from this module's point of view.
      additionalProperties: false
      required:
        - id
        - tenantId
        - ownerModuleKey
        - documentType
        - classificationId
        - status
        - title
        - summary
        - issuedAt
        - effectiveAt
        - confidentialityLevel
        - retentionReference
        - resourceType
        - resourceId
        - currentVersionNumber
        - voidReason
        - voidedAt
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        ownerModuleKey: { type: string }
        documentType: { type: string }
        classificationId: { type: string, format: uuid, nullable: true }
        status: { type: string, enum: [active, superseded, archived, void] }
        title: { type: string }
        summary: { type: string, nullable: true }
        issuedAt: { type: string, format: date-time, nullable: true }
        effectiveAt: { type: string, format: date-time, nullable: true }
        confidentialityLevel:
          { type: string, enum: [public, internal, confidential, restricted] }
        retentionReference: { type: string, nullable: true }
        resourceType: { type: string }
        resourceId: { type: string }
        currentVersionNumber: { type: integer, minimum: 0 }
        voidReason: { type: string, nullable: true }
        voidedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        deletedAt: { type: string, format: date-time, nullable: true }
    DocumentInfrastructureCreateDocumentRequest:
      type: object
      required:
        - ownerModuleKey
        - documentType
        - title
        - confidentialityLevel
        - resourceType
        - resourceId
      additionalProperties: false
      properties:
        ownerModuleKey: { type: string, pattern: "^[a-z][a-z0-9_]*$" }
        documentType: { type: string, pattern: "^[a-z][a-z0-9_]*$" }
        classificationId: { type: string, format: uuid, nullable: true }
        title: { type: string, minLength: 1, maxLength: 300 }
        summary: { type: string, nullable: true, maxLength: 4000 }
        issuedAt: { type: string, format: date-time, nullable: true }
        effectiveAt: { type: string, format: date-time, nullable: true }
        confidentialityLevel:
          { type: string, enum: [public, internal, confidential, restricted] }
        retentionReference: { type: string, nullable: true, maxLength: 200 }
