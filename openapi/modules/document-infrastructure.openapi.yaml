        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags: [Document Infrastructure]
      summary: Update a document classification's neutral metadata
      description: Not idempotent (low-risk admin-config-update).
