# Source fragment for the "Document Infrastructure" module/tag (Issue
# #751, epic #738 platform-evolution Wave 3, ADR-0017). Owns every path
# tagged "Document Infrastructure" and every schema referenced only by
# this tag's operations.
#
# NOT independently valid OpenAPI -- see openapi/README.md.
paths:
  /api/v1/document-infrastructure/classifications:
    get:
      tags: [Document Infrastructure]
      summary: List document classifications for the caller's tenant
      operationId: documentInfrastructureClassificationsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [active, inactive]
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Document classifications for this tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required: [classifications]
                        properties:
                          classifications:
                            type: array
                            items:
                              $ref: "#/components/schemas/DocumentInfrastructureClassification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags: [Document Infrastructure]
      summary: Create a document classification
      description: Not idempotent (low-risk admin-config-create).
      operationId: documentInfrastructureClassificationsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInfrastructureCreateClassificationRequest"
      responses:
        "200":
          description: Classification created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required: [data]
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required: [classification]
                        properties:
                          classification:
                            $ref: "#/components/schemas/DocumentInfrastructureClassification"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/document-infrastructure/classifications/{id}:
    get:
      tags: [Document Infrastructure]
      summary: Get a document classification by id
      operationId: documentInfrastructureClassificationsGet
