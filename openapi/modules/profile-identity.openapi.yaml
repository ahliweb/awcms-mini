# Source fragment for the "Profile Identity" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "Profile Identity" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/profiles/{id}:
    delete:
      tags:
        - Profile Identity
      summary: Soft delete a profile (lifecycle only; no profile CRUD yet)
      operationId: profilesSoftDelete
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileDeleteRequest"
      responses:
        "200":
          description: Profile soft-deleted.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ProfileLifecycleResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/profiles/{id}/purge:
    post:
      tags:
        - Profile Identity
      summary: Permanently purge a soft-deleted profile (hard delete)
      operationId: profilesPurge
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Profile purged.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ProfileLifecycleResponse"
        "400":
          description: Profile is not currently soft-deleted; purge is only allowed after soft delete.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Purge blocked by foreign-key-referencing dependents (identities, identifiers, channels, addresses, entity links, merge requests).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/profiles/{id}/restore:
    post:
      tags:
        - Profile Identity
      summary: Restore a soft-deleted profile
      operationId: profilesRestore
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Profile restored.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ProfileLifecycleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    ProfileDeleteRequest:
      type: object
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          description: Audit-safe reason for soft delete; becomes delete_reason.
    ProfileLifecycleResponse:
      type: object
      required:
        - id
        - status
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - deleted
            - restored
            - purged
