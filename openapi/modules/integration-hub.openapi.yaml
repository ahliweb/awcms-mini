      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - newSecretReference
              properties:
                newSecretReference:
                  type: string
                overlapHours:
                  type: integer
                  minimum: 1
                  maximum: 168
      responses:
        "200":
          description: Secret rotated.
