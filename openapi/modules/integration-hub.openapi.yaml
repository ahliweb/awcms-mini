# Source fragment for the "Integration Hub" module/tag (Issue #754, epic
# `platform-evolution` #738 Wave 3).
#
# Owns every path tagged "Integration Hub" and every schema referenced
# ONLY by this tag's operations. Schemas shared with another module/tag
# live in the root file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# The inbound webhook receiver
# (`POST /api/v1/integration-hub/inbound/{endpointToken}`) is deliberately
# NOT tenant/bearer-authenticated like every other operation below — it is
# a public endpoint an external provider calls, authenticated instead by
# an opaque endpoint token (path segment) plus the registered adapter's
# own signature scheme (a request header, not `securitySchemes`). Every
# other operation is the ordinary tenant admin API.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file
# with the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/integration-hub/inbound/{endpointToken}:
    post:
      tags:
        - Integration Hub
      summary: Receive a signed inbound webhook delivery
      description: Public, provider-facing endpoint — NOT tenant/bearer-authenticated. Authenticated by the opaque `endpointToken` path segment plus the registered adapter's own signature scheme (request headers vary by adapter — see module README). Replay-protected by a database uniqueness constraint; a duplicate verified delivery returns `duplicate_ignored` without reprocessing.
      operationId: integrationHubInboundReceive
      security: []
      parameters:
        - name: endpointToken
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              description: Provider-defined payload shape — opaque to this contract.
      responses:
        "200":
          description: Accepted (new or duplicate-ignored) or safely rejected.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - status
                        properties:
                          status:
                            type: string
                            enum:
                              - accepted
                              - duplicate_ignored
                          deliveryId:
                            type: string
                            format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Signature verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
          description: Endpoint is not currently accepting traffic (paused/disabled, or tenant inactive).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          description: Request body exceeds this endpoint's configured maximum size.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "415":
          description: Unsupported content type for this endpoint.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/integration-hub/endpoints:
    get:
      tags:
        - Integration Hub
      summary: List inbound webhook endpoints
      operationId: integrationHubEndpointsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Inbound webhook endpoints.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - endpoints
                        properties:
                          endpoints:
                            type: array
                            items:
                              $ref: "#/components/schemas/IntegrationEndpointItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Integration Hub
      summary: Register a new inbound webhook endpoint
      description: Requires `Idempotency-Key`. `secretReference` is a pointer (`env:VAR_NAME`), never a raw secret value.
      operationId: integrationHubEndpointsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - adapterKey
                - displayName
                - secretReference
              properties:
                adapterKey:
                  type: string
                displayName:
                  type: string
                description:
                  type: string
                secretReference:
                  type: string
                  description: 'An env: pointer, e.g. "env:MY_WEBHOOK_SECRET" — never a raw secret value.'
                maxBodyBytes:
                  type: integer
                allowedContentTypes:
                  type: array
                  items:
                    type: string
                timestampToleranceSeconds:
                  type: integer
      responses:
        "200":
          description: Endpoint registered.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - endpoint
                        properties:
                          endpoint:
                            $ref: "#/components/schemas/IntegrationEndpointItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
