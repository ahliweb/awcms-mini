        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Delivery and its attempts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - delivery
                          - attempts
                        properties:
                          delivery:
                            $ref: "#/components/schemas/IntegrationOutboundDeliveryItem"
                          attempts:
                            type: array
                            items:
                              $ref: "#/components/schemas/IntegrationDeliveryAttemptItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/integration-hub/deliveries/outbound/{id}/replay:
    post:
      tags:
        - Integration Hub
      summary: Replay a dead-lettered outbound delivery
      description: Permission-gated (`deliveries.replay`), reason-required, `Idempotency-Key` required, audited. Only valid from a `dead_letter` delivery. Creates a NEW delivery row referencing the original — never risks double-processing the same underlying source event.
      operationId: integrationHubDeliveriesOutboundReplay
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Replay created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - newDeliveryId
                        properties:
                          newDeliveryId:
                            type: string
                            format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or delivery is not dead-lettered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/integration-hub/health:
    get:
      tags:
        - Integration Hub
      summary: Get per-adapter health state
      operationId: integrationHubHealthList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Adapter health rows.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - health
                        properties:
                          health:
                            type: array
                            items:
                              $ref: "#/components/schemas/IntegrationAdapterHealthItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/integration-hub/adapters:
    get:
      tags:
        - Integration Hub
      summary: List the static, code-declared provider adapter registry
      description: Metadata only (no schema field here can ever carry a credential/secret value).
      operationId: integrationHubAdaptersList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Registered adapters.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - adapters
                        properties:
                          adapters:
                            type: array
                            items:
                              $ref: "#/components/schemas/IntegrationAdapterItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    IntegrationEndpointItem:
      type: object
      required:
        - id
        - tenantId
        - adapterKey
        - endpointToken
        - displayName
        - secretReference
        - hasSecretRotationInProgress
        - status
        - maxBodyBytes
        - allowedContentTypes
        - timestampToleranceSeconds
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        adapterKey:
          type: string
        endpointToken:
          type: string
          description: Opaque, server-generated identifier — the URL path segment a provider POSTs to. Not itself the security boundary.
        displayName:
          type: string
        description:
          type: string
          nullable: true
        secretReference:
          type: string
          description: "An env: pointer, never the secret value itself."
        hasSecretRotationInProgress:
          type: boolean
        secretRotatedAt:
          type: string
          format: date-time
          nullable: true
        previousSecretExpiresAt:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum:
            - active
            - paused
            - disabled
        maxBodyBytes:
          type: integer
        allowedContentTypes:
          type: array
          items:
            type: string
        timestampToleranceSeconds:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IntegrationSubscriptionItem:
      type: object
      required:
        - id
        - tenantId
        - subscribedEventType
        - targetAdapterKey
        - targetUrl
        - targetHeaders
        - hasOutboundSigningSecret
        - filter
        - status
        - maxAttempts
        - timeoutMs
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        subscribedEventType:
          type: string
        targetAdapterKey:
          type: string
        targetUrl:
          type: string
          format: uri
        targetHeaders:
          type: object
          additionalProperties:
            type: string
        hasOutboundSigningSecret:
          type: boolean
        filter:
          type: object
          additionalProperties: true
        status:
          type: string
          enum:
            - active
            - paused
            - disabled
        maxAttempts:
          type: integer
        timeoutMs:
          type: integer
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IntegrationInboundDeliveryItem:
      type: object
      required:
        - id
        - tenantId
        - endpointId
        - adapterKey
        - signatureValid
        - rawBodySize
        - status
        - receivedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        endpointId:
          type: string
          format: uuid
        adapterKey:
          type: string
        providerDeliveryId:
          type: string
          nullable: true
        signatureValid:
          type: boolean
        verificationFailureReason:
          type: string
          nullable: true
        contentType:
          type: string
          nullable: true
        rawBodySize:
          type: integer
        status:
          type: string
          enum:
            - received
            - normalized
            - rejected
            - processing_failed
        normalizedEventId:
          type: string
          format: uuid
          nullable: true
        receivedAt:
          type: string
          format: date-time
    IntegrationOutboundDeliveryItem:
      type: object
      required:
        - id
        - tenantId
        - subscriptionId
        - sourceEventId
        - eventType
        - status
        - attemptCount
        - maxAttempts
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        subscriptionId:
          type: string
          format: uuid
        sourceEventId:
          type: string
          format: uuid
        eventType:
          type: string
        status:
          type: string
          enum:
            - pending
            - sending
            - delivered
            - retry_wait
            - dead_letter
            - cancelled
        attemptCount:
          type: integer
        maxAttempts:
          type: integer
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
        lastError:
          type: string
          nullable: true
        lastHttpStatus:
          type: integer
          nullable: true
        replayOfDeliveryId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    IntegrationDeliveryAttemptItem:
      type: object
      required:
        - id
        - deliveryId
        - attemptNo
        - outcome
        - attemptedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        deliveryId:
          type: string
          format: uuid
        attemptNo:
          type: integer
        outcome:
          type: string
          enum:
            - success
            - failure
        httpStatus:
          type: integer
          nullable: true
        responseSnippet:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        attemptedAt:
          type: string
          format: date-time
    IntegrationAdapterHealthItem:
      type: object
      required:
        - adapterKey
        - direction
        - state
        - consecutiveFailures
        - consecutiveSuccesses
        - lastCheckedAt
      additionalProperties: false
      properties:
        adapterKey:
          type: string
        direction:
          type: string
          enum:
            - inbound
            - outbound
        state:
          type: string
          enum:
            - up
            - degraded
            - down
        consecutiveFailures:
          type: integer
        consecutiveSuccesses:
          type: integer
        lastSuccessAt:
          type: string
          format: date-time
          nullable: true
        lastFailureAt:
          type: string
          format: date-time
          nullable: true
        lastCheckedAt:
          type: string
          format: date-time
    IntegrationAdapterItem:
      type: object
      required:
        - adapterKey
        - displayName
        - direction
        - dataSensitivity
        - defaultTimeoutMs
        - retryClassification
      additionalProperties: false
      properties:
        adapterKey:
          type: string
        displayName:
          type: string
        direction:
          type: string
          enum:
            - inbound
            - outbound
            - both
        dataSensitivity:
          type: string
          enum:
            - low
            - medium
            - high
        defaultTimeoutMs:
          type: integer
        retryClassification:
          type: string
          enum:
            - retryable_network_provider
            - manual_only
