            schema:
              type: object
              required:
                - subscribedEventType
                - targetAdapterKey
                - targetUrl
              properties:
                subscribedEventType:
                  type: string
                targetAdapterKey:
                  type: string
                targetUrl:
                  type: string
                  format: uri
                targetHeaders:
                  type: object
                  additionalProperties:
                    type: string
                secretReference:
                  type: string
                filter:
                  type: object
                  description: Bounded declarative equality-match filter (max 10 keys, max path depth 4) — dotted payload path -> scalar value.
