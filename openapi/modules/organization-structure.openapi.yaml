components:
  schemas:
    OrganizationStructureLegalEntity:
      type: object
      description: Issue #749 -- a tenant-scoped legal/business entity, NOT the tenant itself (ADR-0013 §2).
      additionalProperties: false
      required:
        - id
        - tenantId
        - name
        - registrationIdentifier
        - registrationIdentifierLabel
        - status
        - effectiveFrom
        - effectiveTo
        - createdAt
        - updatedAt
        - deletedAt
      properties:
        id: { type: string, format: uuid }
        tenantId: { type: string, format: uuid }
        name: { type: string }
        registrationIdentifier: { type: string, nullable: true }
        registrationIdentifierLabel: { type: string, nullable: true }
        status: { type: string, enum: [active, inactive] }
        effectiveFrom: { type: string, format: date-time }
