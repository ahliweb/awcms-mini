# Source fragment for the "Identity & Access" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "Identity & Access" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/access/assignments:
    post:
      tags:
        - Identity & Access
      summary: Assign a role to a tenant user
      operationId: accessCreateAssignment
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessAssignmentRequest"
      responses:
        "200":
          description: Role assignment created or already present (idempotent).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AccessAssignmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Identity & Access
      summary: Remove a role assignment from a tenant user
      operationId: accessDeleteAssignment
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessAssignmentRequest"
      responses:
        "200":
          description: Assignment removed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - unassigned
                        additionalProperties: false
                        properties:
                          unassigned:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/decision-logs:
    get:
      tags:
        - Identity & Access
      summary: List recent ABAC decision log entries for the tenant
      operationId: accessListDecisionLogs
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Recent decision log entries, newest first (limit 50).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/DecisionLogListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/evaluate:
    post:
      tags:
        - Identity & Access
      summary: Evaluate an ABAC access request for the caller
      operationId: accessEvaluate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessEvaluateRequest"
      responses:
        "200":
          description: Access decision. Always recorded in the decision log.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AccessEvaluateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/modules:
    get:
      tags:
        - Identity & Access
      summary: List the module/activity/action permission registry
      operationId: accessListModules
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Permission registry.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ModuleRegistryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/login:
    post:
      tags:
        - Identity & Access
      summary: Authenticate an identity and issue a session token
      description: |-
        When full-online auth security hardening is active (`AUTH_ONLINE_SECURITY_ENABLED=true` and `AUTH_ONLINE_SECURITY_PROFILE=full_online`) AND `TURNSTILE_ENABLED=true` (Issue #588), `turnstileToken` is verified before any password check: missing -> `400 TURNSTILE_REQUIRED`, invalid -> `400 TURNSTILE_INVALID`. Absent entirely for every local/offline/LAN deployment.

        When the same gate is active AND `AUTH_MFA_ENABLED=true` (Issue #589) AND the identity has an active TOTP factor enrolled, a password-valid login does NOT create a session — it returns `401 MFA_REQUIRED` with `error.details.mfaChallengeToken` instead (see `LoginMfaRequiredResponse`). Complete the login by calling `POST /auth/mfa/totp/verify` with that token and a TOTP/recovery code. Identities that have never enrolled MFA are unaffected even when the feature is enabled (opt-in per identity, not tenant-wide).
      operationId: authLogin
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: "Invalid credentials (`AUTH_INVALID_CREDENTIALS`), OR password was valid but MFA/TOTP (Issue #589) must be completed before a session is issued (`MFA_REQUIRED`, `LoginMfaRequiredResponse`)."
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiError"
                  - $ref: "#/components/schemas/LoginMfaRequiredResponse"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/logout:
    post:
      tags:
        - Identity & Access
      summary: Revoke the caller's active session
      operationId: authLogout
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/me:
    get:
      tags:
        - Identity & Access
      summary: Get the caller's active identity
      operationId: authMe
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Active identity for the current session.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/recovery-codes/regenerate:
    post:
      tags:
        - Identity & Access
      summary: Invalidate existing recovery codes and issue a fresh set (high-risk, audited)
      description: "Full-online-only (Issue #589). Requires an active MFA factor. Every previously issued recovery code stops working immediately; the 10 fresh codes are shown exactly once in the response. Audited (`mfa_recovery_codes_regenerated`)."
      operationId: authMfaRecoveryCodesRegenerate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Recovery codes regenerated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaRecoveryCodesResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No MFA factor is currently active for this account (`MFA_NOT_ACTIVE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/status:
    get:
      tags:
        - Identity & Access
      summary: Get the caller's own MFA enrollment status
      description: "Full-online-only (Issue #589) — `403 MFA_DISABLED` unless the #587 gate AND `AUTH_MFA_ENABLED=true` are both active. Reports the caller's own enrollment only (self-service; no admin-on-behalf-of view in this issue)."
      operationId: authMfaStatus
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Current MFA enrollment status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/disable:
    post:
      tags:
        - Identity & Access
      summary: Disable the caller's own MFA (high-risk, audited)
      description: "Full-online-only (Issue #589). Self-service: requires an already-valid session (for an identity with active MFA, only obtainable by already passing an MFA challenge). Deletes the factor's recovery codes too. Audited (`mfa_disabled`)."
      operationId: authMfaTotpDisable
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: MFA disabled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaDisableResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No MFA factor is currently active for this account (`MFA_NOT_ACTIVE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/enroll/start:
    post:
      tags:
        - Identity & Access
      summary: Generate a new pending TOTP secret for the caller to confirm
      description: "Full-online-only (Issue #589). Returns the plaintext secret/QR URI ONLY here, at enrollment start — never again afterward. The factor is `pending` (unusable for login) until confirmed via `POST /auth/mfa/totp/enroll/verify`. Rejects with `409 MFA_ALREADY_ACTIVE` if the caller already has an active factor — re-enrollment must go through `disable` first."
      operationId: authMfaTotpEnrollStart
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Pending TOTP factor created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaEnrollStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: An MFA factor is already active for this account (`MFA_ALREADY_ACTIVE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/enroll/verify:
    post:
      tags:
        - Identity & Access
      summary: Confirm a pending TOTP enrollment with a live code
      description: "Full-online-only (Issue #589). Activates the pending factor from `enroll/start` and returns 10 single-use recovery codes shown exactly once (never retrievable again — only `recovery-codes/regenerate` can produce a fresh set afterward)."
      operationId: authMfaTotpEnrollVerify
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaEnrollVerifyRequest"
      responses:
        "200":
          description: MFA activated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaEnrollVerifyResponse"
        "400":
          description: Validation error, or the code is invalid (`MFA_INVALID_CODE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: No pending MFA enrollment found (`MFA_ENROLLMENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/verify:
    post:
      tags:
        - Identity & Access
      summary: Complete a login paused by 401 MFA_REQUIRED
      description: "Full-online-only (Issue #589). Deliberately NOT authenticated via a session — authenticated instead by possession of `mfaChallengeToken` from `POST /auth/login`'s `MFA_REQUIRED` response, exactly like `password/reset` is authenticated by possession of a reset token. Exactly one of `code` (TOTP) or `recoveryCode` must be provided. On success, creates the real AWCMS-Mini session — same response shape as `POST /auth/login`'s 200. Rate-limited both by source+tenant (`AUTH_MFA_RATE_LIMIT_MAX`/`_WINDOW_SEC`) and by a per-challenge failed-attempt counter."
      operationId: authMfaTotpVerify
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaChallengeVerifyRequest"
      responses:
        "200":
          description: Challenge verified; session issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: The challenge is invalid, expired, already used, or the code/recovery code is wrong (deliberately not distinguished — anti-enumeration, same principle as `password/reset` — `MFA_CHALLENGE_INVALID`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Too many verification attempts from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/password/forgot:
    post:
      tags:
        - Identity & Access
      summary: Request a password reset email; always returns a generic response regardless of whether the identifier matches an account
      description: "When full-online auth security hardening AND `TURNSTILE_ENABLED=true` are both active (Issue #588), `turnstileToken` is verified before the reset-token DB write/email enqueue: missing -> `400 TURNSTILE_REQUIRED`, invalid -> `400 TURNSTILE_INVALID`."
      operationId: authPasswordForgot
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Generic acknowledgement — does not reveal whether the account exists.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Too many password reset requests from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/password/reset:
    post:
      tags:
        - Identity & Access
      summary: Complete a password reset with a valid one-time token
      description: "When full-online auth security hardening AND `TURNSTILE_ENABLED=true` are both active (Issue #588), `turnstileToken` is verified before the token lookup/password update: missing -> `400 TURNSTILE_REQUIRED`, invalid -> `400 TURNSTILE_INVALID`."
      operationId: authPasswordReset
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset; all active sessions for the identity are revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ResetPasswordResponse"
        "400":
          description: Validation error, or the token is invalid/expired/already used (deliberately not distinguished in the response — anti- enumeration, doc 20 §A07 Identification & Auth Failures).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Too many password reset attempts from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/providers/google/callback:
    get:
      tags:
        - Identity & Access
      summary: Google's OAuth redirect target — completes login or link
      description: "Full-online-only (Issue #590). A plain top-level browser navigation, never a `fetch()` call — Google redirects here with `code`+`state` (or `error` if the user cancelled consent). Validates `state` (CSRF/replay defense) and the ID token's signature, issuer, audience, expiry, and nonce cryptographically before trusting any claim. For a `login`-purpose request: creates the existing AWCMS-Mini session type (or, if Issue #589's MFA gate is active and the identity has an active factor, returns `401 MFA_REQUIRED` exactly like `POST /auth/login` — Google login never bypasses MFA). For a `link`-purpose request (from `POST .../link`): attaches the verified Google account to the identity captured server-side at link-initiation time."
      operationId: authGoogleCallback
      security:
        - tenantHeader: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Present when the user cancelled/denied consent at Google.
      responses:
        "302":
          description: Login or link succeeded; redirects to `/admin`.
        "400":
          description: Missing or malformed `state` (`GOOGLE_OAUTH_STATE_INVALID`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: The state/nonce/ID token could not be verified (`GOOGLE_OAUTH_STATE_INVALID`/`GOOGLE_TOKEN_EXCHANGE_FAILED`/ `GOOGLE_ID_TOKEN_INVALID`/`GOOGLE_ACCOUNT_NOT_LINKED`), or MFA must be completed first (`MFA_REQUIRED`, `LoginMfaRequiredResponse`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiError"
                  - $ref: "#/components/schemas/LoginMfaRequiredResponse"
        "403":
          description: Google login is not enabled for this deployment (`GOOGLE_LOGIN_DISABLED`), or the resolved identity/tenant is not active (`ACCESS_DENIED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: This Google subject is already linked to a different identity (`GOOGLE_ALREADY_LINKED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
