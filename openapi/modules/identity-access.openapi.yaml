    LoginMfaRequiredResponse:
      type: object
      description: '`POST /auth/login`''s 401 response shape specifically for `error.code === "MFA_REQUIRED"` (Issue #589) — deliberately NOT the generic `ApiError` shape (`error.details` here is a structured object, not an `ErrorDetail[]` array), since a real payload (`mfaChallengeToken`) must be returned to let the client complete the login via `POST /auth/mfa/totp/verify`.'
      required:
        - success
        - error
        - meta
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
            - details
          additionalProperties: false
          properties:
            code:
              type: string
              enum:
                - MFA_REQUIRED
            message:
              type: string
            details:
              type: object
              required:
                - mfaChallengeToken
                - expiresAt
              additionalProperties: false
              properties:
                mfaChallengeToken:
                  type: string
                  description: Opaque, single-use token to pass as `mfaChallengeToken` to `POST /auth/mfa/totp/verify` along with a TOTP or recovery code.
                expiresAt:
                  type: string
                  format: date-time
        meta:
          $ref: "#/components/schemas/ApiMeta"
    LoginRequest:
      type: object
      required:
        - loginIdentifier
        - password
      additionalProperties: false
      properties:
        loginIdentifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          writeOnly: true
        turnstileToken:
          type: string
          description: "Cloudflare Turnstile response token (Issue #588). Required only when full-online auth security hardening is active (`AUTH_ONLINE_SECURITY_ENABLED=true` and `AUTH_ONLINE_SECURITY_PROFILE=full_online`) AND `TURNSTILE_ENABLED=true` — absent entirely for every local/offline/LAN deployment. Missing when required -> `400 TURNSTILE_REQUIRED`; invalid -> `400 TURNSTILE_INVALID`."
    LoginResponse:
      type: object
      required:
        - token
        - expiresAt
      additionalProperties: false
      properties:
        token:
          type: string
          description: Opaque bearer session token. Shown only once, at login.
        expiresAt:
          type: string
          format: date-time
