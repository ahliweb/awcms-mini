        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Identity & Access
      summary: Request a segregation-of-duties conflict exception
      description: "Issue #746. Permission-gated (`identity_access.business_scope_exceptions.create`). Creates a `pending` exception request; a DIFFERENT tenant user must separately approve it (see `.../approve`)."
