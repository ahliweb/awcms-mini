components:
  schemas:
    AccessAssignmentRequest:
      type: object
      required:
        - tenantUserId
        - roleId
      additionalProperties: false
      properties:
        tenantUserId:
          type: string
          format: uuid
        roleId:
          type: string
          format: uuid
    AccessAssignmentResponse:
      type: object
      required:
        - assignmentId
      additionalProperties: false
      properties:
        assignmentId:
          type: string
          format: uuid
    AccessEvaluateRequest:
      type: object
      required:
        - moduleKey
        - activityCode
        - action
      additionalProperties: false
      properties:
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
          enum:
            - read
            - create
            - update
            - delete
            - post
            - cancel
            - approve
            - export
            - send
            - configure
            - analyze
            - assign
        resourceType:
          type: string
        resourceId:
          type: string
        resourceAttributes:
          type: object
          additionalProperties: true
        environmentAttributes:
          type: object
          additionalProperties: true
    AccessEvaluateResponse:
      type: object
      required:
        - allowed
        - reason
      additionalProperties: false
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        matchedPolicy:
          type: string
    AuthProviderListResponse:
      type: object
      required:
        - providers
      additionalProperties: false
      properties:
        providers:
          type: array
          items:
            $ref: "#/components/schemas/AuthProviderView"
    AuthProviderView:
      type: object
      required:
        - id
        - providerKey
        - providerType
        - displayName
        - issuerUrl
        - clientId
        - secretSource
        - clientSecretEnvVar
        - scopes
        - allowedEmailDomains
        - enabled
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        providerKey:
          type: string
        providerType:
          type: string
          enum:
            - oidc
        displayName:
          type: string
        issuerUrl:
          type: string
        clientId:
          type: string
        secretSource:
          type: string
          enum:
            - encrypted
            - env
          description: Never the secret itself — `encrypted` means a client secret is stored encrypted at rest (AES-256-GCM); `env` means the secret is read from the named environment variable (`clientSecretEnvVar`) at OAuth-call time.
        clientSecretEnvVar:
          type: string
          nullable: true
          description: The environment variable NAME (never a secret value) when `secretSource` is `env`.
        scopes:
          type: string
        allowedEmailDomains:
          type: array
          items:
            type: string
        enabled:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CreateAuthProviderRequest:
      type: object
      required:
        - providerKey
        - displayName
        - issuerUrl
        - clientId
      additionalProperties: false
      properties:
        providerKey:
          type: string
          pattern: ^[a-z0-9][a-z0-9_-]*$
        displayName:
          type: string
          maxLength: 120
        issuerUrl:
          type: string
          description: Must be an `https://` URL.
        clientId:
          type: string
          maxLength: 255
        clientSecret:
          type: string
          description: Plaintext secret, encrypted at rest immediately — never returned by any endpoint. Exactly one of `clientSecret`/`clientSecretEnvVar` must be provided.
        clientSecretEnvVar:
          type: string
          description: Name of an environment variable holding the secret. Exactly one of `clientSecret`/`clientSecretEnvVar` must be provided.
        scopes:
          type: string
          default: openid email profile
        allowedEmailDomains:
          type: array
          items:
