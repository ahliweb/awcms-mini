# Source fragment for the "Reference Data" module/tag (Issue #750,
# epic #738 platform-evolution Wave 3, ADR-0021). Owns every path tagged
# "Reference Data" and every schema referenced only by this tag's
# operations.
#
# NOT independently valid OpenAPI -- see openapi/README.md.
paths:
  /api/v1/reference-data/value-sets:
    get:
      tags:
        - Reference Data
      summary: List/search reference value sets
      operationId: referenceDataValueSetsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - active
              - deprecated
        - name: scope
          in: query
          required: false
          schema:
            type: string
            enum:
              - module_contributed
              - platform_curated
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Reference value sets (global baseline catalog).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - valueSets
                        properties:
                          valueSets:
                            type: array
                            items:
                              $ref: "#/components/schemas/ReferenceValueSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Reference Data
      summary: Create a platform-curated reference value set
      description: Writes to the GLOBAL baseline shared by every tenant -- requires Idempotency-Key.
      operationId: referenceDataValueSetsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataCreateValueSetRequest"
      responses:
        "200":
          description: Reference value set created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - valueSet
                        properties:
                          valueSet:
                            $ref: "#/components/schemas/ReferenceValueSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: A value set with this key already exists, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}:
    get:
      tags:
        - Reference Data
      summary: Get a reference value set by key
      operationId: referenceDataValueSetsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The reference value set.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - valueSet
                        properties:
                          valueSet:
                            $ref: "#/components/schemas/ReferenceValueSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Reference Data
      summary: Update a reference value set's metadata (name/description only)
      description: Writes to the GLOBAL baseline shared by every tenant -- requires Idempotency-Key.
      operationId: referenceDataValueSetsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataUpdateValueSetRequest"
      responses:
        "200":
          description: Reference value set updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - valueSet
                        properties:
                          valueSet:
                            $ref: "#/components/schemas/ReferenceValueSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Reference Data
      summary: Deprecate (soft-delete) a reference value set
      description: High-risk mutation against the GLOBAL baseline shared by every tenant -- requires Idempotency-Key, audited critical.
      operationId: referenceDataValueSetsDeprecate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataDeprecateRequest"
      responses:
        "200":
          description: Reference value set deprecated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - valueSet
                        properties:
                          valueSet:
                            $ref: "#/components/schemas/ReferenceValueSet"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Value set is already deprecated, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/restore:
    post:
      tags:
        - Reference Data
      summary: Restore a previously deprecated reference value set
      description: High-risk mutation -- requires Idempotency-Key.
      operationId: referenceDataValueSetsRestore
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Reference value set restored.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - valueSet
                        properties:
                          valueSet:
                            $ref: "#/components/schemas/ReferenceValueSet"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Value set is not currently deprecated, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/codes:
    get:
      tags:
        - Reference Data
      summary: List/search reference codes for a value set
      operationId: referenceDataCodesList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: includeDeprecated
          in: query
          required: false
          schema:
            type: boolean
            default: false
        - name: search
          in: query
          required: false
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Reference codes for this value set (global baseline).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - codes
                        properties:
                          codes:
                            type: array
                            items:
                              $ref: "#/components/schemas/ReferenceCode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Reference Data
      summary: Create a reference code manually
      description: Writes to the GLOBAL baseline shared by every tenant -- requires Idempotency-Key. Never a descriptor-managed code (those are written only by contribution-sync).
      operationId: referenceDataCodesCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataCreateCodeRequest"
      responses:
        "200":
          description: Reference code created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - code
                        properties:
                          code:
                            $ref: "#/components/schemas/ReferenceCode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: A code with this value already exists in this value set, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/codes/{code}:
    get:
      tags:
        - Reference Data
      summary: Get a reference code by its code string
      operationId: referenceDataCodesGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The reference code.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - code
                        properties:
                          code:
                            $ref: "#/components/schemas/ReferenceCode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Reference Data
      summary: Partially update a reference code's mutable attributes
      description: >-
        True PATCH semantics -- omitted fields keep their stored value, explicit
        null clears/resets (see ReferenceDataUpdateCodeRequest). Writes to the
        GLOBAL baseline shared by every tenant -- requires Idempotency-Key.
        Rejected for descriptor-managed codes.
      operationId: referenceDataCodesUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataUpdateCodeRequest"
      responses:
        "200":
          description: Reference code updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - code
                        properties:
                          code:
                            $ref: "#/components/schemas/ReferenceCode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: This code is managed by a module contribution, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Reference Data
      summary: Deprecate (soft-delete) a reference code
      description: High-risk mutation against the GLOBAL baseline shared by every tenant -- requires Idempotency-Key, audited critical. Never a hard delete, even for a code already referenced by tenant data.
      operationId: referenceDataCodesDeprecate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataDeprecateCodeRequest"
      responses:
        "200":
          description: Reference code deprecated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - code
                        properties:
                          code:
                            $ref: "#/components/schemas/ReferenceCode"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Code is already deprecated, is managed by a module contribution, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/codes/{code}/restore:
    post:
      tags:
        - Reference Data
      summary: Restore a previously deprecated reference code
      description: High-risk mutation -- requires Idempotency-Key.
      operationId: referenceDataCodesRestore
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Reference code restored.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - code
                        properties:
                          code:
                            $ref: "#/components/schemas/ReferenceCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Code is not currently deprecated, the code is managed by a module contribution and cannot be restored manually (DESCRIPTOR_MANAGED), or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/imports:
    get:
      tags:
        - Reference Data
      summary: List reference data import batches for a value set
      operationId: referenceDataImportsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Import batch history for this value set.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - imports
                        properties:
                          imports:
                            type: array
                            items:
                              $ref: "#/components/schemas/ReferenceImport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Reference Data
      summary: Submit a non-mutating dry-run import for a value set
      description: Never touches the global baseline codes table -- only writes an import batch row recording the computed diff. Requires Idempotency-Key.
      operationId: referenceDataImportsDryRun
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataImportDryRunRequest"
      responses:
        "200":
          description: Dry-run diff computed (non-mutating). status is "validated" (safe to commit) or "rejected" (destructive replacement of a referenced code was requested).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - import
                          - diff
                        properties:
                          import:
                            $ref: "#/components/schemas/ReferenceImport"
                          diff:
                            $ref: "#/components/schemas/ReferenceImportDiffSummary"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/imports/{importId}:
    get:
      tags:
        - Reference Data
      summary: Get a reference data import batch's detail/diff/status/checksum
      operationId: referenceDataImportsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: importId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: The import batch.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - import
                        properties:
                          import:
                            $ref: "#/components/schemas/ReferenceImport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/imports/{importId}/commit:
    post:
      tags:
        - Reference Data
      summary: Commit a validated reference data import batch
      description: HIGH RISK -- applies a validated import to the GLOBAL baseline shared by every tenant. Re-validates checksum and destructive-replace protection inside the same transaction as the write. Requires Idempotency-Key and the exact checksum from the dry-run response.
      operationId: referenceDataImportsCommit
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: importId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataImportCommitRequest"
      responses:
        "200":
          description: Import batch committed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - import
                        properties:
                          import:
                            $ref: "#/components/schemas/ReferenceImport"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Checksum mismatch, batch not committable, destructive replacement of a referenced code was blocked, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/value-sets/{key}/imports/{importId}/rollback:
    post:
      tags:
        - Reference Data
      summary: Roll back a committed reference data import batch
      description: HIGH RISK -- reverts a committed import batch's cumulative effect on the GLOBAL baseline. Refuses to delete a created code that has since been referenced by tenant data. Requires Idempotency-Key.
      operationId: referenceDataImportsRollback
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: key
          in: path
          required: true
          schema:
            type: string
        - name: importId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Import batch rolled back.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - import
                        properties:
                          import:
                            $ref: "#/components/schemas/ReferenceImport"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Batch not rollback-eligible, a created code is now referenced by tenant data, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/reference-data/tenant-codes:
