        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Reference Data
      summary: Create a tenant reference code override or extension
      description: Writes ONLY to the caller's own tenant-scoped table (RLS FORCE) -- never the global baseline. Gated server-side by the value set's overridePolicy. Requires Idempotency-Key.
      operationId: referenceDataTenantCodesCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferenceDataCreateTenantCodeRequest"
      responses:
        "200":
          description: Tenant reference code created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - tenantCode
                        properties:
                          tenantCode:
