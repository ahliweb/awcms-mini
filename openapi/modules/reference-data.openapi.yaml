              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - tenantCode
                        properties:
                          tenantCode:
                            $ref: "#/components/schemas/ReferenceTenantCode"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Not currently deprecated, or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    ReferenceCodeLabel:
      type: object
      description: One localized label/description for a reference code (Issue #750).
      additionalProperties: false
      required:
        - locale
        - label
        - description
      properties:
        locale:
          type: string
          example: en
        label:
          type: string
        description:
          type: string
          nullable: true
    ReferenceValueSet:
      type: object
      description: A reference value set (Issue #750, epic `platform-evolution` #738 Wave 3, ADR-0021) -- GLOBAL, identical for every tenant.
      additionalProperties: false
      required:
        - id
        - key
        - ownerModule
        - name
        - description
        - scope
        - overridePolicy
        - validationSchema
        - managedByDescriptor
        - version
        - status
        - createdAt
        - updatedAt
        - deprecatedAt
      properties:
        id:
          type: string
          format: uuid
        key:
          type: string
        ownerModule:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        scope:
          type: string
          enum:
            - module_contributed
            - platform_curated
        overridePolicy:
          type: string
          enum:
            - none
            - tenant_extend
            - tenant_override
            - tenant_extend_and_override
        validationSchema:
          type: object
          nullable: true
        managedByDescriptor:
          type: boolean
        version:
          type: integer
        status:
          type: string
          enum:
            - active
            - deprecated
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
    ReferenceCode:
      type: object
      description: A reference code within a value set (Issue #750) -- GLOBAL, identical for every tenant. Never hard-deleted once referenced by a tenant override/extension.
      additionalProperties: false
      required:
        - id
        - valueSetId
        - code
        - sortOrder
        - metadata
        - validFrom
        - validTo
        - deprecatedAt
        - supersededByCodeId
        - provenance
        - managedByDescriptor
        - importBatchId
        - createdAt
        - updatedAt
        - labels
      properties:
        id:
          type: string
          format: uuid
        valueSetId:
          type: string
          format: uuid
        code:
          type: string
        sortOrder:
          type: integer
        metadata:
          type: object
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
          nullable: true
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
        supersededByCodeId:
          type: string
          format: uuid
          nullable: true
        provenance:
          type: string
          enum:
            - manual
            - module
            - import
            - seed
        managedByDescriptor:
          type: boolean
        importBatchId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        labels:
          type: array
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
    ReferenceResolvedCode:
      type: object
      description: The merged, effective code a tenant currently sees -- baseline plus that tenant's own override/extension, deterministic precedence (Issue #750).
      additionalProperties: false
      required:
        - code
        - isTenantOverride
        - label
        - description
        - sortOrder
        - metadata
        - validFrom
        - validTo
        - deprecated
      properties:
        code:
          type: string
        isTenantOverride:
          type: boolean
        label:
          type: string
        description:
          type: string
          nullable: true
        sortOrder:
          type: integer
        metadata:
          type: object
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
          nullable: true
        deprecated:
          type: boolean
    ReferenceTenantCode:
      type: object
      description: A tenant-scoped reference code override (baseCodeId set) or extension (baseCodeId null) -- RLS FORCE, never mutates the global baseline (Issue #750).
      additionalProperties: false
      required:
        - id
        - tenantId
        - valueSetId
        - baseCodeId
        - code
        - sortOrder
        - metadata
        - validFrom
        - validTo
        - deprecatedAt
        - createdAt
        - updatedAt
        - labels
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        valueSetId:
          type: string
          format: uuid
        baseCodeId:
          type: string
          format: uuid
          nullable: true
        code:
          type: string
        sortOrder:
          type: integer
        metadata:
          type: object
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
          nullable: true
        deprecatedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        labels:
          type: array
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
    ReferenceImportDiffSummary:
      type: object
      description: The computed diff from a dry-run import (Issue #750) -- code strings only, non-mutating.
      additionalProperties: false
      required:
        - toCreate
        - toUpdate
        - toDeprecate
        - blockedReplacements
      properties:
        toCreate:
          type: array
          items:
            type: string
        toUpdate:
          type: array
          items:
            type: string
        toDeprecate:
          type: array
          items:
            type: string
        blockedReplacements:
          type: array
          items:
            type: string
          description: Non-empty only when the import was rejected -- codes for which a destructive replacement of an already-referenced code was requested.
    ReferenceImport:
      type: object
      description: A reference data import batch (Issue #750) -- GLOBAL. status transitions validated -> committed -> rolled_back, or validated -> rejected.
      additionalProperties: false
      required:
        - id
        - valueSetId
        - status
        - sourceProvenance
        - checksum
        - diffSummary
        - rejectionReason
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        valueSetId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - validated
            - rejected
            - committed
            - rolled_back
        sourceProvenance:
          type: string
          nullable: true
        checksum:
          type: string
        diffSummary:
          type: object
        rejectionReason:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    ReferenceDataCreateValueSetRequest:
      type: object
      required:
        - key
        - name
        - overridePolicy
      additionalProperties: false
      properties:
        key:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
          maxLength: 100
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
        overridePolicy:
          type: string
          enum:
            - none
            - tenant_extend
            - tenant_override
            - tenant_extend_and_override
        validationSchema:
          type: object
          nullable: true
    ReferenceDataUpdateValueSetRequest:
      type: object
      required:
        - name
      additionalProperties: false
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
          nullable: true
          maxLength: 2000
    ReferenceDataDeprecateRequest:
      type: object
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
    ReferenceDataDeprecateCodeRequest:
      type: object
      required:
        - reason
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          maxLength: 2000
        supersededByCodeId:
          type: string
          format: uuid
          nullable: true
    ReferenceDataCreateCodeRequest:
      type: object
      required:
        - code
        - labels
      additionalProperties: false
      properties:
        code:
          type: string
          minLength: 1
          maxLength: 64
        labels:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
        sortOrder:
          type: integer
          default: 0
        metadata:
          type: object
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
          nullable: true
    ReferenceDataUpdateCodeRequest:
      type: object
      additionalProperties: false
      description: >-
        Partial PATCH body. Every property is optional: a property that is
        ABSENT from the body leaves the stored value untouched. A property sent
        as explicit null CLEARS/resets it (sortOrder -> 0, metadata -> {},
        validTo -> null). labels and validFrom reject null -- at least one label
        is always required and valid_from is NOT NULL -- so omit them instead of
        nulling them. Sending {} is a valid no-op update: it returns the current
        representation with 200 and is genuinely inert -- updated_at is not
        bumped and no audit or domain event is emitted. The body itself is
        required and must be a JSON object; an absent, malformed, non-object
        (null, array, scalar) body is rejected with 400 VALIDATION_ERROR rather
        than being treated as {}.
      properties:
        labels:
          type: array
          minItems: 1
          description: Replaces ALL stored labels for this code. Omit to keep them; null is rejected.
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
        sortOrder:
          type: integer
          nullable: true
          description: Omit to keep the stored value; null resets to 0.
        metadata:
          type: object
          nullable: true
          description: Replaces the stored metadata wholesale (not a deep merge). Omit to keep it; null clears it to {}.
        validFrom:
          type: string
          format: date-time
          description: Omit to keep the stored value; null is rejected.
        validTo:
          type: string
          format: date-time
          nullable: true
          description: Omit to keep the stored value; null clears the end of validity.
    ReferenceDataCreateTenantCodeRequest:
      type: object
      required:
        - valueSet
        - code
        - labels
      additionalProperties: false
      properties:
        valueSet:
          type: string
          description: The owning value set's key.
        baseCodeId:
          type: string
          format: uuid
          nullable: true
          description: Set to override an existing baseline code; omit/null to create a tenant extension.
        code:
          type: string
          minLength: 1
          maxLength: 64
        labels:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
        sortOrder:
          type: integer
          default: 0
        metadata:
          type: object
        validFrom:
          type: string
          format: date-time
        validTo:
          type: string
          format: date-time
          nullable: true
    ReferenceDataUpdateTenantCodeRequest:
      type: object
      additionalProperties: false
      description: >-
        Partial PATCH body. Every property is optional: a property that is
        ABSENT from the body leaves the stored value untouched. A property sent
        as explicit null CLEARS/resets it (sortOrder -> 0, metadata -> {},
        validTo -> null). labels and validFrom reject null -- at least one label
        is always required and valid_from is NOT NULL -- so omit them instead of
        nulling them. Sending {} is a valid no-op update: it returns the current
        representation with 200 and is genuinely inert -- updated_at is not
        bumped and no audit or domain event is emitted. The body itself is
        required and must be a JSON object; an absent, malformed, non-object
        (null, array, scalar) body is rejected with 400 VALIDATION_ERROR rather
        than being treated as {}.
      properties:
        labels:
          type: array
          minItems: 1
          description: Replaces ALL stored labels for this code. Omit to keep them; null is rejected.
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
        sortOrder:
          type: integer
          nullable: true
          description: Omit to keep the stored value; null resets to 0.
        metadata:
          type: object
          nullable: true
          description: Replaces the stored metadata wholesale (not a deep merge). Omit to keep it; null clears it to {}.
        validFrom:
          type: string
          format: date-time
          description: Omit to keep the stored value; null is rejected.
        validTo:
          type: string
          format: date-time
          nullable: true
          description: Omit to keep the stored value; null clears the end of validity.
    ReferenceDataImportPayloadCode:
      type: object
      required:
        - code
        - labels
      additionalProperties: false
      properties:
        code:
          type: string
        labels:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/ReferenceCodeLabel"
        sortOrder:
          type: integer
          default: 0
