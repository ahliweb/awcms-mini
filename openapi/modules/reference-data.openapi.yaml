        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Duplicate code, override policy forbids this kind, the submitted code does not match the referenced base code's own code (CODE_MISMATCH_WITH_BASE_CODE), the submitted code as an extension already exists in the global baseline (CODE_COLLIDES_WITH_BASELINE), or Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
