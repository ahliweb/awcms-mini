# Source fragment for the "Blog Search" module/tag (Issue #695, epic #679).
#
# Owns every path tagged "Blog Search" and every schema referenced ONLY by this
# tag's operations. Schemas shared with another module/tag live in the root
# file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/blog/search:
    get:
      tags:
        - Blog Search
      summary: Admin full-text search across blog posts and pages
      operationId: blogSearch
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: type
          in: query
          schema:
            type: string
            enum:
              - post
              - page
        - name: status
          in: query
          schema:
            type: string
            enum:
              - draft
              - review
              - scheduled
              - published
              - archived
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Matching posts and pages, newest first, keyset-paginated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/BlogSearchResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    BlogSearchResponse:
      type: object
      required:
        - items
        - nextCursor
      additionalProperties: false
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/BlogSearchResultItem"
        nextCursor:
          type: string
          nullable: true
    BlogSearchResultItem:
      type: object
      required:
        - resourceType
        - id
        - title
        - slug
        - excerpt
        - status
        - visibility
        - locale
        - publishedAt
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        resourceType:
          type: string
          enum:
            - post
            - page
        id:
          type: string
          format: uuid
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - draft
            - review
            - scheduled
            - published
            - archived
        visibility:
          type: string
          enum:
            - public
            - private
            - unlisted
        locale:
          type: string
        publishedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
