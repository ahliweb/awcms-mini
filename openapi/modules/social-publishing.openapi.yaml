            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Social publish job with attempts.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        allOf:
                          - $ref: "#/components/schemas/SocialPublishJobItem"
                          - type: object
                            required:
                              - attempts
                            properties:
                              attempts:
                                type: array
                                items:
                                  $ref: "#/components/schemas/SocialPublishAttemptItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/jobs/{id}/approve:
    post:
      tags:
        - Social Publishing
      summary: Approve a job pending external posting
      description: High-risk mutation — unblocks external posting. Requires `Idempotency-Key`. Only valid from `requires_approval`.
      operationId: socialPublishingJobsApprove
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  nullable: true
      responses:
        "200":
          description: Job approved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialPublishJobItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request, or the job is not awaiting approval.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/jobs/{id}/cancel:
    post:
      tags:
        - Social Publishing
      summary: Cancel a job
      description: Requires `Idempotency-Key`. Valid from any non-terminal-success status.
      operationId: socialPublishingJobsCancel
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Job cancelled.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialPublishJobItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request, or the job cannot be cancelled from its current status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/jobs/{id}/retry:
    post:
      tags:
        - Social Publishing
      summary: Retry a failed/rate-limited/needs-reauth job
      description: Requires `Idempotency-Key`. Valid from `failed`/`rate_limited`/`needs_reauth`, only while the retry budget (`attemptCount < maxAttempts`) is not exhausted. `attemptCount` is NOT reset by a manual retry.
      operationId: socialPublishingJobsRetry
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Job retry requested.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialPublishJobItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request, or the job cannot be retried from its current status/retry budget.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/settings:
    get:
      tags:
        - Social Publishing
      summary: Get this tenant's social publishing settings
      description: The tenant half of "Auto-posting can be disabled globally and per tenant" (the global half is the deployment-level `SOCIAL_PUBLISHING_ENABLED`/`SOCIAL_PUBLISHING_PROFILE` env gate).
      operationId: socialPublishingSettingsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Social publishing settings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialPublishingSettingsItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Social Publishing
      summary: Toggle the tenant-wide auto-posting master switch
      operationId: socialPublishingSettingsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - autoPublishingEnabled
              properties:
                autoPublishingEnabled:
                  type: boolean
      responses:
        "200":
          description: Social publishing settings updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialPublishingSettingsItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
components:
  schemas:
    SocialAccountItem:
      type: object
      required:
        - id
        - tenantId
        - providerKey
        - providerAccountId
        - providerAccountName
        - providerAccountType
        - connectionStatus
        - scopes
        - autoPublishEnabled
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        providerKey:
          type: string
          description: Provider-neutral by design — not a fixed enum (see migration 050's header). Concrete values are minted by adapter issues (#644/#645/#646) — `telegram_channel` is the first real one (Issue #646).
        providerAccountId:
          type: string
        providerAccountName:
          type: string
        providerAccountType:
          type: string
          enum:
            - page
            - profile
            - channel
            - group
            - organization
        connectionStatus:
          type: string
          enum:
            - pending
            - connected
            - disconnected
            - needs_reauth
            - error
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
          nullable: true
        lastVerifiedAt:
          type: string
          format: date-time
          nullable: true
        autoPublishEnabled:
          type: boolean
        connectedAt:
          type: string
          format: date-time
          nullable: true
        disconnectedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SocialAccountConnectRequest:
      type: object
      required:
        - providerKey
        - providerAccountId
        - providerAccountName
        - providerAccountType
        - tokenReference
      properties:
        providerKey:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,49}$"
        providerAccountId:
          type: string
          maxLength: 200
        providerAccountName:
          type: string
          maxLength: 200
        providerAccountType:
          type: string
          enum:
            - page
            - profile
            - channel
            - group
            - organization
        tokenReference:
          type: string
          maxLength: 500
          description: Opaque reference into external secret storage — NEVER a raw access/refresh token or JWT. Rejected by write-time validation if it looks like one.
        scopes:
          type: array
          items:
            type: string
          default: []
        expiresAt:
          type: string
          format: date-time
          nullable: true
        autoPublishEnabled:
          type: boolean
          default: false
    SocialAccountVerifyResult:
      type: object
      required:
        - accountId
        - providerKey
        - valid
      additionalProperties: false
      properties:
        accountId:
          type: string
          format: uuid
        providerKey:
          type: string
        valid:
          type: boolean
        reason:
          type: string
          nullable: true
          description: Sanitized, safe-to-display machine reason code (e.g. `missing_channel_permission`, `channel_not_found`) — never a raw provider error body.
        verifiedAt:
          type: string
          format: date-time
          nullable: true
          description: The moment this check (or the most recent prior successful check) succeeded — `null` if never successfully verified.
    SocialPublishRuleItem:
      type: object
      required:
        - id
        - tenantId
        - socialAccountId
        - triggerEvent
        - requiresApproval
        - isEnabled
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        socialAccountId:
          type: string
          format: uuid
        triggerEvent:
          type: string
          enum:
            - post_published
            - scheduled_published
            - manual_editor_action
        requiresApproval:
          type: boolean
        isEnabled:
          type: boolean
        templateId:
          type: string
          format: uuid
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SocialPublishRuleCreateRequest:
      type: object
      required:
        - socialAccountId
        - triggerEvent
      properties:
        socialAccountId:
          type: string
          format: uuid
        triggerEvent:
          type: string
          enum:
            - post_published
            - scheduled_published
            - manual_editor_action
        requiresApproval:
          type: boolean
          default: true
        isEnabled:
          type: boolean
          default: true
        templateId:
          type: string
          format: uuid
          nullable: true
    SocialPublishRuleUpdateRequest:
      type: object
      properties:
        requiresApproval:
          type: boolean
        isEnabled:
          type: boolean
        templateId:
          type: string
          format: uuid
          nullable: true
    SocialPublishTemplateItem:
      type: object
      required:
        - id
        - tenantId
        - name
        - captionTemplate
        - isDefault
        - isActive
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        providerKey:
          type: string
          nullable: true
        name:
          type: string
        captionTemplate:
          type: string
          description: "Plain-text placeholder template — supports {{title}}, {{excerpt}}, {{canonicalUrl}}."
        isDefault:
          type: boolean
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SocialPublishTemplateCreateRequest:
      type: object
      required:
        - name
        - captionTemplate
      properties:
        providerKey:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,49}$"
          nullable: true
        name:
          type: string
          maxLength: 200
        captionTemplate:
          type: string
          maxLength: 2000
        isDefault:
          type: boolean
          default: false
        isActive:
          type: boolean
          default: true
    SocialPublishTemplateUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        captionTemplate:
          type: string
          maxLength: 2000
        isDefault:
          type: boolean
        isActive:
          type: boolean
    SocialPublishJobItem:
      type: object
      required:
        - id
        - tenantId
        - socialAccountId
        - articleId
        - providerKey
        - triggerEvent
        - action
        - status
        - requiresApproval
        - title
        - canonicalUrl
        - attemptCount
        - maxAttempts
        - createdAt
        - updatedAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        socialAccountId:
          type: string
          format: uuid
        ruleId:
          type: string
          format: uuid
          nullable: true
        articleId:
          type: string
          format: uuid
        providerKey:
          type: string
        triggerEvent:
          type: string
          enum:
            - post_published
            - scheduled_published
            - manual_editor_action
        action:
          type: string
          enum:
            - publish
        status:
          type: string
          enum:
            - pending
            - requires_approval
            - approved
            - scheduled
            - publishing
            - published
            - failed
            - cancelled
            - skipped
            - rate_limited
            - needs_reauth
        requiresApproval:
          type: boolean
        title:
          type: string
        excerptOrCaption:
          type: string
          nullable: true
        canonicalUrl:
          type: string
        imageUrl:
          type: string
          nullable: true
        approvedBy:
          type: string
          format: uuid
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        attemptCount:
          type: integer
          minimum: 0
        maxAttempts:
          type: integer
          minimum: 1
        nextAttemptAt:
          type: string
          format: date-time
          nullable: true
        externalPostId:
          type: string
          nullable: true
        externalPostUrl:
          type: string
          nullable: true
        lastErrorCode:
          type: string
          nullable: true
          description: Sanitized, safe-to-display error code — never a raw provider error body.
        lastErrorMessage:
          type: string
          nullable: true
          description: Sanitized, safe-to-display error message.
        cancelledAt:
          type: string
          format: date-time
          nullable: true
        cancelReason:
          type: string
          nullable: true
        correlationId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    SocialPublishAttemptItem:
      type: object
      required:
        - id
        - jobId
        - attemptNumber
        - outcome
        - startedAt
        - finishedAt
        - createdAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        jobId:
          type: string
          format: uuid
        attemptNumber:
          type: integer
          minimum: 1
        outcome:
          type: string
          enum:
            - success
            - failed
            - rate_limited
            - needs_reauth
            - skipped
        errorCode:
          type: string
          nullable: true
        errorMessage:
          type: string
          nullable: true
        externalPostId:
          type: string
          nullable: true
        externalPostUrl:
          type: string
          nullable: true
        correlationId:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
    SocialPublishingSettingsItem:
      type: object
      required:
        - tenantId
        - autoPublishingEnabled
        - updatedAt
      additionalProperties: false
      properties:
        tenantId:
          type: string
          format: uuid
        autoPublishingEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
