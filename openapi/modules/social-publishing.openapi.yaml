      tags:
        - Social Publishing
      summary: Get a social publish job with its full attempt history
      operationId: socialPublishingJobsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
