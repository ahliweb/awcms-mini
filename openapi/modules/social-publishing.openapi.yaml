              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - rules
                        properties:
                          rules:
                            type: array
                            items:
                              $ref: "#/components/schemas/SocialPublishRuleItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Social Publishing
      summary: Create a social publish rule
      description: Not idempotent (same low-risk admin-config-mutation class as ad placement/homepage section creation). `socialAccountId` must reference an existing account for this tenant.
      operationId: socialPublishingRulesCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialPublishRuleCreateRequest"
      responses:
        "200":
          description: Social publish rule created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialPublishRuleItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "422":
          description: socialAccountId does not reference an existing account for this tenant.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/rules/{id}:
    patch:
      tags:
