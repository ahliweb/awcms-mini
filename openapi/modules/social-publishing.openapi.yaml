  /api/v1/social-publishing/jobs:
    get:
      tags:
        - Social Publishing
      summary: List this tenant's social publish jobs
      description: Bounded list (max 200), optional `status` filter. Full keyset pagination is a documented follow-up, not implemented in this foundation issue.
      operationId: socialPublishingJobsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - requires_approval
              - approved
              - scheduled
              - publishing
              - published
              - failed
              - cancelled
              - skipped
              - rate_limited
              - needs_reauth
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Social publish jobs.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - jobs
                        properties:
                          jobs:
                            type: array
                            items:
                              $ref: "#/components/schemas/SocialPublishJobItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
