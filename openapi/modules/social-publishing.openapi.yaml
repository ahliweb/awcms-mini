# Source fragment for the "Social Publishing" module/tag (Issue #643, epic
# `social_publishing` #643-#647).
#
# Owns every path tagged "Social Publishing" and every schema referenced ONLY
# by this tag's operations. Schemas shared with another module/tag live in
# the root file (openapi/awcms-mini-public-api.src.yaml) instead.
#
# This is a FOUNDATION issue — no provider-specific (Meta/LinkedIn/Telegram)
# endpoint exists; every operation here is provider-neutral (account
# connect/disconnect, rule/template CRUD, job/attempt read, approve/cancel/
# retry, per-tenant settings).
#
# NOT independently valid OpenAPI -- $ref targets pointing at shared
# components (securitySchemes/parameters/responses, and cross-module
# schemas) only resolve after `bun run openapi:bundle` merges this file with
# the root file and every sibling module file into
# openapi/awcms-mini-public-api.openapi.yaml. Edit this file (or the root
# file for shared components), never the generated bundle.
paths:
  /api/v1/social-publishing/accounts:
    get:
      tags:
        - Social Publishing
      summary: List this tenant's connected/disconnected social accounts
      operationId: socialPublishingAccountsList
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Social accounts. `token_reference` is never included in any response.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - accounts
                        properties:
                          accounts:
                            type: array
                            items:
                              $ref: "#/components/schemas/SocialAccountItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Social Publishing
      summary: Connect (or reconnect/reauthorize) a social account
      description: High-risk mutation — writes a `tokenReference` (opaque secret-storage pointer, never a raw token/JWT — rejected by write-time validation if it looks like one). Requires `Idempotency-Key`. Upserts on `(providerKey, providerAccountId)` — reconnecting an already-known account (e.g. after `needs_reauth`) IS the reauthorization flow.
      operationId: socialPublishingAccountsConnect
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SocialAccountConnectRequest"
      responses:
        "200":
          description: Social account connected.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialAccountItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/accounts/{id}:
    get:
      tags:
        - Social Publishing
      summary: Get a social account by id
      operationId: socialPublishingAccountsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Social account.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialAccountItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Social Publishing
      summary: Toggle per-account auto-publish enablement
      description: Only touches `autoPublishEnabled` — no credential change, gated by `rules.configure` (not `accounts.connect`/`.disconnect`).
      operationId: socialPublishingAccountsUpdateAutoPublish
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - autoPublishEnabled
              properties:
                autoPublishEnabled:
                  type: boolean
      responses:
        "200":
          description: Social account updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialAccountItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/accounts/{id}/disconnect:
    post:
      tags:
        - Social Publishing
      summary: Disconnect a social account
      description: High-risk mutation — clears `tokenReference`, stops all auto-publishing for this account. Requires `Idempotency-Key`. A status transition, not a delete (no `accounts.delete` permission exists).
      operationId: socialPublishingAccountsDisconnect
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Social account disconnected.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialAccountItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/accounts/{id}/verify:
    post:
      tags:
        - Social Publishing
      summary: Verify a connected account can be posted to
      description: >-
        Generic, provider-neutral "verify connection" action (Issue #646) —
        calls the registered provider adapter's `verifyCredentials` (e.g. the
        Telegram channel adapter checks the bot is a channel administrator
        with post permission). Requires `Idempotency-Key` (real outbound
        provider call, same external-call class as `accounts.connect`/
        `.disconnect`), gated by `accounts.verify` (not classified high-risk —
        only updates `lastVerifiedAt`/`scopes`, never `tokenReference`). A
        failed check is still a `200` with `valid: false` — informational,
        never itself a state transition on the account.
      operationId: socialPublishingAccountsVerify
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Verification check result.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SocialAccountVerifyResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the account is disconnected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/social-publishing/rules:
    get:
      tags:
        - Social Publishing
      summary: List this tenant's social publish rules
      operationId: socialPublishingRulesList
      security:
        - bearerAuth: []
          tenantHeader: []
