          type: string
          format: uuid
        ownerIdentityId:
          type: string
          format: uuid
        ownerTenantUserId:
          type: string
          format: uuid
        ownerRoleId:
          type: string
          format: uuid
    SyncPushEvent:
      type: object
      required:
        - eventType
        - aggregateType
        - payload
      additionalProperties: false
      properties:
        eventType:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        baseVersion:
          type: integer
          minimum: 0
          description: >-
            The aggregate version this event was based on. Required once the
            aggregate has any history; a mismatch against the server's
            current version is recorded as a conflict instead of applied.
        payload:
          description: Event payload; shape is producer-defined.
    SyncPushRequest:
      type: object
      required:
        - batchId
        - events
      additionalProperties: false
      properties:
        batchId:
          type: string
          minLength: 1
          description: Client-supplied idempotency key for this batch.
        events:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SyncPushEvent"
    SyncPushResponse:
      type: object
      required:
        - batchId
        - accepted
        - conflicted
        - duplicate
      additionalProperties: false
      properties:
        batchId:
          type: string
        accepted:
          type: integer
          minimum: 0
        conflicted:
          type: integer
          minimum: 0
          description: Number of events recorded as conflicts instead of applied.
        duplicate:
          type: boolean
          description: True if this batchId was already processed; no events were reprocessed.
    SyncPullRequest:
      type: object
      additionalProperties: false
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
    SyncPulledEvent:
      type: object
      required:
        - sequence
        - eventType
        - aggregateType
        - payload
        - createdAt
      additionalProperties: false
      properties:
        sequence:
          type: integer
        eventType:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        payload:
          description: Event payload; shape is producer-defined.
        createdAt:
          type: string
          format: date-time
    SyncPullResponse:
      type: object
      required:
        - events
        - checkpoint
        - hasMore
      additionalProperties: false
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/SyncPulledEvent"
        checkpoint:
          type: integer
        hasMore:
          type: boolean
    SyncStatusResponse:
      type: object
      required:
        - nodeCode
        - status
        - checkpoint
      additionalProperties: false
      properties:
        nodeCode:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        lastPushedAt:
          type: string
          format: date-time
        lastPulledAt:
          type: string
          format: date-time
        checkpoint:
          type: integer
    SyncConflictEntry:
      type: object
      required:
        - id
