        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/enroll/start:
    post:
      tags:
        - Identity & Access
      summary: Generate a new pending TOTP secret for the caller to confirm
      description: "Full-online-only (Issue #589). Returns the plaintext secret/QR URI ONLY here, at enrollment start — never again afterward. The factor is `pending` (unusable for login) until confirmed via `POST /auth/mfa/totp/enroll/verify`. Rejects with `409 MFA_ALREADY_ACTIVE` if the caller already has an active factor — re-enrollment must go through `disable` first."
      operationId: authMfaTotpEnrollStart
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Pending TOTP factor created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaEnrollStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: An MFA factor is already active for this account (`MFA_ALREADY_ACTIVE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/enroll/verify:
    post:
      tags:
        - Identity & Access
      summary: Confirm a pending TOTP enrollment with a live code
      description: "Full-online-only (Issue #589). Activates the pending factor from `enroll/start` and returns 10 single-use recovery codes shown exactly once (never retrievable again — only `recovery-codes/regenerate` can produce a fresh set afterward)."
      operationId: authMfaTotpEnrollVerify
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaEnrollVerifyRequest"
      responses:
