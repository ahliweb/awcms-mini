openapi: 3.1.0
info:
  title: AWCMS-Mini Public API
  version: 1.0.0
  description: >-
    Stable REST contract for the AWCMS-Mini modular monolith base (ADR-0008
    — contract version is independent of the package release version;
    bumped only when the contract shape itself changes).
servers:
  - url: http://localhost:4321
    description: Local development
tags:
  - name: Foundation
    description: Foundation and platform endpoints.
  - name: Tenant Admin
    description: Tenant, office, and the one-time setup wizard.
  - name: Identity & Access
    description: Login identity, session authentication, and tenant user membership.
  - name: Sync Storage
    description: Offline-first sync node registration and HMAC-signed push/pull.
  - name: Management Reporting
    description: >-
      Generic read-aggregation reporting views (tenant activity,
      access/audit summary, sync health, module usage). Live aggregation
      over existing tables; no dedicated reporting tables, worker, or cache.
  - name: Logging & Audit
    description: >-
      Cross-module audit trail (awcms_mini_audit_events) and its read API.
      Complements, not replaces, domain events and structured logs.
  - name: Profile Identity
    description: >-
      Profile lifecycle (soft delete/restore/purge) demonstrating the audit
      trail end-to-end. Full profile CRUD (create/update/list) remains
      out of scope/backlog.
  - name: Database Connectivity
    description: >-
      Connection pool config, work-class backpressure gate, and circuit
      breaker health (Issue 10.2, doc 16 §Connection pooling dan
      backpressure).
  - name: Workflow Approval
    description: >-
      Generic multi-step approval engine (definitions, instances, tasks,
      decisions). Only the decision API is public (doc 17 seed grants no
      create/configure action for workflow.approval) — no
      create-definition/start-instance endpoint by design.
  - name: Form Drafts
    description: >-
      Generic, domain-agnostic server-side draft store for the reusable
      wizard pattern (Issue #484) — create/update/read/submit/delete a
      tenant-scoped JSONB payload. No domain-specific meaning; a derived
      module decides what a draft's payload contains.
  - name: Email Templates
    description: >-
      Tenant email template CRUD, soft-delete/restore, per-category variable
      allowlists, i18n locale variants, and admin preview (Issue #498).
  - name: Email Announcements
    description: >-
      Bulk announcement/notification enqueue and dry-run preview, targeting
      an explicit user list, a role, or the whole tenant with two-tier ABAC
      (Issue #497).
  - name: Email Messages
    description: >-
      Admin queue diagnostics (queue health, failed messages, retry
      backlog) and cancel-before-send for still-queued messages (Issue
      #499).
  - name: Email Suppressions
    description: >-
      Manual suppression list read/create/delete — recipients excluded from
      future sends (bounce/complaint/manual/unsubscribed), Issue #499.
  - name: Module Management
    description: >-
      Database-backed module catalog and descriptor sync (epic #510). Read
      the module registry, inspect a single module's detail, and trigger a
      sync of trusted code descriptors into the database — distinct from
      `GET /api/v1/access/modules`'s permission catalog.
  - name: Blog Posts
    description: >-
      Tenant-scoped blog post admin API (epic #536, Issue #538) — CRUD plus
      lifecycle actions (submit for review, publish, schedule, archive,
      restore, purge). Builds on the `blog_content` schema/permission
      foundation from Issue #537; pages, taxonomies, public routes, and
      revisions are separate, later issues.
paths:
  /api/v1/sync/push:
    post:
      tags:
        - Sync Storage
      summary: Push a batch of local events to the server (idempotent per batchId)
      operationId: syncPush
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPushRequest"
      responses:
        "200":
          description: Batch accepted (or already applied, if the batchId was seen before).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncPushResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/pull:
    post:
      tags:
        - Sync Storage
      summary: Pull events newer than the node's stored checkpoint
      operationId: syncPull
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPullRequest"
      responses:
        "200":
          description: Events since the node's last checkpoint, and the new checkpoint.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncPullResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/status:
    get:
      tags:
        - Sync Storage
      summary: Get the calling node's sync status
      operationId: syncGetStatus
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Sync node status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/conflicts:
    get:
      tags:
        - Sync Storage
      summary: List sync conflicts for the tenant (bearer session, not HMAC)
      operationId: syncListConflicts
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - open
              - resolved
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Recent sync conflicts, newest first (limit 50).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncConflictListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/conflicts/{id}/resolve:
    post:
      tags:
        - Sync Storage
      summary: Resolve a sync conflict (bearer session, not HMAC)
      operationId: syncResolveConflict
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncConflictResolveRequest"
      responses:
        "200":
          description: Conflict resolved.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncConflictResolveResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Conflict is already resolved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/objects:
    post:
      tags:
        - Sync Storage
      summary: Enqueue local objects for R2 sync (upsert by objectKey)
      operationId: syncEnqueueObjects
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ObjectSyncEnqueueRequest"
      responses:
        "200":
          description: Objects queued (re-enqueuing an existing objectKey upserts it back to pending).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ObjectSyncEnqueueResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/objects/status:
    get:
      tags:
        - Sync Storage
      summary: List this node's pending/failed object sync queue entries
      operationId: syncGetObjectsStatus
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Non-sent object sync queue entries for this node (limit 100), oldest first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ObjectSyncStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/nodes:
    get:
      tags:
        - Sync Storage
      summary: List sync nodes for the tenant (bearer session or SSR cookie, not HMAC)
      description: >-
        Admin-facing view of node registrations — distinct from the
        machine-to-machine HMAC endpoints (`/sync/push`, `/sync/pull`,
        `/sync/status`, `/sync/objects*`).
      operationId: syncListNodes
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: All sync nodes registered for the tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncNodeListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/nodes/{id}:
    patch:
      tags:
        - Sync Storage
      summary: Activate/deactivate or rename a sync node
      description: >-
        Deactivating a node takes effect immediately: every HMAC sync
        endpoint already rejects a non-active node with 403. Use this to
        revoke a lost/retired device.
      operationId: syncUpdateNode
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyncNodeRequest"
      responses:
        "200":
          description: Sync node updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/object-queue:
    get:
      tags:
        - Sync Storage
      summary: List object sync queue entries tenant-wide (bearer session, not HMAC)
      description: >-
        Admin-facing, all-nodes view — distinct from the node-scoped, HMAC
        `GET /sync/objects/status` that a single node polls for its own work.
      operationId: syncListObjectQueue
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - pending
              - sent
              - failed
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Object sync queue entries tenant-wide (limit 200), newest first.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ObjectQueueListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/object-queue/{id}/retry:
    post:
      tags:
        - Sync Storage
      summary: Manually retry a failed object sync queue entry
      description: >-
        Human override of the automatic exponential-backoff schedule — resets
        retry_count/next_retry_at/last_error and status back to `pending` so
        the node's next status poll picks it up. Only `failed` entries are
        eligible; `pending`/`sent` are rejected with 409.
      operationId: syncRetryObjectQueueEntry
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Entry reset to pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiSuccess"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Only failed entries can be retried.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/settings:
    get:
      tags:
        - Tenant Admin
      summary: Read the tenant's profile and settings
      description: >-
        Joins awcms_mini_tenants (tenant_name, legal_name, default_locale,
        default_theme) and awcms_mini_tenant_settings (timezone,
        feature_flags).
      operationId: settingsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Tenant profile and settings.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Tenant Admin
      summary: Update a subset of the tenant's profile and settings
      operationId: settingsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantSettingsRequest"
      responses:
        "200":
          description: Settings updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/setup/status:
    get:
      tags:
        - Tenant Admin
      summary: Check whether the setup wizard has already run
      operationId: setupGetStatus
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Setup lock status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupStatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/setup/initialize:
    post:
      tags:
        - Tenant Admin
      summary: Bootstrap the first tenant, owner, office, and access assignment
      operationId: setupInitialize
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitializeRequest"
      responses:
        "200":
          description: Setup completed; tenant, owner, and office created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupInitializeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Setup has already been completed and is permanently locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/login:
    post:
      tags:
        - Identity & Access
      summary: Authenticate an identity and issue a session token
      operationId: authLogin
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/logout:
    post:
      tags:
        - Identity & Access
      summary: Revoke the caller's active session
      operationId: authLogout
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/me:
    get:
      tags:
        - Identity & Access
      summary: Get the caller's active identity
      operationId: authMe
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Active identity for the current session.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/password/forgot:
    post:
      tags:
        - Identity & Access
      summary: >-
        Request a password reset email; always returns a generic response
        regardless of whether the identifier matches an account
      operationId: authPasswordForgot
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: >-
            Generic acknowledgement — does not reveal whether the account
            exists.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          description: Too many password reset requests from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/password/reset:
    post:
      tags:
        - Identity & Access
      summary: Complete a password reset with a valid one-time token
      operationId: authPasswordReset
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset; all active sessions for the identity are revoked.
          content:
            application/json:
