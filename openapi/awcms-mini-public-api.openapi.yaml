          type: string
          format: uuid
          nullable: true
          description: "When full-online R2-only news portal mode is active for this tenant (Issue #636), must reference an existing, same-tenant media object (Issue #633) with status verified or attached — never a local path or arbitrary external URL. A non-conforming reference is rejected with 422 NEWS_MEDIA_REFERENCE_INVALID. Outside that mode, only the UUID shape is validated."
        seoImageMediaId:
          type: string
          format: uuid
          nullable: true
          description: "Issue #649 — explicit social/SEO preview image override, same validation as featuredMediaId. Takes priority over featuredMediaId when resolving og:image/twitter:image/JSON-LD image for public sharing."
        seoTitle:
          type: string
          maxLength: 70
          nullable: true
        metaDescription:
          type: string
          maxLength: 160
          nullable: true
        canonicalUrl:
          type: string
          nullable: true
        termIds:
          type: array
          items:
            type: string
            format: uuid
          description: "Replaces the full category/tag assignment set for this post (Issue #539)."
        autoInternalTagLinksDisabled:
          type: boolean
          description: "Manual per-post opt-out of automatic internal tag linking (Issue #641). Defaults false."
    UpdateBlogSettingsInput:
      type: object
