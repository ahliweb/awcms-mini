                          taskId:
                            type: string
                            format: uuid
                          instanceId:
                            type: string
                            format: uuid
                          instanceFinished:
                            type: boolean
                          instanceStatus:
                            type: string
                            enum:
                              - pending
                              - approved
                              - rejected
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the task is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/workflows/tasks/{id}/reassign:
    post:
