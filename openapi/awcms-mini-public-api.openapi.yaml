    post:
      tags:
        - Social Publishing
      summary: Verify a connected account can be posted to
      description: 'Generic, provider-neutral "verify connection" action (Issue #646) — calls the registered provider adapter''s `verifyCredentials` (e.g. the Telegram channel adapter checks the bot is a channel administrator with post permission; the Meta adapter, Issue #644, checks the access token via `debug_token` and that it can reach the connected Page/Instagram Business account). Requires `Idempotency-Key` (real outbound provider call, same external-call class as `accounts.connect`/`.disconnect`), gated by `accounts.verify` (not classified high-risk — only updates `lastVerifiedAt`/`scopes`, never `tokenReference`). A failed check is still a `200` with `valid: false` — informational, never itself a state transition on the account.'
      operationId: socialPublishingAccountsVerify
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
