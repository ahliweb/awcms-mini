                        $ref: "#/components/schemas/TenantModuleListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/tenant/modules/{moduleKey}/disable:
    post:
      tags:
        - Module Management
      summary: Disable a module for the caller's tenant
      description: "`reason` required. Never deletes tenant data — only writes `awcms_mini_tenant_modules`. Rejected with `409` if the module is core/system, already disabled, or another still-enabled module depends on it."
      operationId: tenantModulesDisable
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: moduleKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              additionalProperties: false
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Module disabled for the tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantModuleMutationResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Dependency validation failed (see `error.code`: `MODULE_ALREADY_DISABLED`, `CORE_MODULE_CANNOT_BE_DISABLED`, `MODULE_REVERSE_DEPENDENCY_ACTIVE`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/tenant/modules/{moduleKey}/enable:
    post:
      tags:
        - Module Management
      summary: Enable a module for the caller's tenant
      description: Tenant-level availability only, never a runtime code load. Server-side dependency validation rejects the request with `409` if a direct dependency is missing/disabled, the module is part of a dependency cycle, or the module declares an incompatible `minAppVersion`. `404` only for an unknown/globally-disabled module key.
      operationId: tenantModulesEnable
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: moduleKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Module enabled for the tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantModuleMutationResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: "Dependency validation failed (see `error.code`: `MODULE_ALREADY_ENABLED`, `MODULE_DEPENDENCY_MISSING`, `MODULE_DEPENDENCY_DISABLED`, `MODULE_DEPENDENCY_CYCLE`, `MODULE_VERSION_INCOMPATIBLE`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/tenant/modules/{moduleKey}/settings:
    get:
      tags:
        - Module Management
      summary: Read effective tenant module settings
      description: Effective settings = the module's own code-declared defaults with the tenant's stored override applied on top. A module with no override row yet still returns a view (defaults-only `effective`), not a `404` — only an unknown `moduleKey` is `404`.
      operationId: tenantModuleSettingsGet
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: moduleKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Effective module settings for the tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ModuleSettingsView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Module Management
      summary: Update tenant module settings
      description: Merges the body into the tenant's existing settings override (shallow, top-level JSON-merge-patch — omitted keys are left untouched). Rejected with `400 SETTINGS_SENSITIVE_KEY_REJECTED` if any key anywhere in the body looks secret-shaped (matches the shared redaction key list), or `400 SETTINGS_SECRET_SHAPED_VALUE_REJECTED` if any string value anywhere in the body looks credential-shaped regardless of its key's own name (a JWT, a PEM private key block, an AWS access key id, a raw `Bearer`/`Basic` header value, or a connection string with an embedded `user:pass@` credential) — provider secrets belong in environment variables or a secret manager, never tenant-writable settings. Audited with safe diff metadata (changed key names only, never values).
      operationId: tenantModuleSettingsUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: moduleKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Arbitrary non-secret JSON object; merged into the tenant's existing override.
      responses:
        "200":
          description: Module settings updated for the tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ModuleSettingsView"
        "400":
          description: "Validation failed (see `error.code`: `VALIDATION_ERROR`, `SETTINGS_SENSITIVE_KEY_REJECTED`, `SETTINGS_SECRET_SHAPED_VALUE_REJECTED`)."
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
