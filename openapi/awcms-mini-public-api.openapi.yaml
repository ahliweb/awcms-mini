          minimum: 0
        activeNodeCount:
          type: integer
          minimum: 0
        openConflictCount:
          type: integer
          minimum: 0
        pendingObjectCount:
          type: integer
          minimum: 0
        failedObjectCount:
          type: integer
          minimum: 0
        hasOpenConflicts:
          type: boolean
        hasFailedObjects:
          type: boolean
        isHealthy:
          type: boolean
          description: activeNodeCount > 0 and no open conflicts and no failed objects.
