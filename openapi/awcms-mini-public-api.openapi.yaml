    CreateFormDraftRequest:
      type: object
      required:
        - moduleKey
        - wizardKey
        - resourceType
        - currentStep
        - payload
      additionalProperties: false
      properties:
        moduleKey:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,63}$"
        wizardKey:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,63}$"
        resourceType:
          type: string
          pattern: "^[a-z][a-z0-9_]{1,63}$"
        resourceId:
          type: string
          maxLength: 128
        currentStep:
          type: string
          maxLength: 64
        payload:
          type: object
          description: >-
            Arbitrary JSON scratch state up to 32KB serialized. Must never
            contain a field resembling a secret (password, token, credential,
            apiKey, privateKey) — rejected with 400 VALIDATION_ERROR if found.
        expiresAt:
          type: string
          format: date-time
