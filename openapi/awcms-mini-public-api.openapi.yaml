        - batchId
        - aggregateType
        - aggregateId
        - conflictType
        - payload
        - status
        - createdAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        nodeId:
          type: string
          format: uuid
        batchId:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        conflictType:
          type: string
          enum:
            - version_mismatch
            - missing_base_version
        payload:
          description: The event payload that triggered the conflict.
        status:
          type: string
          enum:
            - open
            - resolved
        resolution:
          type: string
          enum:
            - accept_incoming
            - keep_existing
            - manual
        resolutionNote:
          type: string
        resolvedBy:
          type: string
          format: uuid
        resolvedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
