openapi: 3.1.0
info:
  title: AWCMS-Mini Public API
  version: 0.1.0
  description: Baseline REST contract for the AWCMS-Mini modular monolith foundation.
servers:
  - url: http://localhost:4321
    description: Local development
tags:
  - name: Foundation
    description: Foundation and platform endpoints.
  - name: Tenant Admin
    description: Tenant, office, and the one-time setup wizard.
  - name: Identity & Access
    description: Login identity, session authentication, and tenant user membership.
  - name: Sync Storage
    description: Offline-first sync node registration and HMAC-signed push/pull.
paths:
  /api/v1/sync/push:
    post:
      tags:
        - Sync Storage
      summary: Push a batch of local events to the server (idempotent per batchId)
      operationId: syncPush
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPushRequest"
      responses:
        "200":
          description: Batch accepted (or already applied, if the batchId was seen before).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncPushResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/pull:
    post:
      tags:
        - Sync Storage
      summary: Pull events newer than the node's stored checkpoint
      operationId: syncPull
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncPullRequest"
      responses:
        "200":
          description: Events since the node's last checkpoint, and the new checkpoint.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncPullResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/sync/status:
    get:
      tags:
        - Sync Storage
      summary: Get the calling node's sync status
      operationId: syncGetStatus
      security:
        - syncHmac: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/SyncNodeId"
        - $ref: "#/components/parameters/SyncTimestamp"
        - $ref: "#/components/parameters/SyncSignature"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Sync node status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SyncStatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/setup/status:
    get:
      tags:
        - Tenant Admin
      summary: Check whether the setup wizard has already run
      operationId: setupGetStatus
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Setup lock status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupStatusResponse"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/setup/initialize:
    post:
      tags:
        - Tenant Admin
      summary: Bootstrap the first tenant, owner, office, and access assignment
      operationId: setupInitialize
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupInitializeRequest"
      responses:
        "200":
          description: Setup completed; tenant, owner, and office created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SetupInitializeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Setup has already been completed and is permanently locked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/login:
    post:
      tags:
        - Identity & Access
      summary: Authenticate an identity and issue a session token
      operationId: authLogin
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/AcceptLanguage"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Session issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/logout:
    post:
      tags:
        - Identity & Access
      summary: Revoke the caller's active session
      operationId: authLogout
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Session revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LogoutResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/me:
    get:
      tags:
        - Identity & Access
      summary: Get the caller's active identity
      operationId: authMe
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Active identity for the current session.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/modules:
    get:
      tags:
        - Identity & Access
      summary: List the module/activity/action permission registry
      operationId: accessListModules
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Permission registry.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ModuleRegistryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/evaluate:
    post:
      tags:
        - Identity & Access
      summary: Evaluate an ABAC access request for the caller
      operationId: accessEvaluate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessEvaluateRequest"
      responses:
        "200":
          description: Access decision. Always recorded in the decision log.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AccessEvaluateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/assignments:
    post:
      tags:
        - Identity & Access
      summary: Assign a role to a tenant user
      operationId: accessCreateAssignment
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessAssignmentRequest"
      responses:
        "200":
          description: Role assignment created or already present (idempotent).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AccessAssignmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/decision-logs:
    get:
      tags:
        - Identity & Access
      summary: List recent ABAC decision log entries for the tenant
      operationId: accessListDecisionLogs
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Recent decision log entries, newest first (limit 50).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/DecisionLogListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/health:
    get:
      tags:
        - Foundation
      summary: Check foundation health
      operationId: getHealth
      security: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
        - $ref: "#/components/parameters/AcceptLanguage"
      responses:
        "200":
          description: Service health status.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalError"
x-awcms-mini-soft-delete-pattern:
  delete:
    method: DELETE
    pathPattern: /api/v1/{resources}/{id}
    behavior: Soft delete using deleted_at, deleted_by, and delete_reason.
  restore:
    method: POST
    pathPattern: /api/v1/{resources}/{id}/restore
    behavior: Restore with ABAC, unique-key conflict validation, and audit.
  purgeRequest:
    method: POST
    pathPattern: /api/v1/{resources}/{id}/purge-request
    behavior: Retention or legal workflow request, never direct physical delete.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Standard authenticated API access.
    tenantHeader:
      type: apiKey
      in: header
      name: X-AWCMS-Mini-Tenant-ID
      description: Active tenant context for tenant-scoped API.
    syncHmac:
      type: apiKey
      in: header
      name: X-AWCMS-Mini-Signature
      description: HMAC signature for sync endpoints with node and timestamp headers.
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Optional server-side trace correlation ID.
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Optional client-generated request trace ID.
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        example: id
      description: Preferred response locale.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: Required for high-risk mutations.
    SyncNodeId:
      name: X-AWCMS-Mini-Node-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 128
      description: Sync node identifier.
    SyncTimestamp:
      name: X-AWCMS-Mini-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time
      description: Request timestamp used for anti-replay checks.
    SyncSignature:
      name: X-AWCMS-Mini-Signature
      in: header
      required: true
      schema:
        type: string
        minLength: 32
      description: HMAC signature over the sync request.
  responses:
    BadRequest:
      description: Validation or request error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Authentication required or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Access denied by RBAC, ABAC, or tenant policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found or hidden by soft-delete policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: Internal server error without stack trace.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    ApiMeta:
      type: object
      additionalProperties: false
      properties:
        correlationId:
          type: string
        requestId:
          type: string
    ApiSuccess:
      type: object
      required:
        - success
        - data
        - meta
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Response payload.
        meta:
          $ref: "#/components/schemas/ApiMeta"
    ApiError:
      type: object
      required:
        - success
        - error
        - meta
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          additionalProperties: false
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
            details:
              type: array
              items:
                $ref: "#/components/schemas/ErrorDetail"
        meta:
          $ref: "#/components/schemas/ApiMeta"
    ErrorDetail:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - AUTH_REQUIRED
        - AUTH_INVALID_CREDENTIALS
        - TOKEN_EXPIRED
        - ACCESS_DENIED
        - TENANT_REQUIRED
        - RESOURCE_NOT_FOUND
        - RESOURCE_DELETED
        - IDEMPOTENCY_REQUIRED
        - IDEMPOTENCY_CONFLICT
        - WORKFLOW_APPROVAL_REQUIRED
        - SYNC_CONFLICT
        - DATABASE_BUSY
        - PROVIDER_ERROR
        - INTERNAL_ERROR
    HealthResponse:
      type: object
      required:
        - status
        - service
        - runtime
        - buildMode
        - moduleCount
        - generatedAt
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          const: awcms-mini
        runtime:
          type: string
          const: bun
        buildMode:
          type: string
        moduleCount:
          type: integer
          minimum: 0
        generatedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - loginIdentifier
        - password
      additionalProperties: false
      properties:
        loginIdentifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          writeOnly: true
    LoginResponse:
      type: object
      required:
        - token
        - expiresAt
      additionalProperties: false
      properties:
        token:
          type: string
          description: Opaque bearer session token. Shown only once, at login.
        expiresAt:
          type: string
          format: date-time
    LogoutResponse:
      type: object
      required:
        - loggedOut
      additionalProperties: false
      properties:
        loggedOut:
          type: boolean
          const: true
    MeResponse:
      type: object
      required:
        - identityId
        - loginIdentifier
        - profileId
        - status
        - lastLoginAt
      additionalProperties: false
      properties:
        identityId:
          type: string
          format: uuid
        loginIdentifier:
          type: string
        profileId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - active
            - inactive
            - locked
        lastLoginAt:
          type:
            - string
            - "null"
          format: date-time
    ModuleRegistryEntry:
      type: object
      required:
        - moduleKey
        - activityCode
        - action
      additionalProperties: false
      properties:
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
        description:
          type: string
    ModuleRegistryResponse:
      type: object
      required:
        - modules
      additionalProperties: false
      properties:
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleRegistryEntry"
    AccessEvaluateRequest:
      type: object
      required:
        - moduleKey
        - activityCode
        - action
      additionalProperties: false
      properties:
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
          enum:
            - read
            - create
            - update
            - delete
            - post
            - cancel
            - approve
            - export
            - send
            - configure
            - analyze
            - assign
        resourceType:
          type: string
        resourceId:
          type: string
        resourceAttributes:
          type: object
          additionalProperties: true
        environmentAttributes:
          type: object
          additionalProperties: true
    AccessEvaluateResponse:
      type: object
      required:
        - allowed
        - reason
      additionalProperties: false
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        matchedPolicy:
          type: string
    AccessAssignmentRequest:
      type: object
      required:
        - tenantUserId
        - roleId
      additionalProperties: false
      properties:
        tenantUserId:
          type: string
          format: uuid
        roleId:
          type: string
          format: uuid
    AccessAssignmentResponse:
      type: object
      required:
        - assignmentId
      additionalProperties: false
      properties:
        assignmentId:
          type: string
          format: uuid
    DecisionLogEntry:
      type: object
      required:
        - id
        - moduleKey
        - activityCode
        - action
        - decision
        - reason
        - createdAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantUserId:
          type: string
          format: uuid
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
        decision:
          type: string
          enum:
            - allow
            - deny
        reason:
          type: string
        matchedPolicy:
          type: string
        createdAt:
          type: string
          format: date-time
    DecisionLogListResponse:
      type: object
      required:
        - decisionLogs
      additionalProperties: false
      properties:
        decisionLogs:
          type: array
          items:
            $ref: "#/components/schemas/DecisionLogEntry"
    SetupStatusResponse:
      type: object
      required:
        - locked
      additionalProperties: false
      properties:
        locked:
          type: boolean
        tenantId:
          type: string
          format: uuid
        lockedAt:
          type: string
          format: date-time
    SetupInitializeRequest:
      type: object
      required:
        - tenantCode
        - tenantName
        - officeCode
        - officeName
        - ownerLoginIdentifier
        - ownerPassword
        - ownerDisplayName
      additionalProperties: false
      properties:
        tenantCode:
          type: string
          minLength: 1
        tenantName:
          type: string
          minLength: 1
        officeCode:
          type: string
          minLength: 1
        officeName:
          type: string
          minLength: 1
        ownerLoginIdentifier:
          type: string
          minLength: 1
        ownerPassword:
          type: string
          minLength: 8
          writeOnly: true
        ownerDisplayName:
          type: string
          minLength: 1
    SetupInitializeResponse:
      type: object
      required:
        - tenantId
        - officeId
        - ownerProfileId
        - ownerIdentityId
        - ownerTenantUserId
        - ownerRoleId
      additionalProperties: false
      properties:
        tenantId:
          type: string
          format: uuid
        officeId:
          type: string
          format: uuid
        ownerProfileId:
          type: string
          format: uuid
        ownerIdentityId:
          type: string
          format: uuid
        ownerTenantUserId:
          type: string
          format: uuid
        ownerRoleId:
          type: string
          format: uuid
    SyncPushEvent:
      type: object
      required:
        - eventType
        - aggregateType
        - payload
      additionalProperties: false
      properties:
        eventType:
          type: string
        aggregateType:
          type: string
        aggregateId:
          type: string
          format: uuid
        payload:
          description: Event payload; shape is producer-defined.
    SyncPushRequest:
      type: object
      required:
        - batchId
        - events
      additionalProperties: false
      properties:
        batchId:
          type: string
          minLength: 1
          description: Client-supplied idempotency key for this batch.
        events:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SyncPushEvent"
    SyncPushResponse:
      type: object
      required:
        - batchId
        - accepted
        - duplicate
      additionalProperties: false
      properties:
        batchId:
          type: string
        accepted:
          type: integer
          minimum: 0
        duplicate:
          type: boolean
          description: True if this batchId was already processed; no events were reprocessed.
    SyncPullRequest:
      type: object
      additionalProperties: false
      properties:
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
