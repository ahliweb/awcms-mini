                          taskId:
                            type: string
                            format: uuid
                          assignmentId:
                            type: string
                            format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or the task is not pending.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
x-awcms-mini-soft-delete-pattern:
  delete:
    method: DELETE
    pathPattern: /api/v1/{resources}/{id}
    behavior: Soft delete using deleted_at, deleted_by, and delete_reason.
  restore:
    method: POST
    pathPattern: /api/v1/{resources}/{id}/restore
    behavior: Restore with ABAC, unique-key conflict validation, and audit.
  purgeRequest:
    method: POST
    pathPattern: /api/v1/{resources}/{id}/purge-request
    behavior: Retention or legal workflow request, never direct physical delete.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Standard authenticated API access.
    tenantHeader:
      type: apiKey
      in: header
      name: X-AWCMS-Mini-Tenant-ID
      description: Active tenant context for tenant-scoped API.
    syncHmac:
      type: apiKey
      in: header
      name: X-AWCMS-Mini-Signature
      description: HMAC signature for sync endpoints with node and timestamp headers.
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Optional server-side trace correlation ID.
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Optional client-generated request trace ID.
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        example: id
      description: Preferred response locale.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: Required for high-risk mutations.
    SyncNodeId:
      name: X-AWCMS-Mini-Node-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 128
      description: Sync node identifier.
    SyncTimestamp:
      name: X-AWCMS-Mini-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time
      description: Request timestamp used for anti-replay checks.
    SyncSignature:
      name: X-AWCMS-Mini-Signature
      in: header
      required: true
      schema:
        type: string
        minLength: 32
      description: HMAC signature over the sync request.
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: Opaque keyset pagination cursor from a previous page's `nextCursor`. Omit for the first page.
    AnalyticsRange:
      name: range
      in: query
      required: false
      schema:
        type: string
        enum:
          - 24h
          - 7d
          - 30d
          - 12m
        default: 7d
      description: Aggregate window. An unrecognized value is a `400 VALIDATION_ERROR`, never silently defaulted.
  responses:
    BadRequest:
      description: Validation or request error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Authentication required or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Access denied by RBAC, ABAC, or tenant policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found or hidden by soft-delete policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: Internal server error without stack trace.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    PayloadTooLarge:
      description: "Request body exceeds the endpoint's size limit (Issue #686, epic #679) — either its declared `Content-Length` or, for a chunked/ unlabeled body, the actual streamed byte count. Error code `PAYLOAD_TOO_LARGE`."
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    AbacPolicy:
      type: object
      required:
        - id
        - policyCode
        - effect
        - dslVersion
        - priority
        - conditions
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        policyCode:
          type: string
        effect:
          type: string
          enum:
            - allow
            - deny
        description:
          type: string
          nullable: true
        moduleKey:
          type: string
          nullable: true
          description: Applicability filter; null = wildcard.
        activityCode:
          type: string
          nullable: true
          description: Applicability filter; null = wildcard.
        action:
          type: string
          nullable: true
          description: Applicability filter; null = wildcard.
        resourceType:
          type: string
          nullable: true
          description: Applicability filter; null = wildcard.
        dslVersion:
          type: integer
          minimum: 1
        priority:
          type: integer
          description: Lower evaluates first (deterministic ordering).
        conditions:
          $ref: "#/components/schemas/AbacPolicyConditions"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    AbacPolicyConditions:
      type: object
      description: "Bounded, deterministic condition AST (Issue #179, ADR-0023). A node is a composition (`allOf`/`anyOf`/`not`) or a leaf (`{attr, op, value}` or `{attr, op, valueAttr}`). Attributes come from a fixed server-side allow-list (`subject.*`, `resource.*`, `action`, `env.*`); operators are eq/ne/in/nin/lt/lte/gt/gte/exists. No arbitrary code, expression, or SQL. Validated server-side; an invalid AST is rejected at authoring time."
      additionalProperties: true
    AbacPolicyWriteRequest:
      type: object
      required:
        - policyCode
        - effect
        - conditions
      properties:
        policyCode:
          type: string
          description: 3-100 chars, alphanumerics plus . _ - (not at the edges).
        effect:
          type: string
          enum:
            - allow
            - deny
        description:
          type: string
          nullable: true
        moduleKey:
          type: string
          nullable: true
        activityCode:
          type: string
          nullable: true
        action:
          type: string
          nullable: true
        resourceType:
          type: string
          nullable: true
        dslVersion:
          type: integer
          minimum: 1
          description: Defaults to 1. A version newer than the server supports is rejected.
        priority:
          type: integer
          minimum: 0
          maximum: 1000000
          description: Defaults to 100.
        isActive:
          type: boolean
          description: Create/update only; defaults to false (author, then enable).
        conditions:
          $ref: "#/components/schemas/AbacPolicyConditions"
    AbacSimulationRequest:
      type: object
      required:
        - request
      properties:
        subject:
          type: object
          description: Hypothetical subject. Roles resolve into the permission set they grant.
          properties:
            tenantUserId:
              type: string
              format: uuid
              description: Optional; when set, the subject's real roles/permissions are used.
            roles:
              type: array
              items:
                type: string
              description: Role codes whose granted permissions to simulate.
        request:
          type: object
          required:
            - moduleKey
            - activityCode
            - action
          properties:
            moduleKey:
              type: string
            activityCode:
              type: string
            action:
              type: string
            resourceType:
              type: string
            resourceAttributes:
              type: object
              additionalProperties: true
              description: Hypothetical, server-verified-shaped resource attributes.
        environment:
          type: object
          properties:
            ipTrusted:
              type: boolean
            now:
              type: string
              format: date-time
    AbacSimulationResponse:
      type: object
      required:
        - decision
        - evaluatedPolicies
        - subject
      properties:
        decision:
          type: object
          required:
            - allowed
            - reason
          properties:
            allowed:
              type: boolean
            reason:
              type: string
            matchedPolicy:
              type: string
              nullable: true
            matchedPolicyVersion:
              type: integer
              nullable: true
        evaluatedPolicies:
          type: array
          description: Per-policy trace — structural booleans only, no attribute values.
          items:
            type: object
            required:
              - policyCode
              - effect
              - applicable
            properties:
              policyCode:
                type: string
              effect:
                type: string
                enum:
                  - allow
                  - deny
              dslVersion:
                type: integer
              priority:
                type: integer
              applicable:
                type: boolean
              conditionSatisfied:
                type: boolean
                nullable: true
              invalid:
                type: boolean
        subject:
          type: object
          required:
            - tenantUserId
            - roles
          properties:
            tenantUserId:
              type: string
            roles:
              type: array
              items:
                type: string
    AccessAssignmentRequest:
      type: object
      required:
        - tenantUserId
        - roleId
      additionalProperties: false
      properties:
        tenantUserId:
          type: string
          format: uuid
        roleId:
          type: string
          format: uuid
    AccessAssignmentResponse:
      type: object
      required:
        - assignmentId
      additionalProperties: false
      properties:
        assignmentId:
          type: string
          format: uuid
    AccessAuditReport:
      type: object
      required:
        - decisionWindowDays
        - allowCount
        - denyCount
        - totalDecisionCount
        - profileAuditLogCount
      additionalProperties: false
      properties:
