      description: Permission-gated (`deliveries.replay`), reason-required, idempotent (`Idempotency-Key`), and audited. Only valid from a `dead_letter` delivery. Refuses (409) if the registered consumer no longer supports the delivery's `eventVersion` — never replays against an incompatible schema silently.
      operationId: domainEventsDeliveriesReplay
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - reason
              properties:
                reason:
                  type: string
                  minLength: 1
                  maxLength: 500
      responses:
        "200":
          description: Replay delivery created (a NEW delivery row, `replayOfDeliveryId` pointing at the original).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - delivery
                        properties:
                          delivery:
                            $ref: "#/components/schemas/DomainEventDeliveryItem"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, delivery is not dead-lettered, or the registered consumer no longer supports the delivery's event version (DOMAIN_EVENT_SCHEMA_INCOMPATIBLE).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
