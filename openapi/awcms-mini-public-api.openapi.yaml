        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organizationUnitId
              additionalProperties: false
              properties:
                organizationUnitId:
                  type: string
                  format: uuid
                parentOrganizationUnitId:
                  type: string
                  format: uuid
                  nullable: true
