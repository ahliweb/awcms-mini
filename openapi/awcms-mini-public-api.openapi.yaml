        - Identity & Access
      summary: Rename a role and/or replace its permission set
      description: >-
        System roles (is_system=true, e.g. the owner role seeded at setup)
        reject permissionIds changes with 409 — renaming is still allowed.
      operationId: rolesUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
