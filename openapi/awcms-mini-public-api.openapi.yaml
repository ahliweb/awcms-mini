          additionalProperties: false
          properties:
            code:
              type: string
              enum:
                - MFA_REQUIRED
            message:
              type: string
            details:
              type: object
              required:
                - mfaChallengeToken
                - expiresAt
              additionalProperties: false
              properties:
                mfaChallengeToken:
                  type: string
                  description: Opaque, single-use token to pass as `mfaChallengeToken` to `POST /auth/mfa/totp/verify` along with a TOTP or recovery code.
                expiresAt:
                  type: string
                  format: date-time
        meta:
          $ref: "#/components/schemas/ApiMeta"
