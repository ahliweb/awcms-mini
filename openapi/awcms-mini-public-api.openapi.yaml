    ContentQualityChecklistPolicy:
      type: object
      description: "Tenant override of the content quality checklist's (Issue #640) non-security rule severities. Keys are restricted to excerpt_present, meta_description_present, featured_image_exists, featured_image_alt_text, featured_image_dimensions, og_image_trusted, taxonomy_exists, social_preview_image_ready, social_preview_image_alt_text — a security rule id (e.g. unsafe_html_rejected, no_local_image_path) is rejected with 400, never accepted here, in any environment."
      additionalProperties:
        type: string
        enum:
          - blocking
          - warning
          - info
    ContentQualityChecklistResult:
      type: object
      description: "Content quality checklist result (Issue #640). `applicable` is false, and every list empty, when full-online R2-only news portal mode isn't active for this tenant (Issue #632/#636) — the checklist is then a no-op and publish/schedule behave exactly as before this issue."
      required:
        - applicable
        - passed
        - rules
        - blockers
        - warnings
        - info
      additionalProperties: false
      properties:
        applicable:
          type: boolean
        passed:
          type: boolean
          description: True unless at least one applicable blocking rule failed.
        rules:
          type: array
          items:
            $ref: "#/components/schemas/ContentQualityChecklistRuleOutcome"
        blockers:
          type: array
          items:
            $ref: "#/components/schemas/ContentQualityChecklistRuleOutcome"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/ContentQualityChecklistRuleOutcome"
        info:
          type: array
          items:
            $ref: "#/components/schemas/ContentQualityChecklistRuleOutcome"
    ContentQualityChecklistRuleOutcome:
      type: object
      description: One content quality checklist rule's evaluation result (Issue
      required:
        - ruleId
        - severity
        - passed
        - applicable
        - message
      additionalProperties: false
      properties:
        ruleId:
          type: string
          enum:
            - title_present
            - slug_valid
            - excerpt_present
            - meta_description_present
            - featured_image_exists
            - featured_image_verified_r2
            - featured_image_alt_text
            - featured_image_dimensions
            - featured_image_mime_allowed
            - featured_image_size_within_policy
            - og_image_trusted
            - no_local_image_path
            - no_external_image_url
            - gallery_images_verified
            - taxonomy_exists
            - unsafe_html_rejected
            - scheduled_publish_time_valid
            - social_preview_image_ready
            - social_preview_image_alt_text
        severity:
          type: string
          enum:
            - blocking
            - warning
            - info
        passed:
          type: boolean
        applicable:
          type: boolean
          description: false when this rule was skipped (e.g. no featured image set, or this isn't a scheduling request) — always reported as passed when not applicable.
        message:
          type: string
