  /api/v1/workflows/tasks/{id}/decisions:
    post:
      tags:
        - Workflow Approval
      summary: Record a decision (approve/reject) for a pending workflow task
      operationId: workflowsRecordTaskDecision
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkflowTaskDecisionRequest"
      responses:
        "200":
          description: >-
            Decision recorded. Instance advances to the next step, is
            approved, or is rejected depending on the decision and remaining
            steps.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/WorkflowTaskDecisionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: >-
            Access denied by RBAC, ABAC, or tenant policy — including
            self-approval denial when the caller is the same tenant user who
            requested the workflow instance.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: >-
            Idempotency-Key reused with a different request, or the task's
            decision has already been recorded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
