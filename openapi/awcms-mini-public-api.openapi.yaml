          format: uuid
        actorTenantUserId:
          type: string
          format: uuid
        moduleKey:
          type: string
        action:
          type: string
        resourceType:
          type: string
        resourceId:
          type: string
        severity:
          type: string
          enum:
            - info
            - warning
            - critical
        message:
