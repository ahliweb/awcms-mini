          description: MFA activated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/MfaEnrollVerifyResponse"
        "400":
          description: Validation error, or the code is invalid (`MFA_INVALID_CODE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Multi-factor authentication is not enabled for this deployment (`MFA_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: No pending MFA enrollment found (`MFA_ENROLLMENT_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/mfa/totp/verify:
    post:
      tags:
        - Identity & Access
      summary: Complete a login paused by 401 MFA_REQUIRED
      description: "Full-online-only (Issue #589). Deliberately NOT authenticated via a session — authenticated instead by possession of `mfaChallengeToken` from `POST /auth/login`'s `MFA_REQUIRED` response, exactly like `password/reset` is authenticated by possession of a reset token. Exactly one of `code` (TOTP) or `recoveryCode` must be provided. On success, creates the real AWCMS-Mini session — same response shape as `POST /auth/login`'s 200. Rate-limited both by source+tenant (`AUTH_MFA_RATE_LIMIT_MAX`/`_WINDOW_SEC`) and by a per-challenge failed-attempt counter."
      operationId: authMfaTotpVerify
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MfaChallengeVerifyRequest"
      responses:
        "200":
          description: Challenge verified; session issued.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/LoginResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: The challenge is invalid, expired, already used, or the code/recovery code is wrong (deliberately not distinguished — anti-enumeration, same principle as `password/reset` — `MFA_CHALLENGE_INVALID`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Too many verification attempts from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/password/forgot:
    post:
      tags:
        - Identity & Access
      summary: Request a password reset email; always returns a generic response regardless of whether the identifier matches an account
      description: "When full-online auth security hardening AND `TURNSTILE_ENABLED=true` are both active (Issue #588), `turnstileToken` is verified before the reset-token DB write/email enqueue: missing -> `400 TURNSTILE_REQUIRED`, invalid -> `400 TURNSTILE_INVALID`."
      operationId: authPasswordForgot
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Generic acknowledgement — does not reveal whether the account exists.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ForgotPasswordResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Too many password reset requests from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/password/reset:
    post:
      tags:
        - Identity & Access
      summary: Complete a password reset with a valid one-time token
      description: "When full-online auth security hardening AND `TURNSTILE_ENABLED=true` are both active (Issue #588), `turnstileToken` is verified before the token lookup/password update: missing -> `400 TURNSTILE_REQUIRED`, invalid -> `400 TURNSTILE_INVALID`."
      operationId: authPasswordReset
      security:
        - tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset; all active sessions for the identity are revoked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/ResetPasswordResponse"
        "400":
          description: Validation error, or the token is invalid/expired/already used (deliberately not distinguished in the response — anti- enumeration, doc 20 §A07 Identification & Auth Failures).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          description: Too many password reset attempts from this source.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/providers/google/callback:
    get:
      tags:
        - Identity & Access
      summary: Google's OAuth redirect target — completes login or link
      description: "Full-online-only (Issue #590). A plain top-level browser navigation, never a `fetch()` call — Google redirects here with `code`+`state` (or `error` if the user cancelled consent). Validates `state` (CSRF/replay defense) and the ID token's signature, issuer, audience, expiry, and nonce cryptographically before trusting any claim. For a `login`-purpose request: creates the existing AWCMS-Mini session type (or, if Issue #589's MFA gate is active and the identity has an active factor, returns `401 MFA_REQUIRED` exactly like `POST /auth/login` — Google login never bypasses MFA). For a `link`-purpose request (from `POST .../link`): attaches the verified Google account to the identity captured server-side at link-initiation time."
      operationId: authGoogleCallback
      security:
        - tenantHeader: []
      parameters:
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Present when the user cancelled/denied consent at Google.
      responses:
        "302":
          description: Login or link succeeded; redirects to `/admin`.
        "400":
          description: Missing or malformed `state` (`GOOGLE_OAUTH_STATE_INVALID`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: The state/nonce/ID token could not be verified (`GOOGLE_OAUTH_STATE_INVALID`/`GOOGLE_TOKEN_EXCHANGE_FAILED`/ `GOOGLE_ID_TOKEN_INVALID`/`GOOGLE_ACCOUNT_NOT_LINKED`), or MFA must be completed first (`MFA_REQUIRED`, `LoginMfaRequiredResponse`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiError"
                  - $ref: "#/components/schemas/LoginMfaRequiredResponse"
        "403":
          description: Google login is not enabled for this deployment (`GOOGLE_LOGIN_DISABLED`), or the resolved identity/tenant is not active (`ACCESS_DENIED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: This Google subject is already linked to a different identity (`GOOGLE_ALREADY_LINKED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/providers/google/link:
    post:
      tags:
        - Identity & Access
      summary: Start linking the caller's own identity to a Google account
      description: "Full-online-only (Issue #590). Authenticated: creates a `link`-purpose OAuth request bound to the caller's own identity (captured server-side, never trusted from the callback request) and returns the Google authorization URL as JSON — invoked via `fetch()` from an authenticated context, so the client navigates itself (`window.location = data.authorizationUrl`) rather than receiving a redirect."
      operationId: authGoogleLink
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Link-purpose OAuth request created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/GoogleLinkStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Google login is not enabled for this deployment (`GOOGLE_LOGIN_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/providers/google/start:
    get:
      tags:
        - Identity & Access
      summary: Redirect to Google's OAuth Authorization Code endpoint (login)
      description: 'Full-online-only (Issue #590) — `403 GOOGLE_LOGIN_DISABLED` unless the #587 gate AND `AUTH_GOOGLE_LOGIN_ENABLED=true` are both active. Unauthenticated entry point reached from the "Continue with Google" button on `/login`. Accepts `tenantId` via the `X-AWCMS-Mini-Tenant-ID` header, the tenant cookie, or a `?tenantId=` query param (the login page has no tenant cookie yet, and a plain browser navigation can''t set a custom header). Always a `login` intent — see `POST .../link` for the authenticated linking flow.'
      operationId: authGoogleStart
      security:
        - tenantHeader: []
      parameters:
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
          description: Fallback tenant id when neither the header nor cookie is present.
      responses:
        "302":
          description: Redirect to Google's authorization endpoint.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Google login is not enabled for this deployment (`GOOGLE_LOGIN_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/providers/google/unlink:
    post:
      tags:
        - Identity & Access
      summary: Unlink the caller's own Google account
      description: "Full-online-only (Issue #590). High-risk, audited (`google_account_unlinked`). Never touches local password login — removing a Google link cannot lock an identity out of its own account."
      operationId: authGoogleUnlink
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Google account unlinked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/GoogleUnlinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Google login is not enabled for this deployment (`GOOGLE_LOGIN_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No Google account is currently linked (`GOOGLE_NOT_LINKED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/auth/sso/{providerKey}/callback:
    get:
      tags:
        - Identity & Access
      summary: Tenant OIDC provider's redirect target — completes login or link
      description: "Full-online-only (Issue #591). A plain top-level browser navigation, never a `fetch()` call — the provider redirects here with `code`+`state` (or `error` if the user cancelled consent). Validates `state` (CSRF/replay defense) and the ID token's signature, issuer, audience, expiry, and nonce cryptographically before trusting any claim — same verification depth as Issue #590's Google callback. For a `login`-purpose request: creates the existing AWCMS-Mini session type (or, if Issue #589's MFA gate is active and the identity has an active factor, returns `401 MFA_REQUIRED` exactly like `POST /auth/login`/Google login — SSO login never bypasses MFA). For a `link`-purpose request (from `POST .../link`): attaches the verified provider account to the identity captured server-side at link-initiation time."
      operationId: authSsoCallback
      security:
        - tenantHeader: []
      parameters:
        - name: providerKey
          in: path
          required: true
          schema:
            type: string
        - name: code
          in: query
          required: false
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
        - name: error
          in: query
          required: false
          schema:
            type: string
          description: Present when the user cancelled/denied consent at the provider.
      responses:
        "302":
          description: Login or link succeeded; redirects to `/admin`.
        "400":
          description: Missing or malformed `state` (`SSO_OAUTH_STATE_INVALID`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: The state/nonce/ID token could not be verified (`SSO_OAUTH_STATE_INVALID`/`SSO_TOKEN_EXCHANGE_FAILED`/ `SSO_ID_TOKEN_INVALID`/`SSO_ACCOUNT_NOT_LINKED`), or MFA must be completed first (`MFA_REQUIRED`, `LoginMfaRequiredResponse`).
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ApiError"
                  - $ref: "#/components/schemas/LoginMfaRequiredResponse"
        "403":
          description: Tenant OIDC SSO is not enabled for this deployment (`SSO_DISABLED`), this provider is disabled (`SSO_PROVIDER_DISABLED`), or the resolved identity/tenant is not active (`ACCESS_DENIED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: This provider subject is already linked to a different identity (`SSO_ALREADY_LINKED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          description: The SSO provider could not be reached (`SSO_PROVIDER_UNAVAILABLE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sso/{providerKey}/link:
    post:
      tags:
        - Identity & Access
      summary: Start linking the caller's own identity to a tenant-configured OIDC provider account
      description: "Full-online-only (Issue #591). Authenticated: creates a `link`-purpose OAuth request bound to the caller's own identity (captured server-side, never trusted from the callback request) and returns the provider's authorization URL as JSON — same shape as Issue #590's Google `link`."
      operationId: authSsoLink
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: providerKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Link-purpose OAuth request created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SsoLinkStartResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Tenant OIDC SSO is not enabled for this deployment (`SSO_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: No enabled SSO provider matches this key (`SSO_PROVIDER_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          description: The SSO provider's discovery endpoint could not be reached (`SSO_PROVIDER_UNAVAILABLE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sso/{providerKey}/start:
    get:
      tags:
        - Identity & Access
      summary: Redirect to a tenant-configured OIDC provider's authorization endpoint (login)
      description: "Full-online-only (Issue #591) — `403 SSO_DISABLED` unless the #587 gate AND `AUTH_SSO_ENABLED=true` are both active. Generalizes Issue #590's Google login to a tenant-configured provider (`awcms_mini_auth_providers`); Google's own `/auth/providers/google/*` endpoints are unaffected. `providerKey` must resolve to an `enabled` provider for this tenant, else `404 SSO_PROVIDER_NOT_FOUND`. Tenant resolved from the `X-AWCMS-Mini-Tenant-ID` header, the tenant cookie, or a `?tenantId=` query param fallback, same as Google's own `start`."
      operationId: authSsoStart
      security:
        - tenantHeader: []
      parameters:
        - name: providerKey
          in: path
          required: true
          schema:
            type: string
        - name: tenantId
          in: query
          required: false
          schema:
            type: string
          description: Fallback tenant id when neither the header nor cookie is present.
      responses:
        "302":
          description: Redirect to the provider's authorization endpoint.
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Tenant OIDC SSO is not enabled for this deployment (`SSO_DISABLED`), or the tenant is not active (`ACCESS_DENIED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "404":
          description: No enabled SSO provider matches this key (`SSO_PROVIDER_NOT_FOUND`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "429":
          description: Too many requests from this source (`RATE_LIMITED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
        "502":
          description: The SSO provider's discovery endpoint could not be reached (`SSO_PROVIDER_UNAVAILABLE`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /api/v1/auth/sso/{providerKey}/unlink:
    post:
      tags:
        - Identity & Access
      summary: Unlink the caller's own tenant-configured OIDC provider account
      description: "Full-online-only (Issue #591). High-risk, audited (`sso_account_unlinked`). Never touches local password login — unlinking a provider cannot lock an identity out of its own account (that guarantee is the tenant policy's `sso_required` + break-glass enforcement's job instead)."
      operationId: authSsoUnlink
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: providerKey
          in: path
          required: true
          schema:
            type: string
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: SSO account unlinked.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/SsoUnlinkResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Tenant OIDC SSO is not enabled for this deployment (`SSO_DISABLED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: No SSO account is currently linked (`SSO_NOT_LINKED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
