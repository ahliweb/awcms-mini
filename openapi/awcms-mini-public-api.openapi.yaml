      summary: Confirm a pending TOTP enrollment with a live code
      description: "Full-online-only (Issue #589). Activates the pending factor from `enroll/start` and returns 10 single-use recovery codes shown exactly once (never retrievable again — only `recovery-codes/regenerate` can produce a fresh set afterward)."
