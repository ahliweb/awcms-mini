                        $ref: "#/components/schemas/TenantAuthPolicyView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      tags:
        - Identity & Access
      summary: Update this tenant's authentication policy
      description: "Admin CRUD (Issue #591), protected by ABAC (`identity_access.sso_policy.update`). High-risk, audited (`sso_policy_updated`). Server-side break-glass enforcement: `sso_required=true` or `password_login_enabled=false` is rejected (`409 BREAK_GLASS_REQUIRED`) unless at least one currently-active break-glass identity with an active tenant membership is configured."
      operationId: identitySsoPolicyUpdate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantAuthPolicyRequest"
      responses:
        "200":
          description: Tenant authentication policy updated.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/TenantAuthPolicyView"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Break-glass requirement not satisfied (`BREAK_GLASS_REQUIRED`).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
