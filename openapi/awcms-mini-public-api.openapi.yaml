  /api/v1/data-exchange/imports/{id}/preview:
    get:
      tags:
        - Data Exchange
      summary: Paginated preview of a batch's staged rows
      description: Zero domain mutation. Raw staged values are revealed only when the batch's descriptor declares a sensitiveFields policy AND the caller holds the permission THAT descriptor names in sensitiveFields.rawValuePermission -- never a generic data_exchange permission. A descriptor declaring no policy is masked entirely (default-deny), and a batch whose importKey no longer resolves (its owning module was disabled after staging) is refused with 409.
      operationId: dataExchangeImportsPreview
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: proposedAction
          in: query
          required: false
          schema:
            type: string
            enum:
              - create
              - update
              - skip
              - conflict
              - invalid
        - name: offset
          in: query
          required: false
          description: Clamped to the maximum below, which equals the hard cap on rows per batch -- no batch can hold a row beyond it. The response echoes the effective (clamped) offset.
          schema:
            type: integer
            minimum: 0
            maximum: 50000
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Preview page.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - rows
                          - total
                          - offset
                          - limit
                          - totals
                        properties:
                          rows:
                            type: array
                            items:
                              $ref: "#/components/schemas/DataExchangeStagedRow"
                          total:
                            type: integer
                          offset:
                            type: integer
                          limit:
                            type: integer
                          totals:
                            type: object
                            additionalProperties: false
                            required:
                              - created
                              - updated
                              - skipped
                              - conflict
                              - invalid
                              - failed
                            properties:
                              created:
                                type: integer
                              updated:
                                type: integer
                              skipped:
                                type: integer
                              conflict:
                                type: integer
                              invalid:
                                type: integer
                              failed:
                                type: integer
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The batch's importKey is no longer registered -- its owning module was disabled or removed after the batch was staged.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
