    CreateUserRequest:
      type: object
      required:
        - displayName
        - loginIdentifier
        - password
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
        loginIdentifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        roleIds:
          type: array
          items:
            type: string
            format: uuid
          description: Roles to assign immediately at creation (optional).
    CreateUserResponse:
      type: object
      required:
        - tenantUserId
        - identityId
        - profileId
      additionalProperties: false
      properties:
        tenantUserId:
          type: string
          format: uuid
        identityId:
          type: string
          format: uuid
        profileId:
          type: string
          format: uuid
    UpdateUserRequest:
      type: object
      description: At least one of displayName or status is required.
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
        status:
          type: string
          enum:
            - active
            - inactive
    RoleListEntry:
      type: object
      required:
        - roleId
        - roleCode
        - roleName
        - isSystem
        - permissionIds
        - assignedUserCount
        - createdAt
      additionalProperties: false
      properties:
        roleId:
          type: string
          format: uuid
        roleCode:
          type: string
        roleName:
          type: string
        isSystem:
          type: boolean
          description: >-
            System roles (seeded at setup, e.g. owner) cannot have their
            permissions edited or be deleted.
        permissionIds:
          type: array
          items:
            type: string
            format: uuid
        assignedUserCount:
          type: integer
          minimum: 0
        createdAt:
          type: string
          format: date-time
    RoleListResponse:
      type: object
      required:
        - roles
      additionalProperties: false
      properties:
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleListEntry"
    CreateRoleRequest:
      type: object
      required:
        - roleCode
        - roleName
      additionalProperties: false
      properties:
        roleCode:
          type: string
          pattern: "^[a-z][a-z0-9_]*$"
        roleName:
          type: string
          minLength: 1
        permissionIds:
          type: array
          items:
            type: string
            format: uuid
    CreateRoleResponse:
      type: object
      required:
        - roleId
      additionalProperties: false
      properties:
        roleId:
          type: string
          format: uuid
    UpdateRoleRequest:
      type: object
      description: At least one of roleName or permissionIds is required.
      additionalProperties: false
      properties:
        roleName:
          type: string
          minLength: 1
        permissionIds:
          type: array
          items:
            type: string
            format: uuid
          description: >-
            Replaces the role's entire permission set. Rejected with 409 for
            system roles.
    RoleDeleteRequest:
      type: object
      required:
        - reason
      additionalProperties: false
