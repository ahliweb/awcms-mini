        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Import batches for this tenant.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - batches
                        properties:
                          batches:
                            type: array
                            items:
                              $ref: "#/components/schemas/DataExchangeImportBatch"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      tags:
        - Data Exchange
      summary: Stage a new import batch
      description: High-risk mutation -- requires Idempotency-Key. `multipart/form-data` body capped at 5 MiB before any parsing; performs NO row-level parsing (asynchronous, on the shared worker, `bun run data-exchange:worker`). Enforces checksum (server-computed SHA-256), media type (allow-list per format, 415 if not allowed), file size, and safe filename handling at intake.
      operationId: dataExchangeImportsCreate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - importKey
                - format
                - file
              properties:
                importKey:
                  type: string
                format:
                  type: string
                  enum:
                    - csv
                    - json
                file:
                  type: string
                  format: binary
                checksumSha256:
                  type: string
                  description: Optional client-declared SHA-256 hex digest, compared against the server-computed checksum.
      responses:
        "200":
          description: Import batch staged.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        additionalProperties: false
                        required:
                          - batch
                        properties:
                          batch:
                            $ref: "#/components/schemas/DataExchangeImportBatch"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Idempotency-Key reused with a different request, or checksum mismatch.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "415":
          description: The uploaded file's media type is not on the allow-list for the declared format.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "500":
          $ref: "#/components/responses/InternalError"
