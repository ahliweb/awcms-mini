openapi: 3.1.0
info:
  title: AWCMS-Mini Public API
  version: 1.0.0
  description: |-
    Stable REST contract for the AWCMS-Mini modular monolith base (ADR-0008 — contract version is independent of the package release version; bumped only when the contract shape itself changes).

    **Request body size limits** (Issue #686, epic #679): every endpoint that accepts a body enforces an application-level size cap, independent of any reverse-proxy limit — most endpoints allow up to 128 KiB; content-heavy endpoints (blog posts/pages/templates/theme, email templates/announcements, news-portal homepage sections, sync push and object-enqueue batches) allow up to 5 MiB. A body over the limit — whether declared via `Content-Length` or discovered while streaming a chunked/ unlabeled body — is rejected with `413 Payload Too Large` and error code `PAYLOAD_TOO_LARGE`, using the same envelope as every other error response in this contract. No endpoint accepts a body larger than 10 MiB.
servers:
  - url: http://localhost:4321
    description: Local development
tags:
  - name: Foundation
    description: Foundation and platform endpoints.
  - name: Tenant Admin
    description: Tenant, office, and the one-time setup wizard.
  - name: Tenant Domains
    description: "Tenant-scoped hostname/subdomain -> tenant mapping admin API (epic #555, Issue #562) -- list/create/update/delete/verify/set-primary for awcms_mini_tenant_domains. Consumed by the public host-based tenant resolver (#559); the optional Cloudflare DNS adapter (#567) is not wired into any route. Pre-existing gap found by Issue #695's OpenAPI split: operations already used this tag, but it was never declared in this top-level list -- fixed here as a documentation-only addition (no path/schema/security change)."
  - name: Identity & Access
    description: Login identity, session authentication, and tenant user membership.
  - name: Sync Storage
    description: Offline-first sync node registration and HMAC-signed push/pull.
  - name: Management Reporting
    description: Generic read-aggregation reporting views (tenant activity, access/audit summary, sync health, module usage). Live aggregation over existing tables; no dedicated reporting tables, worker, or cache.
  - name: Logging & Audit
    description: Cross-module audit trail (awcms_mini_audit_events) and its read API. Complements, not replaces, domain events and structured logs.
  - name: Profile Identity
    description: Profile lifecycle (soft delete/restore/purge) demonstrating the audit trail end-to-end. Full profile CRUD (create/update/list) remains out of scope/backlog.
  - name: Database Connectivity
    description: Connection pool config, work-class backpressure gate, and circuit breaker health (Issue 10.2, doc 16 §Connection pooling dan backpressure).
  - name: Workflow Approval
    description: Generic multi-step approval engine (definitions, instances, tasks, decisions). Only the decision API is public (doc 17 seed grants no create/configure action for workflow.approval) — no create-definition/start-instance endpoint by design.
  - name: Form Drafts
    description: "Generic, domain-agnostic server-side draft store for the reusable wizard pattern (Issue #484) — create/update/read/submit/delete a tenant-scoped JSONB payload. No domain-specific meaning; a derived module decides what a draft's payload contains."
  - name: Email Templates
    description: "Tenant email template CRUD, soft-delete/restore, per-category variable allowlists, i18n locale variants, and admin preview (Issue #498)."
  - name: Email Announcements
    description: "Bulk announcement/notification enqueue and dry-run preview, targeting an explicit user list, a role, or the whole tenant with two-tier ABAC (Issue #497)."
  - name: Email Messages
    description: "Admin queue diagnostics (queue health, failed messages, retry backlog) and cancel-before-send for still-queued messages (Issue #499)."
  - name: Email Suppressions
    description: "Manual suppression list read/create/delete — recipients excluded from future sends (bounce/complaint/manual/unsubscribed), Issue #499."
  - name: Module Management
    description: "Database-backed module catalog and descriptor sync (epic #510). Read the module registry, inspect a single module's detail, and trigger a sync of trusted code descriptors into the database — distinct from `GET /api/v1/access/modules`'s permission catalog."
  - name: Blog Posts
    description: "Tenant-scoped blog post admin API (epic #536, Issue #538) — CRUD plus lifecycle actions (submit for review, publish, schedule, archive, restore, purge). Builds on the `blog_content` schema/permission foundation from Issue #537; pages, taxonomies, and public routes are separate issues. Revision history is a distinct tag, see Blog Revisions."
  - name: Blog Pages
    description: "Tenant-scoped static page admin API (epic #536, Issue #539) — plain CRUD only (no publish/schedule/archive/restore/purge lifecycle actions in this issue, unlike Blog Posts). Supports `pageType` (standard/landing/legal/system), `parentPageId`, and `menuOrder`."
  - name: Blog Taxonomies
    description: "Tenant-scoped category/tag admin API (epic #536, Issue #539). Categories support parent-child hierarchy; tags must not have a parent. No restore/purge — soft-delete only."
  - name: Blog Search
    description: "Tenant-scoped PostgreSQL full-text admin search across posts and pages (epic #536, Issue #539), keyset-paginated. May return content of any status per the caller's `blog_content.search.read` grant. The public-safe search predicate (published + public content only) is a backend helper only in this issue — no public route yet (Issue #540)."
  - name: Blog Revisions
    description: "Append-only revision history for blog posts (epic #536, Issue #541). List/read revisions, restore a revision (never overwrites history — restoring appends a new revision with the restored content). `awcms_mini_blog_revisions` also stores page revisions, but only post revision routes are exposed in this issue."
  - name: Blog Presentation
    description: "Tenant-scoped presentation/monetization admin API (epic #536, Issue #542): templates (whitelisted layout config), hierarchical navigation menus, position-based widgets, and advertisements (placement targeting + scheduling), plus a per-tenant blog theme mode override. Per doc issue #542's own Scope Control, none of this rebuilds the base media library, tenant system, RBAC/ABAC, audit, or theme engine — the blog theme endpoint overrides `awcms_mini_tenants.default_theme`, it does not replace it."
  - name: Blog Settings
    description: "Tenant-scoped blog settings admin API (epic #536, Issue #543) — one row per tenant (`awcms_mini_blog_settings`, schema present since Issue #537 but unwired until this issue). Blog title/description and RSS/sitemap enabled flags live in the row's catch-all `settings` jsonb column; default locale/visibility and SEO title/description defaults have their own typed columns. `rssEnabled`/`sitemapEnabled` also gate `GET /blog/{tenantCode}/feed.xml` and `.../sitemap-blog.xml` (Issue #540) — disabled looks identical to an unknown tenant (404), no distinguishing signal leaked."
  - name: Blog Internal Tag Links
    description: "Automatic internal tag linking for post/news content (epic `news_portal`, Issue #641) — tenant policy (enable/disable, case-insensitive matching, per-tag disable) in its own dedicated table/endpoint, deliberately separate from Blog Settings, plus a read-only preview of which terms would be auto-linked in a post's rendered content before publishing. Linking itself is a render-time-only transform applied by the public `/news`/`/blog/{tenantCode}` routes, not an API this tag exposes directly."
  - name: Visitor Analytics
    description: "Tenant-scoped visitor analytics API (epic: visitor analytics #617-#624, Issue #621) — realtime presence, range-bounded summary/ pages/devices/locations/security aggregates, keyset-paginated sessions/events, settings, and on-demand retention purge. Raw detail (IP address, user-agent hash, login identifier snapshot) on sessions/events is omitted unless the caller holds the separate `visitor_analytics.raw_detail.read` permission, independent of `sessions.read`/`events.read`."
  - name: News Media
    description: "Direct-to-R2 presigned upload flow for news images (epic `news_portal` #631-#642/#649, Issue #634) — create an upload session (server-generated object key + short-lived presigned `PUT` URL), finalize (real R2 `GET` + magic-byte MIME sniffing + server-side SHA-256 checksum — never a bare `HEAD`, per the security-auditor Critical finding on Issue #631), and cancel a still-`pending_upload` session. R2 credentials are never exposed to the browser; only a scoped, expiring presigned URL is returned."
  - name: News Portal Homepage Sections
    description: "Editorial homepage section composer for `/news` (epic `news_portal` #631-#642/#649, Issue #637) — tenant-scoped, RLS-protected CRUD for configurable homepage sections (headline, latest_posts, featured_posts, editor_picks, category_grid, gallery_block). `config` shape is validated per `sectionType` server-side; every post/category/media reference in `config` must already exist for the same tenant, and (for `gallery_block`) be a verified R2 media object. `sectionType` is immutable after creation. Reordering is just another patchable field (`sortOrder`) — there is no separate bulk-reorder endpoint."
  - name: News Portal Ad Placements
    description: "R2-only advertisement placement presets for the news portal (epic `news_portal` #631-#642/#649, Issue #638) — tenant-scoped, RLS-protected CRUD for ads assigned to a fixed set of placement keys (header_banner, below_headline, homepage_middle, homepage_bottom, article_top/middle/bottom, sidebar_top/middle/bottom, category_archive_top, search_result_top). `mediaObjectId` must reference a verified (`verified`/`attached`) R2 media object belonging to the same tenant and an allowed mime type for the target placement — never a local path or arbitrary external image URL. `linkUrl` is optional and may be external, but is validated server-side as an absolute http(s) URL only. Inactive, not-yet-started, or expired ads are excluded from public rendering; rendering never emits raw script/embed markup."
  - name: Social Publishing
    description: "Provider-neutral social auto-posting outbox and connector foundation (epic `social_publishing` #643-#647, Issue #643) — account connect/disconnect (secret tokens stored only as an opaque `tokenReference` pointer, never plain text), publish rule/caption-template CRUD, an idempotent outbox job queue with approval/cancel/retry, per-job attempt history, and a per-tenant auto-posting master switch. This issue ships ZERO real provider adapters — no Meta/LinkedIn/Telegram HTTP call exists anywhere; the actual provider call happens later, entirely outside any DB transaction, via a separate internal dispatcher (`bun run social-publishing:dispatch`), not exposed over HTTP."
