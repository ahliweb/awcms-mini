        - resolution
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          const: resolved
        resolution:
          type: string
          enum:
            - accept_incoming
            - keep_existing
            - manual
    ObjectSyncQueueItem:
