            schema:
              $ref: "#/components/schemas/CreateBusinessScopeAssignmentRequest"
      responses:
        "200":
          description: Business-scope assignment created.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - assignment
                        additionalProperties: false
                        properties:
                          assignment:
