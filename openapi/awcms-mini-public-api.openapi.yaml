              type: object
              description: Provider-defined payload shape — opaque to this contract.
      responses:
        "200":
          description: Accepted (new or duplicate-ignored) or safely rejected.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - status
                        properties:
                          status:
