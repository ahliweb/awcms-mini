      description: "When full-online auth security hardening AND `TURNSTILE_ENABLED=true` are both active (Issue #588), `turnstileToken` is verified before the token lookup/password update: missing -> `400 TURNSTILE_REQUIRED`, invalid -> `400 TURNSTILE_INVALID`."
