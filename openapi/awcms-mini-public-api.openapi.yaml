                              - duplicate_ignored
                          deliveryId:
                            type: string
                            format: uuid
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          description: Signature verification failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "403":
