# GENERATED FILE -- do not edit by hand.
#
# This is the bundled, published OpenAPI contract, produced by
# `bun run openapi:bundle` (scripts/openapi-bundle.ts, Issue #695) from
# source fragments in openapi/awcms-mini-public-api.src.yaml and openapi/modules/*.yaml. Edit those
# files, then regenerate this one -- direct edits here are silently
# overwritten and never reviewed as the source of truth.
openapi: 3.1.0
info:
  title: AWCMS-Mini Public API
  version: 1.0.0
  description: |-
    Stable REST contract for the AWCMS-Mini modular monolith base (ADR-0008 — contract version is independent of the package release version; bumped only when the contract shape itself changes).

    **Request body size limits** (Issue #686, epic #679): every endpoint that accepts a body enforces an application-level size cap, independent of any reverse-proxy limit — most endpoints allow up to 128 KiB; content-heavy endpoints (blog posts/pages/templates/theme, email templates/announcements, news-portal homepage sections, sync push and object-enqueue batches) allow up to 5 MiB. A body over the limit — whether declared via `Content-Length` or discovered while streaming a chunked/ unlabeled body — is rejected with `413 Payload Too Large` and error code `PAYLOAD_TOO_LARGE`, using the same envelope as every other error response in this contract. No endpoint accepts a body larger than 10 MiB.
servers:
  - url: http://localhost:4321
    description: Local development
tags:
  - name: Foundation
    description: Foundation and platform endpoints.
  - name: Tenant Admin
    description: Tenant, office, and the one-time setup wizard.
  - name: Tenant Domains
    description: "Tenant-scoped hostname/subdomain -> tenant mapping admin API (epic #555, Issue #562) -- list/create/update/delete/verify/set-primary for awcms_mini_tenant_domains. Consumed by the public host-based tenant resolver (#559); the optional Cloudflare DNS adapter (#567) is not wired into any route. Pre-existing gap found by Issue #695's OpenAPI split: operations already used this tag, but it was never declared in this top-level list -- fixed here as a documentation-only addition (no path/schema/security change)."
  - name: Identity & Access
    description: Login identity, session authentication, and tenant user membership.
  - name: Sync Storage
    description: Offline-first sync node registration and HMAC-signed push/pull.
  - name: Management Reporting
    description: Generic read-aggregation reporting views (tenant activity, access/audit summary, sync health, module usage). Live aggregation over existing tables; no dedicated reporting tables, worker, or cache.
  - name: Logging & Audit
    description: Cross-module audit trail (awcms_mini_audit_events) and its read API. Complements, not replaces, domain events and structured logs.
  - name: Profile Identity
    description: Profile lifecycle (soft delete/restore/purge) demonstrating the audit trail end-to-end. Full profile CRUD (create/update/list) remains out of scope/backlog.
  - name: Database Connectivity
    description: Connection pool config, work-class backpressure gate, and circuit breaker health (Issue 10.2, doc 16 §Connection pooling dan backpressure).
  - name: Workflow Approval
    description: Generic multi-step approval engine (definitions, instances, tasks, decisions). Only the decision API is public (doc 17 seed grants no create/configure action for workflow.approval) — no create-definition/start-instance endpoint by design.
  - name: Form Drafts
    description: "Generic, domain-agnostic server-side draft store for the reusable wizard pattern (Issue #484) — create/update/read/submit/delete a tenant-scoped JSONB payload. No domain-specific meaning; a derived module decides what a draft's payload contains."
  - name: Email Templates
    description: "Tenant email template CRUD, soft-delete/restore, per-category variable allowlists, i18n locale variants, and admin preview (Issue #498)."
  - name: Email Announcements
    description: "Bulk announcement/notification enqueue and dry-run preview, targeting an explicit user list, a role, or the whole tenant with two-tier ABAC (Issue #497)."
  - name: Email Messages
    description: "Admin queue diagnostics (queue health, failed messages, retry backlog) and cancel-before-send for still-queued messages (Issue #499)."
  - name: Email Suppressions
    description: "Manual suppression list read/create/delete — recipients excluded from future sends (bounce/complaint/manual/unsubscribed), Issue #499."
  - name: Module Management
    description: "Database-backed module catalog and descriptor sync (epic #510). Read the module registry, inspect a single module's detail, and trigger a sync of trusted code descriptors into the database — distinct from `GET /api/v1/access/modules`'s permission catalog."
  - name: Blog Posts
    description: "Tenant-scoped blog post admin API (epic #536, Issue #538) — CRUD plus lifecycle actions (submit for review, publish, schedule, archive, restore, purge). Builds on the `blog_content` schema/permission foundation from Issue #537; pages, taxonomies, and public routes are separate issues. Revision history is a distinct tag, see Blog Revisions."
  - name: Blog Pages
    description: "Tenant-scoped static page admin API (epic #536, Issue #539) — plain CRUD only (no publish/schedule/archive/restore/purge lifecycle actions in this issue, unlike Blog Posts). Supports `pageType` (standard/landing/legal/system), `parentPageId`, and `menuOrder`."
  - name: Blog Taxonomies
    description: "Tenant-scoped category/tag admin API (epic #536, Issue #539). Categories support parent-child hierarchy; tags must not have a parent. No restore/purge — soft-delete only."
  - name: Blog Search
    description: "Tenant-scoped PostgreSQL full-text admin search across posts and pages (epic #536, Issue #539), keyset-paginated. May return content of any status per the caller's `blog_content.search.read` grant. The public-safe search predicate (published + public content only) is a backend helper only in this issue — no public route yet (Issue #540)."
  - name: Blog Revisions
    description: "Append-only revision history for blog posts (epic #536, Issue #541). List/read revisions, restore a revision (never overwrites history — restoring appends a new revision with the restored content). `awcms_mini_blog_revisions` also stores page revisions, but only post revision routes are exposed in this issue."
  - name: Blog Presentation
    description: "Tenant-scoped presentation/monetization admin API (epic #536, Issue #542): templates (whitelisted layout config), hierarchical navigation menus, position-based widgets, and advertisements (placement targeting + scheduling), plus a per-tenant blog theme mode override. Per doc issue #542's own Scope Control, none of this rebuilds the base media library, tenant system, RBAC/ABAC, audit, or theme engine — the blog theme endpoint overrides `awcms_mini_tenants.default_theme`, it does not replace it."
  - name: Blog Settings
    description: "Tenant-scoped blog settings admin API (epic #536, Issue #543) — one row per tenant (`awcms_mini_blog_settings`, schema present since Issue #537 but unwired until this issue). Blog title/description and RSS/sitemap enabled flags live in the row's catch-all `settings` jsonb column; default locale/visibility and SEO title/description defaults have their own typed columns. `rssEnabled`/`sitemapEnabled` also gate `GET /blog/{tenantCode}/feed.xml` and `.../sitemap-blog.xml` (Issue #540) — disabled looks identical to an unknown tenant (404), no distinguishing signal leaked."
  - name: Blog Internal Tag Links
    description: "Automatic internal tag linking for post/news content (epic `news_portal`, Issue #641) — tenant policy (enable/disable, case-insensitive matching, per-tag disable) in its own dedicated table/endpoint, deliberately separate from Blog Settings, plus a read-only preview of which terms would be auto-linked in a post's rendered content before publishing. Linking itself is a render-time-only transform applied by the public `/news`/`/blog/{tenantCode}` routes, not an API this tag exposes directly."
  - name: Visitor Analytics
    description: "Tenant-scoped visitor analytics API (epic: visitor analytics #617-#624, Issue #621) — realtime presence, range-bounded summary/ pages/devices/locations/security aggregates, keyset-paginated sessions/events, settings, and on-demand retention purge. Raw detail (IP address, user-agent hash, login identifier snapshot) on sessions/events is omitted unless the caller holds the separate `visitor_analytics.raw_detail.read` permission, independent of `sessions.read`/`events.read`."
  - name: News Media
    description: "Direct-to-R2 presigned upload flow for news images (epic `news_portal` #631-#642/#649, Issue #634) — create an upload session (server-generated object key + short-lived presigned `PUT` URL), finalize (real R2 `GET` + magic-byte MIME sniffing + server-side SHA-256 checksum — never a bare `HEAD`, per the security-auditor Critical finding on Issue #631), and cancel a still-`pending_upload` session. R2 credentials are never exposed to the browser; only a scoped, expiring presigned URL is returned."
  - name: News Portal Homepage Sections
    description: "Editorial homepage section composer for `/news` (epic `news_portal` #631-#642/#649, Issue #637) — tenant-scoped, RLS-protected CRUD for configurable homepage sections (headline, latest_posts, featured_posts, editor_picks, category_grid, gallery_block). `config` shape is validated per `sectionType` server-side; every post/category/media reference in `config` must already exist for the same tenant, and (for `gallery_block`) be a verified R2 media object. `sectionType` is immutable after creation. Reordering is just another patchable field (`sortOrder`) — there is no separate bulk-reorder endpoint."
  - name: News Portal Ad Placements
    description: "R2-only advertisement placement presets for the news portal (epic `news_portal` #631-#642/#649, Issue #638) — tenant-scoped, RLS-protected CRUD for ads assigned to a fixed set of placement keys (header_banner, below_headline, homepage_middle, homepage_bottom, article_top/middle/bottom, sidebar_top/middle/bottom, category_archive_top, search_result_top). `mediaObjectId` must reference a verified (`verified`/`attached`) R2 media object belonging to the same tenant and an allowed mime type for the target placement — never a local path or arbitrary external image URL. `linkUrl` is optional and may be external, but is validated server-side as an absolute http(s) URL only. Inactive, not-yet-started, or expired ads are excluded from public rendering; rendering never emits raw script/embed markup."
  - name: Social Publishing
    description: "Provider-neutral social auto-posting outbox and connector foundation (epic `social_publishing` #643-#647, Issue #643) — account connect/disconnect (secret tokens stored only as an opaque `tokenReference` pointer, never plain text), publish rule/caption-template CRUD, an idempotent outbox job queue with approval/cancel/retry, per-job attempt history, and a per-tenant auto-posting master switch. This issue ships ZERO real provider adapters — no Meta/LinkedIn/Telegram HTTP call exists anywhere; the actual provider call happens later, entirely outside any DB transaction, via a separate internal dispatcher (`bun run social-publishing:dispatch`), not exposed over HTTP."
  - name: Data Lifecycle
    description: "Module-contributed high-volume table registry and lifecycle engine (Issue #745, epic #738 platform-evolution) — read the code-declared descriptor registry, create/release legal holds (which override ordinary retention/purge and cannot be bypassed by tenant policy), trigger an on-demand read-only dry-run plan, and read run history. Real archive/purge execution is an internal scheduled job (`bun run data-lifecycle:archive-purge`), not exposed over HTTP — same administrative-operation posture as `bun run logs:audit:purge`."
  - name: Domain Events
    description: "Transactional, versioned domain-event outbox and dispatcher admin API (epic `platform-evolution` #738 Wave 1, Issue #742) — read-only inspection of outbox events and per-consumer deliveries (redacted payload projections only, including dead-letter/DLQ status), permission-gated/reason-required/idempotent/audited replay of a dead-lettered delivery, and per-tenant pause/resume of a registered consumer. The actual claim/execute/finalize dispatch happens entirely outside any HTTP request, via a separate internal worker (`bun run domain-events:dispatch`, built on the shared worker runner), not exposed over HTTP. Consumers themselves are a static, reviewed-source-code registry — not configurable via this API."
  - name: Organization Structure
    description: "Optional, tenant-scoped organization-structure foundation (epic `platform-evolution` #738 Wave 2, Issue #749, ADR-0016) — legal entities (generic opaque registration identifier pair, never government-specific fields), tenant-configurable organization-unit types, effective-dated organization units, a versioned/effective-dated parent-child hierarchy (reparent rejects self-parent/cycle, requires Idempotency-Key, audited critical), operational locations (optional lat/lng), an explicit location-to-unit many-to-many relationship, and effective-dated party/unit assignments referencing `identity_access`'s existing tenant users. Tenant and legal entity/organization unit remain distinct concepts — RLS predicate is always and only `tenant_id`."
  - name: Reference Data
    description: "Optional, provider-neutral reference-data foundation (epic `platform-evolution` #738 Wave 3, Issue #750, ADR-0021) — effective-dated, localized value sets and codes with provenance/deprecation/supersession, a validated import pipeline (non-mutating dry-run, commit re-validated inside the same transaction, destructive replacement of a code already referenced by tenant data is always rejected), and a tenant-scoped override/extension layer that never mutates the global baseline. Value sets/codes/imports are GLOBAL (reviewed RLS-exempt, identical for every tenant); tenant overrides/extensions are RLS FORCE, predicate always and only `tenant_id`."
  - name: Document Infrastructure
    description: "Optional, tenant-scoped generic document METADATA infrastructure (epic `platform-evolution` #738 Wave 3, Issue #751, ADR-0017) — a classification catalog, the document registry itself (owner module + document type + a primary generic resource reference), IMMUTABLE append-only versions (content referenced through an approved managed-object storage contract, never a binary blob), additional typed generic resource relations (written only through the capability port), concurrency-safe effective-dated numbering sequence definitions (SCD Type 2 style — revising the format never resets or reuses the counter), atomic number reservations (reserve/commit/cancel, a reservation's number can never be silently reused), and an append-only evidence trail. Never a domain document schema — no letters/invoices/POs/journal batches/medical records/contracts here."
  - name: Data Exchange
    description: "Provider-neutral staged CSV/JSON import/export framework (epic `platform-evolution` #738 Wave 3, Issue #752, ADR-0018) — module-contributed exchange descriptors, staged intake (checksum + safe filename, size/row/field-bounded parsing with formula-injection neutralization), preview with zero domain mutation, asynchronous idempotent resumable commit via the shared worker runner (`bun run data-exchange:worker`, never inline with an HTTP request), export jobs with manifest/checksum, and reconciliation. Each owning module supplies its own schema/validation/mapping/commit adapter through a capability port (`DataExchangeAdapterPort`); this module never writes to another module's tables directly. Ships one self-contained reference fixture (`reference_items`) to prove the mechanism end-to-end."
  - name: Integration Hub
    description: "Generic, provider-neutral integration boundary (epic `platform-evolution` #738 Wave 3, Issue #754, ADR-0019) — signed inbound webhook endpoints (opaque server-generated tokens, per-endpoint HMAC secret with timing-safe verification and key rotation-with-overlap), database-uniqueness-enforced replay protection, normalization of verified inbound messages into this repo's own domain-event shape, outbound event subscriptions with a bounded declarative filter and SSRF-guarded delivery, and per-adapter health tracking. Provider-specific mapping/credentials always stay owned by the module that owns that capability — this hub ships exactly two self-contained fixture inbound signature schemes and one generic outbound HTTP adapter."
  - name: Reporting Projections
    description: "Module-contributed read-model projection extension to Management Reporting (epic `platform-evolution` #738 Wave 3, Issue #753) — list registered projection descriptors with live snapshot/freshness status, trigger/resume/cancel an idempotent full rebuild, trigger an on-demand reconciliation against a source control total, and manage/trigger/download scheduled exports of a projection's current snapshot (manifest/checksum/expiry, secure tenant-scoped download). A projection is a DERIVED read model, never an authorization source of truth — every operation here independently re-checks RBAC/ABAC. Real incremental updates (`bun run reporting:projections:refresh`, `bun run reporting:exports:dispatch`) are internal scheduled jobs, not exposed over HTTP."
  - name: Service Catalog
    description: "Provider-neutral SaaS control-plane service catalog (epic #868 SaaS control plane Wave 1, Issue #870, ADR-0022) — the first control-plane module, admitted Official Optional and default-disabled per tenant. Versioned commercial PLANS with an immutable-once-published OFFER lifecycle (draft -> validate -> publish -> retire), feature/whole-module entitlement grants, usage quotas (unit + reset policy), EXACT minor-unit prices (no floating point), and trial/availability/market/currency metadata. All catalog data is GLOBAL control-plane data (reviewed RLS-exempt, ADR-0022 §3): operator authoring tables are platform-operator-only + default-deny, and a separate tenant-readable published projection carries only published versions + public prices. Published offer versions are IMMUTABLE (corrections create a new version). Feature/module/meter keys resolve through a reviewed static registry; unknown keys fail closed. Not an ERP item/product master."
  - name: Tenant Entitlement
    description: "Provider-neutral SaaS control-plane tenant entitlement (epic #868 SaaS control plane Wave 1, Issue #871, ADR-0022) — the second control-plane module and the epic's HEART, the first tenant-scoped one (every table tenant_id + ENABLE + FORCE RLS, predicate ALWAYS AND ONLY tenant_id, no soft super-tenant). Resolves a tenant's DETERMINISTIC, EXPLAINABLE effective feature/module/quota access from published service catalog offers (read via the service_catalog_read capability port), trial/grace effective-dating, operator overrides (grant/deny, reason-bound, optionally time-bound, revocable without restart), suspension/lifecycle restriction, and module-dependency safe-downgrade. Exposes ONE read-only fail-closed contract (effective_entitlement): unknown/absent/indeterminate/disabled = DENY, on a DIFFERENT axis from RBAC/ABAC/RLS — a positive entitlement NEVER grants a permission the actor lacks. Operator-only + default-deny + default-disabled per tenant. assign/override/revoke require Idempotency-Key + audit + versioned events; entitlement loss changes state + gates, NEVER deletes tenant data."
  - name: Tenant Provisioning
    description: "Provider-neutral SaaS control-plane tenant provisioning (epic #868 SaaS control plane Wave 1, Issue #872, ADR-0022) — the third control-plane module. Orchestrates an IDEMPOTENT, RESUMABLE provisioning run from a versioned plan/step registry: tenant record/bootstrap, owner identity, default configuration/locale, optional entitlement assignment (via the tenant_entitlement path), optional module preset, optional subdomain, mandatory readiness, and derived-application contributed steps (via the provisioning_step capability port). Durable checkpoints, bounded retries, lease/lock ownership, idempotency-key replay, explicit compensation classification (reversible/manual/forbidden), and NON-DESTRUCTIVE reconciliation. REUSES existing tenant/owner/office/config creation rather than duplicating it; runs provider/async work OUTSIDE the source transaction; NEVER deletes tenant data as compensation. A failed/canceled run leaves the tenant inactive with a visible blocked/failed status. Platform-operator only + default-deny + default-disabled per tenant; provisioning is restricted to the platform tenant (no soft super-tenant). Every table tenant_id + ENABLE + FORCE RLS, predicate ALWAYS AND ONLY tenant_id. LAN/offline safe: provisions with all online/provider steps absent or disabled."
  - name: Tenant Lifecycle
    description: "Provider-neutral SaaS control-plane tenant lifecycle (epic #868 SaaS control plane Wave 1, Issue #873, ADR-0022) — the fourth control-plane module and a tenant-scoped one (every table tenant_id + ENABLE + FORCE RLS, predicate ALWAYS AND ONLY tenant_id, no soft super-tenant). Records the precise SaaS lifecycle state of a tenant (provisioning/trial/active/renewal_due/past_due/grace/suspended/canceled/restoring/blocked), validates forward-legal transitions with an optimistic-concurrency version guard (invalid transition -> deterministic 409), keeps an append-only transition history, schedules trial/grace expiry transitions applied idempotently under concurrent workers, and derives — never stores as truth — the server-derived, fail-closed access restrictions a state implies. Suspension/cancel/block restrict admin/public/writes/jobs/provider access consistently across API, SSR, public host routing, and background workers; past_due is read-only; owner recovery/data export stay separately authorized. Downgrade changes the effective entitlement (via the #871 contract) and NEVER deletes tenant data; restore/reactivate runs reconciliation against provisioning readiness (#872). Emits versioned lifecycle events same-commit. Provides the tenant_restrictions and lifecycle_transition capabilities (#876 consumes the latter). Platform-operator only + default-deny + default-disabled per tenant; restricted to the platform tenant. LAN/offline safe: runs with no online payment provider."
  - name: Subscription Billing
    description: "Provider-neutral SaaS control-plane subscription billing (epic #868 SaaS control plane Wave 1, Issue #876, ADR-0022) — the fifth control-plane module and a tenant-scoped one (every table tenant_id + ENABLE + FORCE RLS, predicate ALWAYS AND ONLY tenant_id, no soft super-tenant). Records the commercial SaaS STATE of a tenant's subscription: a subscription bound to an IMMUTABLE published offer version (#870), billing periods, invoice drafts/issued documents + line items, credit notes, payment allocation REFERENCES, dunning attempts, and scheduled upgrade/downgrade/cancel changes. NOT a general ledger / AR-AP subledger / double-entry accounting / tax engine / e-invoicing / cash-bank reconciliation / tenant business invoice (ADR-0013 §3 / ADR-0022 §11) — payment allocation is a reference only, never an accounting entry. Money is EXACT minor units (bigint, never float), single-currency per invoice, explicit rounding policy. Issued invoices are IMMUTABLE (correction via credit-note/void, never edit/delete); invoice generation is idempotent per (subscription, period, offer version) under concurrent workers with a per-tenant lease. Usage-based lines reconcile to #875 aggregates and record their source window/version. Dunning REQUESTS lifecycle transitions through the #873 contract (fail-closed) and never mutates lifecycle state directly. Provides the billing_document_state capability (consumed by payment_gateway #877). Platform-operator writes are separate from tenant admin and restricted to the platform tenant; tenant users may read only their own authorized records and can never mutate an issued invoice. LAN/offline/manual-payment mode works without an online gateway."
  - name: Usage Metering
    description: "Provider-neutral SaaS control-plane usage metering (epic #868 SaaS control plane Wave 1, Issue #875, ADR-0022) — the third control-plane module and a tenant-scoped one (every table tenant_id + ENABLE + FORCE RLS, predicate ALWAYS AND ONLY tenant_id). Owning modules emit reviewed, NUMERIC-ONLY meter events in their own commit through the transaction-safe usage_append port (the events table is the transactional outbox); identity binds (tenant, producer, meter, sourceEventId, sourceVersion) so a duplicate producer event is counted once. An async, resumable worker deterministically materializes usage WINDOWS from the immutable events + signed CORRECTIONS (recompute-from-source: a rebuild reproduces stored aggregates, a replay never double-counts); late/out-of-order events recompute their window deterministically. Corrections link to the original event and NEVER mutate it (append-only, DB-trigger enforced). Reconciliation independently recomputes windows and flags drift/missing. The read-only usage_aggregate port exposes effective usage + a FAIL-CLOSED quota decision (the #871 entitlement limit + authoritative live usage — a hard quota denies when usage is unavailable). Meter keys/aggregation/bounds resolve against the #874 single source; an unknown meter fails closed. NO PII / no raw payloads. Operator-only + default-deny + default-disabled per tenant. correct/reconcile/rebuild require Idempotency-Key + audit. Not subscription/invoice pricing and not application telemetry."
paths:
  /api/v1/access/assignments:
    post:
      tags:
        - Identity & Access
      summary: Assign a role to a tenant user
      operationId: accessCreateAssignment
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessAssignmentRequest"
      responses:
        "200":
          description: Role assignment created or already present (idempotent).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AccessAssignmentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      tags:
        - Identity & Access
      summary: Remove a role assignment from a tenant user
      operationId: accessDeleteAssignment
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessAssignmentRequest"
      responses:
        "200":
          description: Assignment removed.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        type: object
                        required:
                          - unassigned
                        additionalProperties: false
                        properties:
                          unassigned:
                            type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/decision-logs:
    get:
      tags:
        - Identity & Access
      summary: List recent ABAC decision log entries for the tenant
      operationId: accessListDecisionLogs
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Recent decision log entries, newest first (limit 50).
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/DecisionLogListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/evaluate:
    post:
      tags:
        - Identity & Access
      summary: Evaluate an ABAC access request for the caller
      operationId: accessEvaluate
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccessEvaluateRequest"
      responses:
        "200":
          description: Access decision. Always recorded in the decision log.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/ApiSuccess"
                  - type: object
                    required:
                      - data
                    properties:
                      data:
                        $ref: "#/components/schemas/AccessEvaluateResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "500":
          $ref: "#/components/responses/InternalError"
  /api/v1/access/modules:
    get:
      tags:
        - Identity & Access
      summary: List the module/activity/action permission registry
      operationId: accessListModules
      security:
        - bearerAuth: []
          tenantHeader: []
      parameters:
        - $ref: "#/components/parameters/CorrelationId"
        - $ref: "#/components/parameters/RequestId"
      responses:
        "200":
          description: Permission registry.
          content:
            application/json:
              schema:
                allOf:
