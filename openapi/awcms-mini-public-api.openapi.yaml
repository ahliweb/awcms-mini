      description: "Full-online-only (Issue #589) — `403 MFA_DISABLED` unless the #587 gate AND `AUTH_MFA_ENABLED=true` are both active. Reports the caller's own enrollment only (self-service; no admin-on-behalf-of view in this issue)."
