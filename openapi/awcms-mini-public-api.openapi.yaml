x-awcms-mini-soft-delete-pattern:
  delete:
    method: DELETE
    pathPattern: /api/v1/{resources}/{id}
    behavior: Soft delete using deleted_at, deleted_by, and delete_reason.
  restore:
    method: POST
    pathPattern: /api/v1/{resources}/{id}/restore
    behavior: Restore with ABAC, unique-key conflict validation, and audit.
  purgeRequest:
    method: POST
    pathPattern: /api/v1/{resources}/{id}/purge-request
    behavior: Retention or legal workflow request, never direct physical delete.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Standard authenticated API access.
    tenantHeader:
      type: apiKey
      in: header
      name: X-AWCMS-Mini-Tenant-ID
      description: Active tenant context for tenant-scoped API.
    syncHmac:
      type: apiKey
      in: header
      name: X-AWCMS-Mini-Signature
      description: HMAC signature for sync endpoints with node and timestamp headers.
  parameters:
    CorrelationId:
      name: X-Correlation-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Optional server-side trace correlation ID.
    RequestId:
      name: X-Request-ID
      in: header
      required: false
      schema:
        type: string
        maxLength: 128
      description: Optional client-generated request trace ID.
    AcceptLanguage:
      name: Accept-Language
      in: header
      required: false
      schema:
        type: string
        example: id
      description: Preferred response locale.
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 16
        maxLength: 128
      description: Required for high-risk mutations.
    SyncNodeId:
      name: X-AWCMS-Mini-Node-ID
      in: header
      required: true
      schema:
        type: string
        minLength: 3
        maxLength: 128
      description: Sync node identifier.
    SyncTimestamp:
      name: X-AWCMS-Mini-Timestamp
      in: header
      required: true
      schema:
        type: string
        format: date-time
      description: Request timestamp used for anti-replay checks.
    SyncSignature:
      name: X-AWCMS-Mini-Signature
      in: header
      required: true
      schema:
        type: string
        minLength: 32
      description: HMAC signature over the sync request.
    Cursor:
      name: cursor
      in: query
      required: false
      schema:
        type: string
      description: >-
        Opaque keyset pagination cursor from a previous page's `nextCursor`.
        Omit for the first page.
  responses:
    BadRequest:
      description: Validation or request error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: Authentication required or expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: Access denied by RBAC, ABAC, or tenant policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: Resource not found or hidden by soft-delete policy.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: Internal server error without stack trace.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    ApiMeta:
      type: object
      additionalProperties: false
      properties:
        correlationId:
          type: string
        requestId:
          type: string
    ApiSuccess:
      type: object
      required:
        - success
        - data
        - meta
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: true
        data:
          description: Response payload.
        meta:
          $ref: "#/components/schemas/ApiMeta"
    ApiError:
      type: object
      required:
        - success
        - error
        - meta
      additionalProperties: false
      properties:
        success:
          type: boolean
          const: false
        error:
          type: object
          required:
            - code
            - message
          additionalProperties: false
          properties:
            code:
              $ref: "#/components/schemas/ErrorCode"
            message:
              type: string
            details:
              type: array
              items:
                $ref: "#/components/schemas/ErrorDetail"
        meta:
          $ref: "#/components/schemas/ApiMeta"
    ErrorDetail:
      type: object
      additionalProperties: false
      properties:
        field:
          type: string
        message:
          type: string
        code:
          type: string
    ErrorCode:
      type: string
      enum:
        - VALIDATION_ERROR
        - AUTH_REQUIRED
        - AUTH_INVALID_CREDENTIALS
        - TOKEN_EXPIRED
        - ACCESS_DENIED
        - TENANT_REQUIRED
        - RESOURCE_NOT_FOUND
        - RESOURCE_DELETED
        - IDEMPOTENCY_REQUIRED
        - IDEMPOTENCY_CONFLICT
        - WORKFLOW_APPROVAL_REQUIRED
        - SYNC_CONFLICT
        - DATABASE_BUSY
        - PROVIDER_ERROR
        - INTERNAL_ERROR
    HealthResponse:
      type: object
      required:
        - status
        - service
        - runtime
        - buildMode
        - moduleCount
        - generatedAt
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
            - ok
        service:
          type: string
          const: awcms-mini
        runtime:
          type: string
          const: bun
        buildMode:
          type: string
        moduleCount:
          type: integer
          minimum: 0
        generatedAt:
          type: string
          format: date-time
    WorkClassSaturation:
      type: object
      required:
        - workClass
        - active
        - max
        - queued
      additionalProperties: false
      properties:
        workClass:
          type: string
          enum:
            - critical_transaction
            - interactive
            - reporting
            - background_sync
            - maintenance
        active:
          type: integer
          minimum: 0
        max:
          type: integer
          minimum: 0
        queued:
          type: integer
          minimum: 0
    DatabasePoolHealthResponse:
      type: object
      required:
        - status
        - databaseReachable
        - circuitBreakerState
        - workClasses
        - generatedAt
      additionalProperties: false
      properties:
        status:
          type: string
          enum:
            - healthy
            - degraded
            - unhealthy
        databaseReachable:
          type: boolean
        circuitBreakerState:
          type: string
          enum:
            - closed
            - open
            - half_open
        workClasses:
          type: array
          items:
            $ref: "#/components/schemas/WorkClassSaturation"
        generatedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      required:
        - loginIdentifier
        - password
      additionalProperties: false
      properties:
        loginIdentifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1
          writeOnly: true
    LoginResponse:
      type: object
      required:
        - token
        - expiresAt
      additionalProperties: false
      properties:
        token:
          type: string
          description: Opaque bearer session token. Shown only once, at login.
        expiresAt:
          type: string
          format: date-time
    LogoutResponse:
      type: object
      required:
        - loggedOut
      additionalProperties: false
      properties:
        loggedOut:
          type: boolean
    ForgotPasswordRequest:
      type: object
      required:
        - loginIdentifier
      additionalProperties: false
      properties:
        loginIdentifier:
          type: string
          minLength: 1
    ForgotPasswordResponse:
      type: object
      required:
        - requested
        - message
      additionalProperties: false
      properties:
        requested:
          type: boolean
        message:
          type: string
          description: >-
            Generic text — never indicates whether loginIdentifier matched
            an account.
    ResetPasswordRequest:
      type: object
      required:
        - token
        - newPassword
      additionalProperties: false
      properties:
        token:
          type: string
          minLength: 1
          writeOnly: true
        newPassword:
          type: string
          minLength: 8
          writeOnly: true
    ResetPasswordResponse:
      type: object
      required:
        - reset
      additionalProperties: false
      properties:
        reset:
          type: boolean
          const: true
    MeResponse:
      type: object
      required:
        - identityId
        - loginIdentifier
        - profileId
        - status
        - lastLoginAt
      additionalProperties: false
      properties:
        identityId:
          type: string
          format: uuid
        loginIdentifier:
          type: string
        profileId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - active
            - inactive
            - locked
        lastLoginAt:
          type:
            - string
            - "null"
          format: date-time
    ModuleRegistryEntry:
      type: object
      required:
        - moduleKey
        - activityCode
        - action
      additionalProperties: false
      properties:
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
        description:
          type: string
    ModuleRegistryResponse:
      type: object
      required:
        - modules
      additionalProperties: false
      properties:
        modules:
          type: array
          items:
            $ref: "#/components/schemas/ModuleRegistryEntry"
    AccessEvaluateRequest:
      type: object
      required:
        - moduleKey
        - activityCode
        - action
      additionalProperties: false
      properties:
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
          enum:
            - read
            - create
            - update
            - delete
            - post
            - cancel
            - approve
            - export
            - send
            - configure
            - analyze
            - assign
        resourceType:
          type: string
        resourceId:
          type: string
        resourceAttributes:
          type: object
          additionalProperties: true
        environmentAttributes:
          type: object
          additionalProperties: true
    AccessEvaluateResponse:
      type: object
      required:
        - allowed
        - reason
      additionalProperties: false
      properties:
        allowed:
          type: boolean
        reason:
          type: string
        matchedPolicy:
          type: string
    AccessAssignmentRequest:
      type: object
      required:
        - tenantUserId
        - roleId
      additionalProperties: false
      properties:
        tenantUserId:
          type: string
          format: uuid
        roleId:
          type: string
          format: uuid
    AccessAssignmentResponse:
      type: object
      required:
        - assignmentId
      additionalProperties: false
      properties:
        assignmentId:
          type: string
          format: uuid
    DecisionLogEntry:
      type: object
      required:
        - id
        - moduleKey
        - activityCode
        - action
        - decision
        - reason
        - createdAt
      additionalProperties: false
      properties:
        id:
          type: string
          format: uuid
        tenantUserId:
          type: string
          format: uuid
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
        decision:
          type: string
          enum:
            - allow
            - deny
        reason:
          type: string
        matchedPolicy:
          type: string
        createdAt:
          type: string
          format: date-time
    DecisionLogListResponse:
      type: object
      required:
        - decisionLogs
        - nextCursor
      additionalProperties: false
      properties:
        decisionLogs:
          type: array
          items:
            $ref: "#/components/schemas/DecisionLogEntry"
        nextCursor:
          type: string
          nullable: true
          description: >-
            Opaque keyset pagination cursor; pass back as the `cursor` query
            parameter to fetch the next page. `null` when this is the last
            page.
    PermissionEntry:
      type: object
      required:
        - permissionId
        - moduleKey
        - activityCode
        - action
        - key
      additionalProperties: false
      properties:
        permissionId:
          type: string
          format: uuid
        moduleKey:
          type: string
        activityCode:
          type: string
        action:
          type: string
        key:
          type: string
          description: "moduleKey.activityCode.action"
        description:
          type: string
          nullable: true
    PermissionListResponse:
      type: object
      required:
        - permissions
      additionalProperties: false
      properties:
        permissions:
          type: array
          items:
            $ref: "#/components/schemas/PermissionEntry"
    RoleSummary:
      type: object
      required:
        - roleId
        - roleCode
        - roleName
      additionalProperties: false
      properties:
        roleId:
          type: string
          format: uuid
        roleCode:
          type: string
        roleName:
          type: string
    TenantUserEntry:
      type: object
      required:
        - tenantUserId
        - identityId
        - profileId
        - displayName
        - loginIdentifier
        - status
        - identityStatus
        - roles
      additionalProperties: false
      properties:
        tenantUserId:
          type: string
          format: uuid
        identityId:
          type: string
          format: uuid
        profileId:
          type: string
          format: uuid
        displayName:
          type: string
        loginIdentifier:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
        identityStatus:
          type: string
          enum:
            - active
            - inactive
            - locked
        lastLoginAt:
          type: string
          format: date-time
          nullable: true
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleSummary"
    UserListResponse:
      type: object
      required:
        - users
      additionalProperties: false
      properties:
        users:
          type: array
          items:
            $ref: "#/components/schemas/TenantUserEntry"
    CreateUserRequest:
      type: object
      required:
        - displayName
        - loginIdentifier
        - password
      additionalProperties: false
      properties:
        displayName:
          type: string
          minLength: 1
        loginIdentifier:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 8
        roleIds:
          type: array
          items:
            type: string
            format: uuid
          description: Roles to assign immediately at creation (optional).
    CreateUserResponse:
      type: object
      required:
        - tenantUserId
        - identityId
        - profileId
